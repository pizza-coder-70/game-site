<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leaderboard | The Pizza Edition</title>
    <meta name="description" content="Your personal high scores and game history on The Pizza Edition.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #050510;
            --surface: #0d0d20;
            --surface2: #13132a;
            --border: #1e1e3f;
            --accent: #7c3aed;
            --accent2: #06b6d4;
            --gold: #fbbf24;
            --silver: #94a3b8;
            --bronze: #d97706;
            --text: #e2e8f0;
            --muted: #64748b;
            --glow: rgba(124, 58, 237, 0.25);
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 80% 60% at 10% 5%, rgba(124, 58, 237, 0.1) 0%, transparent 60%),
                radial-gradient(ellipse 60% 50% at 90% 95%, rgba(6, 182, 212, 0.07) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        header {
            position: sticky;
            top: 0;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 28px;
            background: rgba(13, 13, 32, 0.9);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
        }

        .logo span {
            font-size: 1.6rem;
        }

        .logo h1 {
            font-size: 1.1rem;
            font-weight: 800;
            letter-spacing: 2px;
            background: linear-gradient(135deg, #a78bfa, #38bdf8);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        nav {
            display: flex;
            gap: 10px;
        }

        nav a {
            padding: 7px 16px;
            background: rgba(30, 30, 63, 0.8);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            text-decoration: none;
            font-size: .9rem;
            font-weight: 600;
            transition: all .2s;
        }

        nav a:hover {
            background: var(--accent);
            border-color: var(--accent);
        }

        main {
            position: relative;
            z-index: 1;
            max-width: 1100px;
            margin: 0 auto;
            padding: 32px 20px 60px;
        }

        .page-title {
            text-align: center;
            margin-bottom: 32px;
        }

        .page-title h2 {
            font-size: 2.4rem;
            font-weight: 800;
            letter-spacing: 2px;
            background: linear-gradient(135deg, #fbbf24, #f97316);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 6px;
        }

        .page-title p {
            color: var(--muted);
            font-size: 1rem;
        }

        /* Stats row */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 14px;
            margin-bottom: 32px;
        }

        .stat-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 18px 20px;
            text-align: center;
        }

        .stat-card .val {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #a78bfa, #38bdf8);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .stat-card .lbl {
            color: var(--muted);
            font-size: .8rem;
            margin-top: 4px;
            letter-spacing: 1px;
        }

        /* Search & filter bar */
        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            align-items: center;
        }

        #searchInput {
            flex: 1;
            min-width: 180px;
            padding: 9px 16px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            font-family: 'Outfit', sans-serif;
            font-size: .9rem;
            outline: none;
            transition: border-color .2s;
        }

        #searchInput:focus {
            border-color: var(--accent);
        }

        #searchInput::placeholder {
            color: var(--muted);
        }

        .sort-btn {
            padding: 8px 14px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--muted);
            font-size: .8rem;
            font-weight: 600;
            cursor: pointer;
            transition: all .2s;
            font-family: 'Outfit', sans-serif;
        }

        .sort-btn.active,
        .sort-btn:hover {
            border-color: var(--accent);
            color: #a78bfa;
        }

        .clear-all-btn {
            padding: 8px 14px;
            background: none;
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--muted);
            font-size: .8rem;
            cursor: pointer;
            transition: all .2s;
            font-family: 'Outfit', sans-serif;
        }

        .clear-all-btn:hover {
            border-color: #ef4444;
            color: #ef4444;
        }

        /* Grid of game cards */
        #gamesGrid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 16px;
        }

        .game-score-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
            transition: transform .2s, box-shadow .2s;
        }

        .game-score-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 32px var(--glow);
            border-color: rgba(124, 58, 237, 0.4);
        }

        .card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 18px;
            background: var(--surface2);
            border-bottom: 1px solid var(--border);
        }

        .card-header .game-name {
            font-size: 1rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .card-header .best-badge {
            padding: 3px 10px;
            background: linear-gradient(135deg, rgba(251, 191, 36, 0.2), rgba(249, 115, 22, 0.2));
            border: 1px solid rgba(251, 191, 36, 0.4);
            border-radius: 20px;
            font-size: .78rem;
            font-weight: 700;
            color: var(--gold);
            white-space: nowrap;
        }

        .card-body {
            padding: 14px 18px;
        }

        .history-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 7px;
        }

        .history-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 7px 10px;
            background: rgba(255, 255, 255, 0.027);
            border-radius: 8px;
            font-size: .85rem;
        }

        .history-item.rank-1 {
            background: rgba(251, 191, 36, 0.08);
            border: 1px solid rgba(251, 191, 36, 0.2);
        }

        .history-item.rank-2 {
            background: rgba(148, 163, 184, 0.06);
        }

        .history-item.rank-3 {
            background: rgba(217, 119, 6, 0.07);
        }

        .rank-badge {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: .72rem;
            font-weight: 800;
            flex-shrink: 0;
            margin-right: 8px;
        }

        .rank-1 .rank-badge {
            background: var(--gold);
            color: #000;
        }

        .rank-2 .rank-badge {
            background: var(--silver);
            color: #000;
        }

        .rank-3 .rank-badge {
            background: var(--bronze);
            color: #fff;
        }

        .rank-other .rank-badge {
            background: var(--surface2);
            color: var(--muted);
        }

        .history-score {
            font-weight: 700;
            color: #a78bfa;
        }

        .history-meta {
            color: var(--muted);
            font-size: .75rem;
            text-align: right;
        }

        .no-scores {
            text-align: center;
            padding: 60px;
            color: var(--muted);
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            grid-column: 1/-1;
        }

        .no-scores .big {
            font-size: 3rem;
            margin-bottom: 12px;
        }

        .no-scores p {
            font-size: 1rem;
        }

        .new-record-chip {
            padding: 1px 7px;
            background: linear-gradient(135deg, #7c3aed, #06b6d4);
            border-radius: 20px;
            font-size: .65rem;
            font-weight: 700;
            color: #fff;
            margin-left: 4px;
            vertical-align: middle;
        }
    </style>
</head>

<body>

    <header>
        <a class="logo" href="index.html">
            <span>🍕</span>
            <h1>THE PIZZA EDITION</h1>
        </a>
        <nav>
            <a href="index.html">🎮 Games</a>

            <a href="ai.html">🤖 AI Chat</a>
        </nav>
    </header>

    <main>
        <div class="page-title">
            <h2>🏆 LEADERBOARD</h2>
            <p>Your personal high scores across all games</p>
        </div>

        <!-- Global stats -->
        <div class="stats-row" id="statsRow"></div>

        <!-- Controls -->
        <div class="controls">
            <input id="searchInput" type="text" placeholder="🔍 Search games..." oninput="renderGames()">
            <button class="sort-btn active" id="sortBest" onclick="setSort('best',this)">Best Score</button>
            <button class="sort-btn" id="sortName" onclick="setSort('name',this)">A–Z</button>
            <button class="sort-btn" id="sortRecent" onclick="setSort('recent',this)">Recent</button>
            <button class="clear-all-btn" onclick="clearAll()">🗑 Clear All</button>
        </div>

        <!-- Game cards -->
        <div id="gamesGrid"></div>
    </main>

    <script src="scripts/scores.js"></script>
    <script>
        const GAME_ICONS = {
            'Pac-Man': '👾', 'Space Invaders': '👽', 'Breakout': '🧱', 'Asteroids': '☄️',
            'Frogger': '🐸', 'Galaga': '🚀', 'Simon Says': '🔴', 'Memory Match': '🃏',
            'Connect Four': '🟡', 'Checkers': '♟️', 'Hangman': '🪤', 'Sudoku': '🔢',
            'Dino Runner': '🦕', 'Battleship': '⚓', 'Word Scramble': '🔤', 'Centipede': '🐛',
            'Pinball': '🎳', 'Slot Machine': '🎰', 'Typing Speed': '⌨️', 'Reaction Time': '⚡',
            '15 Puzzle': '🔢', 'Color Match': '🎨', 'Whack-a-Mole': '🔨',
        };

        let sortMode = 'best';

        function setSort(mode, btn) {
            sortMode = mode;
            document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderGames();
        }

        function renderStats(all) {
            const games = Object.keys(all);
            const totalGames = games.length;
            const totalPlays = games.reduce((n, g) => n + all[g].history.length, 0);
            const bestGame = games.sort((a, b) => all[b].best - all[a].best)[0];
            const totalScore = games.reduce((n, g) => n + all[g].best, 0);

            document.getElementById('statsRow').innerHTML = `
      <div class="stat-card"><div class="val">${totalGames}</div><div class="lbl">GAMES PLAYED</div></div>
      <div class="stat-card"><div class="val">${totalPlays}</div><div class="lbl">TOTAL RUNS</div></div>
      <div class="stat-card"><div class="val">${totalScore.toLocaleString()}</div><div class="lbl">TOTAL BEST SCORES</div></div>
      <div class="stat-card"><div class="val">${bestGame ? (GAME_ICONS[bestGame] || '🎮') : '—'}</div><div class="lbl">${bestGame ? bestGame.toUpperCase() : 'NO GAMES YET'}</div></div>
    `;
        }

        function renderGames() {
            const all = PizzaScores.getAll();
            const query = document.getElementById('searchInput').value.toLowerCase();
            let games = Object.keys(all).filter(g => g.toLowerCase().includes(query));

            if (sortMode === 'best') games.sort((a, b) => all[b].best - all[a].best);
            else if (sortMode === 'name') games.sort((a, b) => a.localeCompare(b));
            else if (sortMode === 'recent') {
                games.sort((a, b) => {
                    const ta = all[a].history[0]?.ts || 0;
                    const tb = all[b].history[0]?.ts || 0;
                    return tb - ta;
                });
            }

            renderStats(PizzaScores.getAll());

            const grid = document.getElementById('gamesGrid');
            if (games.length === 0) {
                grid.innerHTML = `
        <div class="no-scores">
          <div class="big">🎮</div>
          <p>${query ? 'No games match your search.' : 'No scores saved yet — go play some games!'}</p>
        </div>`;
                return;
            }

            grid.innerHTML = games.map(name => {
                const data = all[name];
                const icon = GAME_ICONS[name] || '🎮';

                // Sort a copy of history by score descending — rank 1 = best score always
                const sorted = [...data.history].sort((a, b) => b.score - a.score);

                const rows = sorted.map((h, i) => {
                    const rankClass = i === 0 ? 'rank-1' : i === 1 ? 'rank-2' : i === 2 ? 'rank-3' : 'rank-other';
                    const rankLabel = i === 0 ? '1' : i === 1 ? '2' : i === 2 ? '3' : (i + 1);
                    // Show BEST badge only on the entry matching the stored best score
                    const isBest = Number(h.score) === Number(data.best);
                    const newChip = isBest ? '<span class="new-record-chip">BEST</span>' : '';
                    const extra = h.extra ? `<span style="color:var(--muted);font-size:.72rem"> · ${h.extra}</span>` : '';
                    return `
          <li class="history-item ${rankClass}">
            <span style="display:flex;align-items:center;">
              <span class="rank-badge">${rankLabel}</span>
              <span class="history-score">${Number(h.score).toLocaleString()}</span>${newChip}${extra}
            </span>
            <span class="history-meta">${h.date}</span>
          </li>`;
                }).join('');

                return `
        <div class="game-score-card">
          <div class="card-header">
            <span class="game-name">${icon} ${name}</span>
            <span class="best-badge">🏆 BEST: ${Number(data.best).toLocaleString()}</span>
          </div>
          <div class="card-body">
            <ul class="history-list">${rows}</ul>
          </div>
        </div>`;
            }).join('');
        }

        function clearAll() {
            if (!confirm('Delete ALL saved scores? This cannot be undone.')) return;
            localStorage.removeItem('pizzaEditionScores');
            renderGames();
            renderStats({});
            document.getElementById('statsRow').innerHTML = `
      <div class="stat-card"><div class="val">0</div><div class="lbl">GAMES PLAYED</div></div>
      <div class="stat-card"><div class="val">0</div><div class="lbl">TOTAL RUNS</div></div>
      <div class="stat-card"><div class="val">0</div><div class="lbl">TOTAL BEST SCORES</div></div>
      <div class="stat-card"><div class="val">—</div><div class="lbl">TOP GAME</div></div>
    `;
        }

        renderGames();
    </script>
</body>

</html>
