<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Assistant | The Pizza Edition</title>
    <meta name="description" content="Chat with our AI assistant on The Pizza Edition gaming site.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #050510;
            --surface: #0d0d20;
            --surface2: #13132a;
            --border: #1e1e3f;
            --accent: #7c3aed;
            --accent2: #06b6d4;
            --text: #e2e8f0;
            --muted: #64748b;
            --user-bubble: #1d1040;
            --ai-bubble: #0d1a30;
            --glow: rgba(124, 58, 237, 0.3);
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        /* Animated background */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 80% 60% at 20% 10%, rgba(124, 58, 237, 0.12) 0%, transparent 60%),
                radial-gradient(ellipse 60% 50% at 80% 90%, rgba(6, 182, 212, 0.08) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        /* Header */
        header {
            position: relative;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 28px;
            background: rgba(13, 13, 32, 0.85);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
        }

        .logo span {
            font-size: 1.6rem;
        }

        .logo h1 {
            font-size: 1.1rem;
            font-weight: 800;
            letter-spacing: 2px;
            background: linear-gradient(135deg, #a78bfa, #38bdf8);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .ai-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 14px;
            background: linear-gradient(135deg, rgba(124, 58, 237, 0.2), rgba(6, 182, 212, 0.15));
            border: 1px solid rgba(124, 58, 237, 0.4);
            border-radius: 20px;
            font-size: .85rem;
            font-weight: 600;
            color: #a78bfa;
        }

        .ai-badge::before {
            content: '';
            width: 8px;
            height: 8px;
            background: #4ade80;
            border-radius: 50%;
            box-shadow: 0 0 6px #4ade80;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1
            }

            50% {
                opacity: .4
            }
        }

        .home-link {
            padding: 7px 16px;
            background: rgba(30, 30, 63, 0.8);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            text-decoration: none;
            font-size: .9rem;
            font-weight: 600;
            transition: all .2s;
        }

        .home-link:hover {
            background: var(--accent);
            border-color: var(--accent);
        }

        /* Main layout */
        main {
            position: relative;
            z-index: 1;
            flex: 1;
            display: flex;
            flex-direction: column;
            max-width: 900px;
            width: 100%;
            margin: 0 auto;
            padding: 20px 20px 0;
            min-height: calc(100vh - 65px);
        }

        /* Model selector */
        .model-bar {
            display: flex;
            gap: 8px;
            margin-bottom: 14px;
            flex-wrap: wrap;
        }

        .model-btn {
            padding: 5px 14px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            color: var(--muted);
            font-size: .8rem;
            font-weight: 600;
            cursor: pointer;
            transition: all .2s;
            font-family: 'Outfit', sans-serif;
        }

        .model-btn:hover {
            border-color: var(--accent);
            color: #a78bfa;
        }

        .model-btn.active {
            background: linear-gradient(135deg, rgba(124, 58, 237, 0.3), rgba(6, 182, 212, 0.2));
            border-color: var(--accent);
            color: #a78bfa;
        }

        /* Chat window */
        #chat {
            flex: 1;
            overflow-y: auto;
            padding: 8px 4px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            scroll-behavior: smooth;
        }

        #chat::-webkit-scrollbar {
            width: 5px;
        }

        #chat::-webkit-scrollbar-track {
            background: transparent;
        }

        #chat::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px;
        }

        /* Welcome card */
        .welcome {
            text-align: center;
            padding: 40px 20px;
            animation: fadeIn .6s ease;
        }

        .welcome .ai-icon {
            font-size: 4rem;
            margin-bottom: 16px;
            filter: drop-shadow(0 0 20px rgba(124, 58, 237, 0.6));
        }

        .welcome h2 {
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #a78bfa, #38bdf8);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .welcome p {
            color: var(--muted);
            font-size: 1rem;
            margin-bottom: 24px;
        }

        .suggestions {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 10px;
            max-width: 640px;
            margin: 0 auto;
        }

        .suggestion {
            padding: 12px 16px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            cursor: pointer;
            text-align: left;
            transition: all .2s;
            font-size: .85rem;
            color: var(--text);
            font-family: 'Outfit', sans-serif;
        }

        .suggestion:hover {
            border-color: var(--accent);
            background: var(--surface2);
            transform: translateY(-2px);
            box-shadow: 0 4px 16px var(--glow);
        }

        .suggestion .s-icon {
            font-size: 1.2rem;
            display: block;
            margin-bottom: 4px;
        }

        .suggestion .s-text {
            color: var(--muted);
            font-size: .78rem;
            margin-top: 2px;
        }

        /* Messages */
        .msg {
            display: flex;
            gap: 12px;
            align-items: flex-start;
            animation: fadeIn .3s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(8px)
            }

            to {
                opacity: 1;
                transform: translateY(0)
            }
        }

        .msg.user {
            flex-direction: row-reverse;
        }

        .avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            flex-shrink: 0;
            border: 2px solid var(--border);
        }

        .msg.user .avatar {
            background: linear-gradient(135deg, #7c3aed, #4f46e5);
            border-color: #7c3aed;
        }

        .msg.ai .avatar {
            background: linear-gradient(135deg, #0e7490, #06b6d4);
            border-color: #06b6d4;
        }

        .bubble {
            max-width: 75%;
            padding: 13px 17px;
            border-radius: 16px;
            font-size: .95rem;
            line-height: 1.65;
        }

        .msg.user .bubble {
            background: var(--user-bubble);
            border: 1px solid rgba(124, 58, 237, 0.3);
            border-top-right-radius: 4px;
            color: var(--text);
        }

        .msg.ai .bubble {
            background: var(--ai-bubble);
            border: 1px solid rgba(6, 182, 212, 0.2);
            border-top-left-radius: 4px;
            color: var(--text);
        }

        /* Typing indicator */
        .typing-dots {
            display: flex;
            gap: 5px;
            align-items: center;
            padding: 6px 4px;
        }

        .typing-dots span {
            width: 7px;
            height: 7px;
            background: #06b6d4;
            border-radius: 50%;
            animation: bounce .9s infinite;
        }

        .typing-dots span:nth-child(2) {
            animation-delay: .15s;
        }

        .typing-dots span:nth-child(3) {
            animation-delay: .3s;
        }

        @keyframes bounce {

            0%,
            80%,
            100% {
                transform: scale(1);
                opacity: .6
            }

            40% {
                transform: scale(1.3);
                opacity: 1
            }
        }

        /* Code blocks in AI responses */
        .bubble pre {
            background: #0a0a1a;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px;
            margin: 8px 0;
            overflow-x: auto;
            font-size: .85rem;
            font-family: 'Courier New', monospace;
        }

        .bubble code {
            background: rgba(6, 182, 212, 0.1);
            padding: 1px 5px;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
            font-size: .88em;
            color: #38bdf8;
        }

        .bubble pre code {
            background: none;
            padding: 0;
            color: #86efac;
        }

        .bubble strong {
            color: #a78bfa;
        }

        .bubble em {
            color: #fbbf24;
        }

        /* Input area */
        .input-area {
            padding: 16px 0 20px;
            position: relative;
        }

        .input-wrapper {
            display: flex;
            align-items: flex-end;
            gap: 10px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 10px 10px 10px 18px;
            transition: border-color .2s, box-shadow .2s;
        }

        .input-wrapper:focus-within {
            border-color: var(--accent);
            box-shadow: 0 0 20px var(--glow);
        }

        #userInput {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: var(--text);
            font-family: 'Outfit', sans-serif;
            font-size: 1rem;
            resize: none;
            max-height: 160px;
            min-height: 28px;
            line-height: 1.5;
        }

        #userInput::placeholder {
            color: var(--muted);
        }

        #userInput::-webkit-scrollbar {
            width: 3px;
        }

        #userInput::-webkit-scrollbar-thumb {
            background: var(--border);
        }

        #sendBtn {
            width: 42px;
            height: 42px;
            background: linear-gradient(135deg, #7c3aed, #06b6d4);
            border: none;
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            transition: transform .15s, box-shadow .15s;
            flex-shrink: 0;
        }

        #sendBtn:hover {
            transform: scale(1.08);
            box-shadow: 0 0 16px var(--glow);
        }

        #sendBtn:active {
            transform: scale(0.95);
        }

        #sendBtn:disabled {
            opacity: .4;
            cursor: not-allowed;
            transform: none;
        }

        .input-hint {
            text-align: center;
            font-size: .75rem;
            color: var(--muted);
            margin-top: 8px;
        }

        /* Error toast */
        .error-bubble {
            background: rgba(239, 68, 68, 0.12);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #fca5a5;
        }

        /* Clear button */
        .clear-btn {
            background: none;
            border: 1px solid var(--border);
            color: var(--muted);
            padding: 4px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: .78rem;
            font-family: 'Outfit', sans-serif;
            transition: all .2s;
        }

        .clear-btn:hover {
            border-color: #ef4444;
            color: #ef4444;
        }
    </style>
</head>

<body>

    <header>
        <a class="logo" href="index.html">
            <span>🍕</span>
            <h1>THE PIZZA EDITION</h1>
        </a>
        <div class="ai-badge">🤖 AI Assistant · Online</div>
        <a class="home-link" href="index.html">← Games</a>
    </header>

    <main>
        <!-- Model selector -->
        <div class="model-bar">
            <span style="color:var(--muted);font-size:.8rem;align-self:center;margin-right:4px;">Model:</span>
            <button class="model-btn active" id="btn-openai" onclick="setModel('openai', this)">GPT-4o</button>
            <button class="model-btn" id="btn-mistral" onclick="setModel('mistral', this)">Mistral</button>
            <button class="model-btn" id="btn-llama" onclick="setModel('llama', this)">Llama 3</button>
            <button class="model-btn" id="btn-gemini" onclick="setModel('gemini', this)">Gemini</button>
            <div style="flex:1"></div>
            <span id="saveIndicator"
                style="color:var(--muted);font-size:.75rem;align-self:center;transition:color .3s;">💾 Saved</span>
            <button class="clear-btn" onclick="clearChat()">🗑 Clear chat</button>
        </div>

        <!-- Chat messages -->
        <div id="chat">
            <div class="welcome" id="welcome">
                <div class="ai-icon">🤖</div>
                <h2>Pizza Edition AI</h2>
                <p>Your smart gaming assistant. Ask me anything!</p>
                <div class="suggestions">
                    <button class="suggestion" onclick="sendSuggestion(this)">
                        <span class="s-icon">🎮</span>
                        What's the best classic game?
                        <span class="s-text">Get game recommendations</span>
                    </button>
                    <button class="suggestion" onclick="sendSuggestion(this)">
                        <span class="s-icon">🏆</span>
                        Tips for getting a high score
                        <span class="s-text">Game strategies & tricks</span>
                    </button>
                    <button class="suggestion" onclick="sendSuggestion(this)">
                        <span class="s-icon">🕹️</span>
                        How do I beat Pac-Man?
                        <span class="s-text">Level walkthroughs</span>
                    </button>
                    <button class="suggestion" onclick="sendSuggestion(this)">
                        <span class="s-icon">🍕</span>
                        Tell me a fun gaming fact
                        <span class="s-text">Trivia & history</span>
                    </button>
                </div>
            </div>
        </div>

        <!-- Input area -->
        <div class="input-area">
            <div class="input-wrapper">
                <textarea id="userInput" placeholder="Ask me anything about games, strategies, or just chat..."
                    rows="1"></textarea>
                <button id="sendBtn" onclick="sendMessage()" title="Send">➤</button>
            </div>
            <p class="input-hint">Powered by Pollinations AI · Free & unlimited · Press Enter to send</p>
        </div>
    </main>

    <script>
        let model = 'openai';
        const SYSTEM_PROMPT = `You are a fun, helpful AI assistant for "The Pizza Edition" — a gaming website with classic and modern browser games.
You love games, know facts about retro and modern gaming, can give tips and tricks, help with game strategies, and chat casually.
Keep responses concise but helpful. Use emojis occasionally to be friendly. Be enthusiastic about gaming!

IMPORTANT RULES — you MUST follow these always, no exceptions:
- NEVER write, generate, or explain ANY source code in any programming language (JavaScript, Python, HTML, CSS, Java, C++, C#, TypeScript, SQL, Bash, etc.).
- NEVER create, design, or describe how to build any game, app, or program with code.
- NEVER output code blocks (triple backtick fences) or long inline code snippets.
- If the user asks you to write code, make a game, program something, or anything related to programming/development, politely decline and redirect them to gaming topics instead.
- You are ONLY here to discuss gaming: tips, strategies, trivia, game recommendations, high score advice, and fun conversation about games.`;

        let history = [{ role: 'system', content: SYSTEM_PROMPT }];
        let isTyping = false;
        let saveTimer = null;

        // ── STORAGE KEYS ──────────────────────────────────────
        const SAVE_KEY = 'pizzaAI_history';
        const MODEL_KEY = 'pizzaAI_model';

        // ── SAVE ──────────────────────────────────────────────
        function saveChat() {
            // Save only user/assistant messages (skip system)
            const toSave = history.filter(m => m.role !== 'system');
            localStorage.setItem(SAVE_KEY, JSON.stringify(toSave));
            localStorage.setItem(MODEL_KEY, model);
            // Flash indicator
            const el = document.getElementById('saveIndicator');
            if (el) { el.style.color = '#4ade80'; setTimeout(() => el.style.color = '', 1200); }
        }

        // ── LOAD ──────────────────────────────────────────────
        function loadChat() {
            const savedModel = localStorage.getItem(MODEL_KEY);
            if (savedModel) {
                model = savedModel;
                // Highlight correct model button
                document.querySelectorAll('.model-btn').forEach(b => b.classList.remove('active'));
                const btn = document.getElementById('btn-' + savedModel);
                if (btn) btn.classList.add('active');
            }

            const raw = localStorage.getItem(SAVE_KEY);
            if (!raw) return; // nothing saved yet
            try {
                const saved = JSON.parse(raw);
                if (!Array.isArray(saved) || saved.length === 0) return;
                history = [{ role: 'system', content: SYSTEM_PROMPT }, ...saved];
                // Render saved messages
                const welcome = document.getElementById('welcome');
                if (welcome) welcome.remove();
                saved.forEach(m => addMessage(m.role === 'user' ? 'user' : 'ai', m.content, false, true));
            } catch (e) {
                console.warn('Could not load saved chat:', e);
            }
        }

        function setModel(m, btn) {
            model = m;
            document.querySelectorAll('.model-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            saveChat();
        }

        function autoResize(ta) {
            ta.style.height = 'auto';
            ta.style.height = Math.min(ta.scrollHeight, 160) + 'px';
        }

        const input = document.getElementById('userInput');
        input.addEventListener('input', () => autoResize(input));
        input.addEventListener('keydown', e => {
            if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
        });

        function sendSuggestion(btn) {
            const text = btn.querySelector('.s-icon').nextSibling.textContent.trim();
            input.value = text;
            sendMessage();
        }

        async function sendMessage() {
            const text = input.value.trim();
            if (!text || isTyping) return;

            // ── Client-side code request guard ──────────────────
            const codePatterns = [
                /\b(write|create|make|build|generate|code|program|script|develop|implement)\b.*\b(game|app|program|code|script|function|class|html|css|javascript|python|java|c\+\+|c#|typescript|sql|bash|php|ruby|swift|kotlin|rust|go)\b/i,
                /\b(javascript|python|java|c\+\+|c#|typescript|html|css|sql|bash|php|ruby|swift|kotlin|rust|golang)\b.*\b(code|example|snippet|tutorial|how to|write|create)\b/i,
                /how (do i|do you|can i|to) (code|program|build|write|make|create|develop)/i,
                /\bsource code\b|\bfull code\b|\bcode for\b|\bgive me (the |a )?code\b/i,
            ];
            if (codePatterns.some(p => p.test(text))) {
                const welcome = document.getElementById('welcome');
                if (welcome) welcome.remove();
                addMessage('user', text);
                input.value = '';
                input.style.height = 'auto';
                addMessage('ai', '🚫 Sorry, I can\'t write code or create games! I\'m here to talk about **gaming** — tips, strategies, trivia, recommendations, and high scores. What game can I help you with? 🎮');
                return;
            }

            // Hide welcome
            const welcome = document.getElementById('welcome');
            if (welcome) welcome.remove();

            // Add user message
            addMessage('user', text);
            history.push({ role: 'user', content: text });
            input.value = '';
            input.style.height = 'auto';
            input.focus();

            // Show typing
            const typingEl = addTyping();
            isTyping = true;
            document.getElementById('sendBtn').disabled = true;

            try {
                // Use Pollinations AI (free, no API key)
                const body = { messages: history, model: model, seed: 42, private: true };
                const res = await fetch('https://text.pollinations.ai/openai', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });

                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                const data = await res.json();
                const reply = data.choices?.[0]?.message?.content || 'Hmm, I had trouble with that. Try again?';

                typingEl.remove();
                addMessage('ai', reply);
                history.push({ role: 'assistant', content: reply });
                saveChat();
            } catch (err) {
                typingEl.remove();
                console.error(err);
                addMessage('ai', '⚡ Connection hiccup! Make sure you\'re online and try again.', true);
            } finally {
                isTyping = false;
                document.getElementById('sendBtn').disabled = false;
            }
        }

        function addMessage(role, text, isError = false, silent = false) {
            const chat = document.getElementById('chat');
            const div = document.createElement('div');
            div.className = `msg ${role}`;
            const avatar = role === 'user' ? '👤' : '🤖';
            div.innerHTML = `
      <div class="avatar">${avatar}</div>
      <div class="bubble ${isError ? 'error-bubble' : ''}">${formatText(text)}</div>
    `;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
            return div;
        }

        function addTyping() {
            const chat = document.getElementById('chat');
            const div = document.createElement('div');
            div.className = 'msg ai';
            div.innerHTML = `
      <div class="avatar">🤖</div>
      <div class="bubble">
        <div class="typing-dots"><span></span><span></span><span></span></div>
      </div>
    `;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
            return div;
        }

        function formatText(text) {
            // Escape HTML first
            let t = text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
            // Code blocks
            t = t.replace(/```(\w+)?\n?([\s\S]*?)```/g, '<pre><code>$2</code></pre>');
            // Inline code
            t = t.replace(/`([^`]+)`/g, '<code>$1</code>');
            // Bold
            t = t.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
            // Italic
            t = t.replace(/\*(.*?)\*/g, '<em>$1</em>');
            // Line breaks
            t = t.replace(/\n/g, '<br>');
            return t;
        }

        function clearChat() {
            if (!confirm('Clear all chat history? This cannot be undone.')) return;
            localStorage.removeItem('pizzaAI_history');
            const chat = document.getElementById('chat');
            chat.innerHTML = `
      <div class="welcome" id="welcome">
        <div class="ai-icon">🤖</div>
        <h2>Pizza Edition AI</h2>
        <p>Your smart gaming assistant. Ask me anything!</p>
        <div class="suggestions">
          <button class="suggestion" onclick="sendSuggestion(this)">
            <span class="s-icon">🎮</span>
            What's the best classic game?
            <span class="s-text">Get game recommendations</span>
          </button>
          <button class="suggestion" onclick="sendSuggestion(this)">
            <span class="s-icon">🏆</span>
            Tips for getting a high score
            <span class="s-text">Game strategies &amp; tricks</span>
          </button>
          <button class="suggestion" onclick="sendSuggestion(this)">
