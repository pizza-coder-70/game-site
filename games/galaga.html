<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Galaga | The Pizza Edition</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Courier New', monospace;
            color: #fff;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 8px;
            text-shadow: 0 0 20px #f0f;
            letter-spacing: 4px;
        }

        #hud {
            display: flex;
            gap: 40px;
            margin-bottom: 8px;
            font-size: 1rem;
        }

        canvas {
            border: 2px solid #f0f;
            box-shadow: 0 0 30px #f0f4;
        }

        #msg {
            margin-top: 12px;
            font-size: 1.2rem;
            min-height: 1.5em;
        }

        button {
            margin-top: 10px;
            padding: 10px 32px;
            background: linear-gradient(135deg, #f0f, #808);
            color: #fff;
            font-size: 1rem;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            letter-spacing: 2px;
        }

        button:hover {
            transform: scale(1.07);
        }

        #menuBtn {
            background: linear-gradient(135deg, #334155, #1e293b);
            display: none;
        }

        #homeBtn {
            position: fixed;
            top: 14px;
            left: 14px;
            padding: 8px 18px;
            background: rgba(30, 41, 59, 0.9);
            color: #fff;
            font-size: .9rem;
            font-weight: bold;
            border: 1px solid #475569;
            border-radius: 8px;
            cursor: pointer;
            text-decoration: none;
            z-index: 999;
        }

        #homeBtn:hover {
            background: #1e40af;
        }
    </style>
</head>

<body>
    <a id="homeBtn" href="../index.html">🏠 Menu</a>
    <h1>🛸 GALAGA</h1>
    <div id="hud"><span>SCORE: <b id="score">0</b></span><span>LIVES: <b id="lives">3</b></span><span>STAGE: <b
                id="stage">1</b></span></div>
    <canvas id="c" width="560" height="560"></canvas>
    <div id="msg">Arrow Keys to move, Space to shoot!</div>
    <button onclick="startGame()">START</button>
    <button id="menuBtn" onclick="window.close()">🏠 Return to Menu</button>
    <script src="../scripts/scores.js"></script>
    <script>
        const C = document.getElementById('c'), ctx = C.getContext('2d');
        const W = 560, H = 560;
        let player, bullets, enemies, eBullets, score, lives, stage, running, animId, shootCD;
        const keys = {};

        function makeEnemies(s) {
            const e = [];
            const rows = 3 + Math.min(s, 3), cols = 8;
            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    e.push({
                        x: 60 + c * 56, y: 40 + r * 44, baseX: 60 + c * 56, baseY: 40 + r * 44,
                        w: 36, h: 30, hp: r === 0 ? 2 : 1, alive: true,
                        color: r === 0 ? '#f0f' : r === 1 ? '#0ff' : '#ff0',
                        diveT: 0, diving: false, diveAngle: 0, diveX: 0, diveY: 0, diveCX: 0, diveCY: 0
                    });
                }
            }
            return e;
        }

        function startGame() {
            score = 0; lives = 3; stage = 1; running = true; shootCD = 0;
            player = { x: W / 2 - 16, y: H - 52, w: 32, h: 32, speed: 5 };
            bullets = []; eBullets = []; enemies = makeEnemies(1);
            document.getElementById('score').textContent = 0;
            document.getElementById('lives').textContent = 3;
            document.getElementById('stage').textContent = 1;
            document.getElementById('msg').textContent = '';
            if (animId) cancelAnimationFrame(animId);
            loop();
        }

        document.addEventListener('keydown', e => { keys[e.key] = true; if (e.key === ' ') { e.preventDefault(); if (!running) startGame(); } });
        document.addEventListener('keyup', e => keys[e.key] = false);

        let sway = 0, swayDir = 1, eBulletTimer = 0;
        function update() {
            if (!running) return;
            // Move player
            if ((keys['ArrowLeft'] || keys['a']) && player.x > 0) player.x -= player.speed;
            if ((keys['ArrowRight'] || keys['d']) && player.x < W - player.w) player.x += player.speed;
            // Shoot
            if (shootCD > 0) shootCD--;
            if ((keys[' '] || keys['ArrowUp']) && shootCD === 0) {
                bullets.push({ x: player.x + player.w / 2 - 2, y: player.y, w: 4, h: 14, speed: 10 });
                shootCD = 18;
            }
            bullets = bullets.filter(b => { b.y -= b.speed; return b.y > 0; });
            // Enemy sway
            sway += swayDir * 0.8; if (sway > 30 || sway < -30) swayDir *= -1;
            const alive = enemies.filter(e => e.alive);
            // Dive
            alive.forEach(e => {
                if (!e.diving && Math.random() < 0.001 + stage * 0.0005) {
                    e.diving = true; e.diveT = 0;
                    e.diveAngle = Math.random() * Math.PI * 2;
                    e.diveX = e.x; e.diveY = e.y;
                    e.diveCX = e.x + (Math.random() - 0.5) * 200;
                    e.diveCY = e.y + 200;
                }
                if (e.diving) {
                    e.diveT += 0.02 + stage * 0.005;
                    const t = e.diveT;
                    e.x = Math.pow(1 - t, 2) * e.diveX + 2 * (1 - t) * t * e.diveCX + t * t * player.x;
                    e.y = Math.pow(1 - t, 2) * e.diveY + 2 * (1 - t) * t * e.diveCY + t * t * H + 50;
                    if (e.diveT > 1) {
                        e.diving = false; e.x = e.baseX + sway; e.y = e.baseY; e.diveT = 0;
                    }
                } else { e.x = e.baseX + sway; e.y = e.baseY; }
            });
            // Enemy shoot
            eBulletTimer--;
            if (eBulletTimer <= 0 && alive.length > 0) {
                eBulletTimer = Math.max(20, 60 - stage * 5);
                const shooter = alive[Math.floor(Math.random() * alive.length)];
                eBullets.push({ x: shooter.x + shooter.w / 2, y: shooter.y + shooter.h, vx: (Math.random() - 0.5) * 3, vy: 4 + stage, w: 4, h: 10 });
            }
            eBullets = eBullets.filter(b => { b.x += b.vx; b.y += b.vy; return b.y < H; });
            // Bullet-enemy
            bullets.forEach((b, bi) => {
                enemies.filter(e => e.alive).forEach(e => {
                    if (b.x < e.x + e.w && b.x + b.w > e.x && b.y < e.y + e.h && b.y + b.h > e.y) {
                        e.hp--; if (e.hp <= 0) { e.alive = false; score += e.color === '#f0f' ? 150 : e.color === '#0ff' ? 100 : 80; }
                        bullets.splice(bi, 1); document.getElementById('score').textContent = score;
                    }
                });
            });
            // eBullet-player
            eBullets.forEach((b, bi) => {
                if (b.x < player.x + player.w && b.x + b.w > player.x && b.y < player.y + player.h && b.y + b.h > player.y) {
                    eBullets.splice(bi, 1); lives--; document.getElementById('lives').textContent = lives;
                    if (lives <= 0) { running = false; document.getElementById('msg').textContent = 'GAME OVER! Press Start.'; document.getElementById('menuBtn').style.display = ''; PizzaScores.save('Galaga', score); }
                }
            });
            // Enemy reach player
            enemies.filter(e => e.alive).forEach(e => {
                if (e.y + e.h > player.y && e.x < player.x + player.w && e.x + e.w > player.x) {
                    running = false; document.getElementById('msg').textContent = 'GAME OVER!'; document.getElementById('menuBtn').style.display = ''; PizzaScores.save('Galaga', score);
                }
            });
            if (alive.length === 0) {
                stage++; enemies = makeEnemies(stage); document.getElementById('stage').textContent = stage;
                document.getElementById('msg').textContent = `Stage ${stage}!`;
                setTimeout(() => document.getElementById('msg').textContent = '', 1500);
            }
        }

        function drawShip(x, y, w, h, color) {
            ctx.fillStyle = color;
            ctx.beginPath(); ctx.moveTo(x + w / 2, y); ctx.lineTo(x, y + h); ctx.lineTo(x + w / 4, y + h * 0.8); ctx.lineTo(x + w / 2, y + h * 0.9); ctx.lineTo(x + w * 0.75, y + h * 0.8); ctx.lineTo(x + w, y + h); ctx.closePath(); ctx.fill();
            ctx.fillStyle = 'rgba(255,255,255,0.4)';
            ctx.beginPath(); ctx.ellipse(x + w / 2, y + h * 0.3, w * 0.15, h * 0.2, 0, 0, Math.PI * 2); ctx.fill();
        }

        function draw() {
            ctx.fillStyle = '#000'; ctx.fillRect(0, 0, W, H);
            // Stars
            for (let i = 0; i < 100; i++) { ctx.fillStyle = `rgba(255,255,255,${0.3 + Math.random() * 0.3})`; ctx.fillRect((i * 97 + Date.now() / 30) % W, (i * 137) % H, 1, 1); }
            enemies.filter(e => e.alive).forEach(e => {
                ctx.shadowColor = e.color; ctx.shadowBlur = 8;
                drawShip(e.x, e.y, e.w, e.h, e.color);
                ctx.shadowBlur = 0;
            });
            ctx.fillStyle = '#ff0';
            bullets.forEach(b => { ctx.shadowColor = '#ff0'; ctx.shadowBlur = 6; ctx.fillRect(b.x, b.y, b.w, b.h); });
            ctx.fillStyle = '#f84';
            eBullets.forEach(b => { ctx.shadowColor = '#f84'; ctx.shadowBlur = 6; ctx.fillRect(b.x, b.y, b.w, b.h); });
            ctx.shadowBlur = 0;
            ctx.shadowColor = '#0ff'; ctx.shadowBlur = 12;
            drawShip(player.x, player.y, player.w, player.h, '#0ff');
            ctx.shadowBlur = 0;
        }

        function loop() { update(); draw(); if (running) animId = requestAnimationFrame(loop); }
        draw();
    </script>
</body>

</html>
