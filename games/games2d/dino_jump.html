<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Dino Jump</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        body {
            background: #0a1a0a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Courier New', monospace;
            color: #fff
        }

        h1 {
            color: #4ade80;
            font-size: 1.5rem;
            text-shadow: 0 0 16px #4ade80;
            margin-bottom: 6px
        }

        canvas {
            border: 2px solid #4ade80;
            border-radius: 8px;
            box-shadow: 0 0 30px rgba(74, 222, 128, .4);
            cursor: pointer
        }

        #ui {
            display: flex;
            gap: 20px;
            color: #4ade80;
            font-size: .85rem;
            margin-top: 6px
        }

        #msg {
            color: #facc15;
            font-size: .9rem;
            min-height: 20px;
            margin-top: 4px
        }
    </style>
</head>

<body>
    <h1>🦕 Dino Jump</h1>
    <div id="ui"><span>Score: <b id="sc">0</b></span><span>Hi-Score: <b id="hi">0</b></span><span>Speed: <b
                id="sp">1</b></span></div>
    <canvas id="c" width="600" height="220"></canvas>
    <div id="msg">Space / Click / Tap to jump! Double jump available!</div>
    <script>
        const cv = document.getElementById('c'), cx = cv.getContext('2d');
        const W = 600, H = 220, GY = H - 40;
        let dino = { x: 80, y: GY, w: 36, h: 44, vy: 0, jumps: 0 };
        let obstacles = [], clouds = [], score = 0, hiScore = 0, speed = 5, over = false, started = false, dist = 0;
        for (let i = 0; i < 5; i++)clouds.push({ x: Math.random() * W, y: 30 + Math.random() * 60, w: 60 + Math.random() * 80, spd: .5 + Math.random() * .5 });
        function jump() {
            if (!started) { started = true; return; }
            if (over) { reset(); return; }
            if (dino.jumps < 2) { dino.vy = -12.5 + dino.jumps * 1.5; dino.jumps++; }
        }
        cv.addEventListener('click', jump);
        document.addEventListener('keydown', e => { if (e.code === 'Space' || e.code === 'ArrowUp') { e.preventDefault(); jump(); } if (e.code === 'KeyR') reset(); });
        function reset() { over = false; started = true; dino.y = GY; dino.vy = 0; dino.jumps = 0; obstacles = []; score = 0; dist = 0; speed = 5; document.getElementById('sc').textContent = 0; document.getElementById('sp').textContent = 1; }

        function spawnObstacle() {
            const types = [
                { w: 22, h: 44, col: '#4ade80' },
                { w: 40, h: 28, col: '#38bdf8', fly: true, flyY: GY - 60 },
                { w: 14, h: 60, col: '#f43f5e' },
                { w: 32, h: 36, col: '#facc15' },
            ];
            const t = types[Math.floor(Math.random() * types.length)];
            return { x: W + 30, y: t.fly ? t.flyY : GY + dino.h - t.h, w: t.w, h: t.h, col: t.col };
        }

        let nextObs = 80;
        function update() {
            if (!started || over) return;
            dist++; speed = 5 + dist / 400; document.getElementById('sp').textContent = Math.floor(speed * 10) / 10;
            dino.vy += .65; dino.y += dino.vy;
            if (dino.y >= GY) { dino.y = GY; dino.vy = 0; dino.jumps = 0; }
            clouds.forEach(c => { c.x -= c.spd; if (c.x < -100) c.x = W + 50; });
            obstacles.forEach(o => o.x -= speed);
            obstacles = obstacles.filter(o => o.x > -60);
            nextObs--; if (nextObs <= 0) { obstacles.push(spawnObstacle()); nextObs = Math.floor(80 + Math.random() * (200 - speed * 8)); }
            score++; document.getElementById('sc').textContent = Math.floor(score / 5);
            if (score > hiScore) { hiScore = score; document.getElementById('hi').textContent = Math.floor(hiScore / 5); }
            obstacles.forEach(o => { if (dino.x + dino.w - 6 > o.x + 4 && dino.x + 6 < o.x + o.w - 4 && dino.y + dino.h - 6 > o.y + 4 && dino.y + 4 < o.y + o.h - 4) over = true; });
        }

        function draw() {
            cx.fillStyle = '#0a1a0a'; cx.fillRect(0, 0, W, H);
            clouds.forEach(c => { cx.fillStyle = 'rgba(74,222,128,.08)'; cx.fillRect(c.x, c.y, c.w, 20); cx.fillRect(c.x + 10, c.y - 12, c.w - 20, 16); });
            // Ground
            cx.fillStyle = '#1a3a1a'; cx.fillRect(0, GY + dino.h, W, H - (GY + dino.h));
            cx.strokeStyle = '#4ade80'; cx.lineWidth = 2; cx.beginPath(); cx.moveTo(0, GY + dino.h); cx.lineTo(W, GY + dino.h); cx.stroke();
            // Score lines on ground
            for (let i = 0; i < W; i += 60) { cx.strokeStyle = 'rgba(74,222,128,.2)'; cx.lineWidth = 1; cx.beginPath(); cx.moveTo((i - dist * speed * .01) % W, GY + dino.h); cx.lineTo((i - dist * speed * .01) % W + 30, GY + dino.h); cx.stroke(); }
            obstacles.forEach(o => { cx.fillStyle = o.col; cx.fillRect(o.x, o.y, o.w, o.h); cx.fillStyle = 'rgba(255,255,255,.2)'; cx.fillRect(o.x, o.y, o.w, 4); });
            // Dino body
            cx.fillStyle = over ? '#ef4444' : '#4ade80';
            cx.fillRect(dino.x, dino.y, dino.w, dino.h);
            // Head
            cx.fillRect(dino.x + dino.w, dino.y, 16, 18);
            cx.fillStyle = '#000'; cx.fillRect(dino.x + dino.w + 8, dino.y + 5, 5, 5); // eye
            cx.fillStyle = '#86efac'; cx.fillRect(dino.x + dino.w, dino.y + 18, 5, 8); // tail fin
            cx.fillStyle = over ? '#ef4444' : '#4ade80';
            // Legs
            const legOff = Math.floor(dist / 5) % 2 * 8;
            cx.fillRect(dino.x + 4, dino.y + dino.h, 12, legOff + 8);
            cx.fillRect(dino.x + 18, dino.y + dino.h, 12, (8 - legOff) + 8);
            if (dino.jumps === 2) { cx.strokeStyle = 'rgba(74,222,128,.5)'; cx.lineWidth = 2; cx.setLineDash([2, 4]); cx.beginPath(); cx.arc(dino.x + dino.w / 2, dino.y + dino.h / 2, 25, 0, Math.PI * 2); cx.stroke(); cx.setLineDash([]); }
            if (!started) { cx.fillStyle = 'rgba(0,0,0,.6)'; cx.fillRect(0, 0, W, H); cx.fillStyle = '#4ade80'; cx.font = 'bold 32px monospace'; cx.textAlign = 'center'; cx.fillText('CLICK TO START', W / 2, H / 2); }
            if (over) { cx.fillStyle = 'rgba(0,0,0,.75)'; cx.fillRect(0, 0, W, H); cx.fillStyle = '#f43f5e'; cx.font = 'bold 36px monospace'; cx.textAlign = 'center'; cx.fillText('GAME OVER', W / 2, H / 2 - 16); cx.fillStyle = '#aaa'; cx.font = '16px monospace'; cx.fillText('Score: ' + Math.floor(score / 5) + ' | R to restart', W / 2, H / 2 + 18); }
        }
        function loop() { update(); draw(); requestAnimationFrame(loop); } loop();
    </script>

    <script src="../mobile_controls.js"></script>
</body>

</html>
