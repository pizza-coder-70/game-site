<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Neon Asteroids</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        body {
            background: #000208;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Courier New', monospace;
            color: #fff
        }

        h1 {
            color: #a78bfa;
            font-size: 1.5rem;
            text-shadow: 0 0 16px #a78bfa;
            margin-bottom: 6px
        }

        canvas {
            border: 2px solid #a78bfa;
            border-radius: 8px;
            box-shadow: 0 0 30px rgba(167, 139, 250, .4)
        }

        #ui {
            display: flex;
            gap: 16px;
            color: #a78bfa;
            font-size: .82rem;
            margin-top: 6px
        }

        #msg {
            color: #facc15;
            font-size: .9rem;
            min-height: 20px;
            margin-top: 4px
        }
    </style>
</head>

<body>
    <h1>☄️ Neon Asteroids</h1>
    <div id="ui"><span>Score: <b id="sc">0</b></span><span>Lives: <b id="li">3</b></span><span>Level: <b
                id="lv">1</b></span><span>Shield: <b id="sh">--</b></span></div>
    <canvas id="c" width="540" height="440"></canvas>
    <div id="msg">WASD/Arrows=move | Space=shoot | Destroy all asteroids!</div>
    <script>
        const cv = document.getElementById('c'), cx = cv.getContext('2d');
        const W = 540, H = 440;
        let ship, bullets, asteroids, particles, score, lives, level, over, won, shield, shieldTime;
        let keys = {};
        document.addEventListener('keydown', e => { keys[e.code] = true; if (e.code.startsWith('Arrow') || e.code === 'Space') e.preventDefault(); if (e.code === 'Space') shoot(); if (e.code === 'KeyR' && (over || won)) init(); });
        document.addEventListener('keyup', e => keys[e.code] = false);
        function init() {
            ship = { x: W / 2, y: H / 2, vx: 0, vy: 0, angle: 0, invuln: 120 };
            bullets = []; asteroids = []; particles = []; score = 0; lives = 3; level = 1; over = false; won = false; shield = false; shieldTime = 0;
            spawnLevel(1); document.getElementById('sc').textContent = 0; document.getElementById('li').textContent = 3; document.getElementById('lv').textContent = 1; document.getElementById('sh').textContent = '--';
        }
        function rndAsteroid(r, x, y) { const a = Math.random() * Math.PI * 2, spd = 1 + Math.random() * 2; return { x: x || Math.random() * W, y: y || Math.random() * H, vx: Math.cos(a) * spd, vy: Math.sin(a) * spd, r, pts: genPts(r), angle: 0, rot: (Math.random() - .5) * .05 }; }
        function genPts(r) { const pts = []; for (let i = 0; i < 10; i++) { const a = i / 10 * Math.PI * 2, d = r * (0.7 + Math.random() * .4); pts.push({ x: Math.cos(a) * d, y: Math.sin(a) * d }); } return pts; }
        function spawnLevel(l) { spawnAsteroid(4 + l * 2); }
        function spawnAsteroid(n) { for (let i = 0; i < n; i++) { let x, y; do { x = Math.random() * W; y = Math.random() * H; } while (Math.hypot(x - ship.x, y - ship.y) < 100); asteroids.push(rndAsteroid(30 + Math.random() * 20, x, y)); } }
        let shootCD = 0;
        function shoot() { if (shootCD > 0 || over || won) return; const a = ship.angle; bullets.push({ x: ship.x + Math.sin(a) * 20, y: ship.y - Math.cos(a) * 20, vx: Math.sin(a) * 12, vy: -Math.cos(a) * 12, life: 50 }); shootCD = 12; }
        function explode(x, y, col, n) { for (let i = 0; i < n; i++) { const a = Math.PI * 2 * i / n; particles.push({ x, y, vx: Math.cos(a) * (2 + Math.random() * 3), vy: Math.sin(a) * (2 + Math.random() * 3), life: 30, col }); } }
        init();
        function update() {
            if (over || won) return;
            shootCD--; if (ship.invuln > 0) ship.invuln--; if (shieldTime > 0) { shieldTime--; shield = shieldTime > 0; document.getElementById('sh').textContent = shield ? shieldTime + '' : '--'; }
            if (keys['ArrowLeft'] || keys['KeyA']) ship.angle -= .06;
            if (keys['ArrowRight'] || keys['KeyD']) ship.angle += .06;
            if (keys['ArrowUp'] || keys['KeyW']) { ship.vx += Math.sin(ship.angle) * .25; ship.vy -= Math.cos(ship.angle) * .25; }
            ship.vx *= .98; ship.vy *= .98; ship.x = (ship.x + ship.vx + W) % W; ship.y = (ship.y + ship.vy + H) % H;
            bullets = bullets.filter(b => { b.x = (b.x + b.vx + W) % W; b.y = (b.y + b.vy + H) % H; b.life--; return b.life > 0; });
            asteroids.forEach(a => { a.x = (a.x + a.vx + W) % W; a.y = (a.y + a.vy + H) % H; a.angle += a.rot; });
            // Bullet-asteroid
            let newAsts = [];
            bullets = bullets.filter(b => {
                for (let a of asteroids) {
                    if (Math.hypot(b.x - a.x, b.y - a.y) < a.r) {
                        explode(a.x, a.y, '#a78bfa', 8);
                        score += a.r > 25 ? 10 : a.r > 15 ? 20 : 30; document.getElementById('sc').textContent = score;
                        if (a.r > 16) { newAsts.push(rndAsteroid(a.r * .55, a.x + 10, a.y)); newAsts.push(rndAsteroid(a.r * .55, a.x - 10, a.y)); }
                        asteroids = asteroids.filter(x => x !== a);
                        return false;
                    }
                } return true;
            });
            asteroids.push(...newAsts);
            // Ship collision
            if (ship.invuln <= 0 && !shield) {
                for (let a of asteroids) {
                    if (Math.hypot(ship.x - a.x, ship.y - a.y) < a.r + 12) {
                        lives--; document.getElementById('li').textContent = lives; ship.invuln = 120; ship.vx = 0; ship.vy = 0; explode(ship.x, ship.y, '#818cf8', 12);
                        if (lives <= 0) over = true; break;
                    }
                }
            }
            // Shield pickup
            if (Math.random() < .001 && !shield && shieldTime <= 0) { asteroids.push({ ...rndAsteroid(10), isShield: true, col: '#38bdf8' }); }
            particles = particles.filter(p => { p.x += p.vx; p.y += p.vy; p.life--; return p.life > 0; });
            if (asteroids.length === 0) { level++; document.getElementById('lv').textContent = level; if (level > 6) { won = true; return; } spawnLevel(level); }
        }
        function draw() {
            cx.fillStyle = '#000208'; cx.fillRect(0, 0, W, H);
            for (let i = 0; i < 120; i++) { cx.fillStyle = `rgba(255,255,255,.4)`; cx.fillRect((i * 157) % W, (i * 89) % H, 1, 1); }
            asteroids.forEach(a => {
                cx.save(); cx.translate(a.x, a.y); cx.rotate(a.angle);
                cx.strokeStyle = a.isShield ? '#38bdf8' : '#a78bfa'; cx.lineWidth = 2; cx.shadowColor = a.isShield ? '#38bdf8' : '#a78bfa'; cx.shadowBlur = 8;
                cx.beginPath(); a.pts.forEach((p, i) => i ? cx.lineTo(p.x, p.y) : cx.moveTo(p.x, p.y)); cx.closePath(); cx.stroke();
                if (a.isShield) { cx.fillStyle = 'rgba(56,189,248,.15)'; cx.fill(); cx.fillStyle = '#38bdf8'; cx.font = '10px monospace'; cx.textAlign = 'center'; cx.fillText('🛡️', 0, 4); }
                cx.shadowBlur = 0; cx.restore();
            });
            particles.forEach(p => { cx.globalAlpha = p.life / 30; cx.fillStyle = p.col; cx.fillRect(p.x - 2, p.y - 2, 4, 4); }); cx.globalAlpha = 1;
            bullets.forEach(b => { cx.fillStyle = '#c4b5fd'; cx.shadowColor = '#a78bfa'; cx.shadowBlur = 6; cx.fillRect(b.x - 2, b.y - 2, 4, 8); cx.shadowBlur = 0; });
            // Ship
            if (!(ship.invuln > 0 && Math.floor(ship.invuln / 8) % 2 === 0)) {
                cx.save(); cx.translate(ship.x, ship.y); cx.rotate(ship.angle);
                cx.strokeStyle = shield ? '#38bdf8' : '#e9d5ff'; cx.lineWidth = 2; cx.shadowColor = shield ? '#38bdf8' : '#a78bfa'; cx.shadowBlur = 12;
                cx.beginPath(); cx.moveTo(0, -20); cx.lineTo(-12, 14); cx.lineTo(0, 8); cx.lineTo(12, 14); cx.closePath(); cx.stroke();
                if (shield) { cx.strokeStyle = 'rgba(56,189,248,.5)'; cx.lineWidth = 3; cx.beginPath(); cx.arc(0, 0, 22, 0, Math.PI * 2); cx.stroke(); }
                if (keys['ArrowUp'] || keys['KeyW']) { cx.fillStyle = '#f97316'; cx.beginPath(); cx.moveTo(-5, 10); cx.lineTo(0, 22 + Math.random() * 8); cx.lineTo(5, 10); cx.fill(); }
                cx.shadowBlur = 0; cx.restore();
            }
            if (over) { cx.fillStyle = 'rgba(0,0,0,.82)'; cx.fillRect(0, 0, W, H); cx.fillStyle = '#f43f5e'; cx.font = 'bold 38px monospace'; cx.textAlign = 'center'; cx.fillText('DESTROYED! 💀', W / 2, H / 2 - 20); cx.fillStyle = '#aaa'; cx.font = '16px monospace'; cx.fillText('Score: ' + score + ' | R restart', W / 2, H / 2 + 18); }
            if (won) { cx.fillStyle = 'rgba(0,0,0,.82)'; cx.fillRect(0, 0, W, H); cx.fillStyle = '#facc15'; cx.font = 'bold 40px monospace'; cx.textAlign = 'center'; cx.fillText('YOU WIN! 🏆', W / 2, H / 2 - 24); cx.fillStyle = '#a78bfa'; cx.font = '20px monospace'; cx.fillText('Score: ' + score, W / 2, H / 2 + 20); }
        }
        function loop() { update(); draw(); requestAnimationFrame(loop); } loop();
    </script>

    <script src="../mobile_controls.js"></script>
</body>

</html>
