<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe | The Pizza Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0d0d0d;
            --primary-color: #3498DB;
            --secondary-color: #E74C3C;
            --grid-bg: rgba(255, 255, 255, 0.05);
            --cell-bg: rgba(255, 255, 255, 0.1);
            --text-color: #fff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 2rem;
            user-select: none;
        }

        h1 {
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            font-weight: 800;
            background: linear-gradient(45deg, var(--primary-color), #2ecc71);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .status {
            margin-bottom: 2rem;
            font-size: 1.5rem;
            font-weight: 600;
            min-height: 2rem;
        }

        .board {
            display: grid;
            grid-template-columns: repeat(3, 100px);
            grid-template-rows: repeat(3, 100px);
            gap: 10px;
            background: var(--grid-bg);
            padding: 10px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .cell {
            background: var(--cell-bg);
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 4rem;
            font-weight: 800;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }

        .cell:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .cell:active {
            transform: scale(0.95);
        }

        .cell.x {
            color: var(--primary-color);
        }

        .cell.o {
            color: var(--secondary-color);
        }

        .btn {
            background: linear-gradient(45deg, var(--primary-color), var(--secondary-color));
            border: none;
            color: white;
            padding: 1rem 2rem;
            border-radius: 2rem;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
            font-family: inherit;
            margin-top: 2rem;
        }

        .btn:hover {
            transform: scale(1.05);
        }

        .back-btn {
            position: absolute;
            top: 2rem;
            left: 2rem;
            color: var(--text-color);
            text-decoration: none;
            font-weight: 600;
            opacity: 0.7;
            transition: opacity 0.2s;
        }

        .back-btn:hover {
            opacity: 1;
        }
    </style>
</head>

<body>
    <a href="../index.html" class="back-btn">← Back to Games</a>
    <h1>Tic Tac Toe</h1>
    <div class="status" id="status">Player X's Turn</div>

    <div class="board" id="board">
        <div class="cell" onclick="makeMove(0)"></div>
        <div class="cell" onclick="makeMove(1)"></div>
        <div class="cell" onclick="makeMove(2)"></div>
        <div class="cell" onclick="makeMove(3)"></div>
        <div class="cell" onclick="makeMove(4)"></div>
        <div class="cell" onclick="makeMove(5)"></div>
        <div class="cell" onclick="makeMove(6)"></div>
        <div class="cell" onclick="makeMove(7)"></div>
        <div class="cell" onclick="makeMove(8)"></div>
    </div>

    <button class="btn" onclick="resetGame()">Restart Game</button>

    <script src="../scripts/scores.js"></script>
    <script>
        let board = Array(9).fill('');
        let currentPlayer = 'X';
        let gameActive = true;
        const statusEl = document.getElementById('status');
        const cells = document.querySelectorAll('.cell');

        const winningConditions = [
            [0, 1, 2], [3, 4, 5], [6, 7, 8], // Rows
            [0, 3, 6], [1, 4, 7], [2, 5, 8], // Cols
            [0, 4, 8], [2, 4, 6]             // Diagonals
        ];

        function makeMove(index) {
            if (board[index] !== '' || !gameActive || currentPlayer !== 'X') return;

            board[index] = currentPlayer;
            updateBoard();
            checkWin();

            if (gameActive) {
                currentPlayer = 'O';
                statusEl.innerText = "Computer's Turn...";
                setTimeout(computerMove, 500); // Small delay for realism
            }
        }

        function computerMove() {
            if (!gameActive) return;

            // Simple AI: Random empty spot
            const emptySpots = board.map((val, idx) => val === '' ? idx : null).filter(val => val !== null);
            if (emptySpots.length > 0) {
                const randomSpot = emptySpots[Math.floor(Math.random() * emptySpots.length)];
                board[randomSpot] = currentPlayer;
                updateBoard();
                checkWin();

                if (gameActive) {
                    currentPlayer = 'X';
                    statusEl.innerText = "Player X's Turn";
                }
            }
        }

        function updateBoard() {
            cells.forEach((cell, index) => {
                cell.innerText = board[index];
                cell.className = 'cell';
                if (board[index]) cell.classList.add(board[index].toLowerCase());
            });
        }

        function checkWin() {
            let roundWon = false;
            for (let i = 0; i < winningConditions.length; i++) {
                const [a, b, c] = winningConditions[i];
                if (board[a] && board[a] === board[b] && board[a] === board[c]) {
                    roundWon = true;
                    break;
                }
            }

            if (roundWon) {
                const winner = currentPlayer === 'X' ? 'Player' : 'Computer';
                statusEl.innerText = `${winner} Wins!`;
                PizzaScores.save('Tic Tac Toe', currentPlayer === 'X' ? 1 : 0, winner + ' wins');
                gameActive = false;
                return;
            }

            if (!board.includes('')) {
                statusEl.innerText = 'Draw!';
                PizzaScores.save('Tic Tac Toe', 0, 'Draw');
                gameActive = false;
                return;
            }
        }

        function resetGame() {
            board = Array(9).fill('');
            currentPlayer = 'X';
            gameActive = true;
            statusEl.innerText = "Player X's Turn";
            updateBoard();
        }
    </script>
</body>

</html>
