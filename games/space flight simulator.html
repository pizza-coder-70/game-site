<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space Flight Simulator</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #0d0d1a;
            /* Dark space blue */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            user-select: none;
        }

        canvas {
            display: block;
        }

        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            /* Let clicks pass through to canvas where needed */
            z-index: 10;
        }

        .screen {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            pointer-events: auto;
        }

        .active {
            display: flex;
        }

        button {
            padding: 15px 30px;
            font-size: 20px;
            cursor: pointer;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            margin: 10px;
            transition: transform 0.1s;
        }

        button:hover {
            transform: scale(1.05);
            background: #45a049;
        }

        button:active {
            transform: scale(0.95);
        }

        #build-ui {
            position: absolute;
            top: 50%;
            left: 20px;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding: 10px;
            width: 90px;
            height: 400px;
            /* Approx 5-6 items visible (60px + gap) */
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid #4CAF50;
            border-radius: 10px;
            pointer-events: auto;
            overflow-y: auto;
            align-items: center;
        }

        /* Scrollbar styling for webkit */
        #build-ui::-webkit-scrollbar {
            width: 8px;
        }

        #build-ui::-webkit-scrollbar-track {
            background: #1a1a1a;
        }

        #build-ui::-webkit-scrollbar-thumb {
            background: #4CAF50;
            border-radius: 4px;
        }

        .part-btn {
            width: 70px;
            height: 70px;
            border: 2px solid white;
            border-radius: 5px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            text-align: center;
            flex-direction: column;
            flex-shrink: 0;
            /* Prevent squishing */
            background: rgba(255, 255, 255, 0.05);
        }

        #stats {
            position: absolute;
            top: 10px;
            left: 10px;
            pointer-events: none;
            font-size: 16px;
            text-shadow: 1px 1px 2px black;
        }

        h1 {
            font-size: 48px;
            margin-bottom: 20px;
            text-shadow: 0 0 10px #4CAF50;
        }

        p {
            font-size: 24px;
        }

        #dev-menu {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.8);
            border: 2px solid #00ff00;
            padding: 15px;
            color: #00ff00;
            font-family: 'Courier New', monospace;
            display: none;
            flex-direction: column;
            gap: 10px;
            pointer-events: auto;
            z-index: 100;
        }

        .dev-btn {
            background: #003300;
            color: #00ff00;
            border: 1px solid #00ff00;
            padding: 5px 10px;
            cursor: pointer;
            font-size: 14px;
        }

        .dev-btn:hover {
            background: #005500;
        }
    </style>
</head>

<body>

    <canvas id="gameCanvas"></canvas>

    <div id="ui-layer">
        <!-- Menu Screen -->
        <div id="start-screen" class="screen active">
            <h1>Space Flight Sim</h1>
            <p>Build. Launch. Reach the Moon.</p>
            <button id="start-btn">Start Building</button>
        </div>

        <!-- Build Logic UI (Overlay) -->
        <div id="build-screen"
            style="display: none; pointer-events: none; width: 100%; height: 100%; position: absolute;">
            <div id="stats">Money: $<span id="money-display">0</span></div>
            <div id="build-ui">
                <!-- Build buttons generated by JS -->
            </div>
            <button id="launch-btn"
                style="position: absolute; right: 20px; bottom: 20px; pointer-events: auto; background: #FF5722;">LAUNCH</button>
        </div>

        <!-- Flight UI -->
        <div id="flight-screen"
            style="display: none; pointer-events: none; width: 100%; height: 100%; position: absolute;">
            <div id="flight-stats" style="position: absolute; top: 10px; left: 10px; text-shadow: 1px 1px 2px black;">
                Alt: <span id="altitude">0</span> m<br>
                Vel: <span id="velocity">0</span> m/s<br>
                Fuel: <span id="fuel">100</span>%
            </div>
            <button id="abort-btn"
                style="position: absolute; right: 20px; top: 20px; pointer-events: auto; background: #d32f2f; font-size: 14px; padding: 10px 20px;">ABORT
                / CASH OUT</button>
        </div>

        <!-- Results Screen -->
        <div id="results-screen" class="screen">
            <h1>Flight Results</h1>
            <p>Max Altitude: <span id="max-alt">0</span> m</p>
            <p>Money Earned: $<span id="earnings">0</span></p>
            <button id="return-btn">Back to Build</button>
        </div>

        <!-- Developer Menu -->
        <div id="dev-menu">
            <h3 style="margin: 0 0 10px 0;">DEV CHEATS</h3>
            <button class="dev-btn" onclick="cheatMoney()">+ $10,000</button>
            <button class="dev-btn" onclick="cheatFuel()">Refill Fuel</button>
            <button class="dev-btn" onclick="cheatMoon()">Teleport to Moon</button>
            <button class="dev-btn" onclick="toggleDev()">Close</button>
        </div>
    </div>

    <script>
        // --- Constants & Config ---
        const Canvas = document.getElementById('gameCanvas');
        const Ctx = Canvas.getContext('2d');
        const GRAVITY = 9.8;
        const AIR_DENSITY = 1.225;

        // Game State
        const STATE = {
            MENU: 0,
            BUILD: 1,
            FLIGHT: 2,
            RESULTS: 3
        };
        let currentState = STATE.MENU;

        // Player Data
        let money = 0;
        let maxAltitudeReached = 0;

        // Build Data
        const GRID_SIZE = 40;
        let parts = []; // Installed parts on the rocket (legacy variable, using installedParts)
        let installedParts = []; // The actual list of parts on the build grid

        let availableParts = [
            // Command
            { name: 'Command', cost: 500, type: 'command', color: '#ecf0f1', w: 1, h: 1, mass: 10, drag: 0.1, reqAlt: 0 },
            { name: 'Probe Core', cost: 300, type: 'command', color: '#f1c40f', w: 1, h: 0.5, mass: 2, drag: 0.05, reqAlt: 0 },
            { name: 'Lander Can', cost: 600, type: 'command', color: '#ecf0f1', w: 2, h: 1, mass: 15, drag: 0.2, reqAlt: 0 },

            // RCS
            { name: 'RCS', cost: 300, type: 'rcs', color: '#95a5a6', w: 1, h: 1, mass: 5, fuel: 50, thrust: 200, drag: 0.1, reqAlt: 0 },

            // Fuel Tanks (Standard)
            { name: 'Tiny Fuel', cost: 50, type: 'fuel', color: '#bdc3c7', w: 1, h: 0.5, mass: 1, fuel: 100, drag: 0.05, reqAlt: 0 },
            { name: 'Fuel', cost: 200, type: 'fuel', color: '#bdc3c7', w: 1, h: 2, mass: 5, fuel: 500, drag: 0.2, reqAlt: 0 },
            { name: 'Med Fuel', cost: 300, type: 'fuel', color: '#bdc3c7', w: 1, h: 3, mass: 7, fuel: 800, drag: 0.3, reqAlt: 0 },
            { name: 'Wide Fuel', cost: 600, type: 'fuel', color: '#bdc3c7', w: 2, h: 2, mass: 10, fuel: 1200, drag: 0.3, reqAlt: 0 },

            // Fuel Tanks (Titan - Gold)
            { name: 'Titan Sm', cost: 1000, type: 'fuel', color: '#e67e22', w: 3, h: 2, mass: 25, fuel: 4000, drag: 0.4, reqAlt: 0 },
            { name: 'Titan Fuel', cost: 2000, type: 'fuel', color: '#e67e22', w: 3, h: 4, mass: 50, fuel: 8000, drag: 0.8, reqAlt: 0 },
            { name: 'Titan Lg', cost: 3000, type: 'fuel', color: '#e67e22', w: 3, h: 6, mass: 75, fuel: 12000, drag: 1.2, reqAlt: 0 },

            // Fuel Tanks (Behemoth - Grey)
            { name: 'Behemoth Sm', cost: 4000, type: 'fuel', color: '#7f8c8d', w: 4, h: 3, mass: 100, fuel: 15000, drag: 0.8, reqAlt: 0 },
            { name: 'Behemoth Fuel', cost: 8000, type: 'fuel', color: '#7f8c8d', w: 4, h: 6, mass: 200, fuel: 30000, drag: 1.5, reqAlt: 0 },

            // Fuel Tanks (Galaxy - Dark)
            { name: 'Galaxy Sm', cost: 10000, type: 'fuel', color: '#2c3e50', w: 6, h: 4, mass: 400, fuel: 50000, drag: 1.5, reqAlt: 0 },
            { name: 'Galaxy Fuel', cost: 30000, type: 'fuel', color: '#2c3e50', w: 6, h: 8, mass: 800, fuel: 100000, drag: 3.0, reqAlt: 0 },

            // Engines
            { name: 'Tiny Eng', cost: 100, type: 'engine', color: '#7f8c8d', w: 1, h: 0.5, mass: 5, thrust: 200, drag: 0.05, reqAlt: 0 },
            { name: 'Engine', cost: 500, type: 'engine', color: '#e67e22', w: 1, h: 1, mass: 15, thrust: 800, drag: 0.1, reqAlt: 0 },
            { name: 'Ion Eng', cost: 2000, type: 'engine', color: '#3498db', w: 1, h: 1, mass: 10, thrust: 100, drag: 0.1, reqAlt: 0 }, // Low thrust, cool look
            { name: 'Nuclear Eng', cost: 5000, type: 'engine', color: '#27ae60', w: 1, h: 3, mass: 40, thrust: 1500, drag: 0.2, reqAlt: 0 }, // Heavy, long

            { name: 'Titan Engine', cost: 5000, type: 'engine', color: '#c0392b', w: 3, h: 2, mass: 150, thrust: 10000, drag: 0.6, reqAlt: 0 },
            { name: 'Behemoth Eng', cost: 20000, type: 'engine', color: '#8e44ad', w: 4, h: 3, mass: 400, thrust: 40000, drag: 1.0, reqAlt: 0 },
            { name: 'Galaxy Eng', cost: 100000, type: 'engine', color: '#9b59b6', w: 6, h: 4, mass: 1000, thrust: 150000, drag: 2.0, reqAlt: 0 },

            // Structural
            { name: 'Nose Cone', cost: 50, type: 'structure', color: '#ecf0f1', w: 1, h: 1, mass: 2, drag: 0.02, reqAlt: 0 },
            { name: 'Titan Nose', cost: 200, type: 'structure', color: '#e67e22', w: 3, h: 2, mass: 10, drag: 0.1, reqAlt: 0 },
            { name: 'Fin', cost: 25, type: 'structure', color: '#ecf0f1', w: 0.5, h: 1, mass: 1, drag: 0.1, reqAlt: 0 },
            { name: 'Truss', cost: 10, type: 'structure', color: '#95a5a6', w: 1, h: 1, mass: 1, drag: 0.2, reqAlt: 0 },
            { name: 'Leg', cost: 100, type: 'structure', color: '#2c3e50', w: 0.5, h: 1, mass: 5, drag: 0.3, reqAlt: 0 }
        ];

        // Flight Data
        let rocket = {
            pos: { x: 0, y: 0 },
            vel: { x: 0, y: 0 },
            mass: 0,
            fuel: 0,
            maxFuel: 0,
            thrust: 0
        };
        let cameraY = 0;
        let gameLoopId;

        // --- Core Engine ---
        function resize() {
            Canvas.width = window.innerWidth;
            Canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        function switchState(newState) {
            document.querySelectorAll('.screen, #build-screen, #flight-screen').forEach(el => el.style.display = 'none');
            document.querySelectorAll('.screen').forEach(el => el.classList.remove('active'));

            currentState = newState;

            if (newState === STATE.MENU) {
                document.getElementById('start-screen').style.display = 'flex'; // Ensure visibility
                document.getElementById('start-screen').classList.add('active');
            } else if (newState === STATE.BUILD) {
                document.getElementById('build-screen').style.display = 'block';
                updateBuildUI(); // Refresh UI for unlocks
                resetBuildCamera();
            } else if (newState === STATE.FLIGHT) {
                document.getElementById('flight-screen').style.display = 'block';
                startFlight();
            } else if (newState === STATE.RESULTS) {
                document.getElementById('results-screen').style.display = 'flex'; // Ensure visibility
                document.getElementById('results-screen').classList.add('active');
            }
        }

        function gameLoop() {
            update();
            draw();
            gameLoopId = requestAnimationFrame(gameLoop);
        }

        function update() {
            if (currentState === STATE.FLIGHT) {
                updatePhysics();
            }
        }

        function draw() {
            // Clear background
            Ctx.fillStyle = '#0d0d1a'; // Space color
            Ctx.fillRect(0, 0, Canvas.width, Canvas.height);

            // Draw Stars (static for now, could move)
            drawStars();

            if (currentState === STATE.BUILD) {
                drawGrid();
                drawRocket(Canvas.width / 2, Canvas.height - 100); // Fixed position in build
            } else if (currentState === STATE.FLIGHT) {
                drawWorld();
            }
        }

        // --- Visuals ---
        let particles = [];

        function createParticle(x, y, color) {
            particles.push({
                x: x, y: y,
                vx: (Math.random() - 0.5) * 2,
                vy: (Math.random() * 5) + 2, // Downward
                life: 1.0,
                color: color
            });
        }

        function updateParticles() {
            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.life -= 0.05;
                if (p.life <= 0) particles.splice(i, 1);
            }
        }

        function drawStars() {
            Ctx.fillStyle = 'white';
            // Parallax stars
            const hash = (x) => Math.sin(x) * 10000;

            for (let i = 0; i < 100; i++) {
                let x = (Math.abs(hash(i)) * Canvas.width) % Canvas.width;
                let y = (Math.abs(hash(i * 2)) * Canvas.height) % Canvas.height;

                // Parallax shift
                y = (y + cameraY * 0.1) % Canvas.height;

                Ctx.globalAlpha = 0.5 + Math.random() * 0.5;
                Ctx.fillRect(x, y, 2, 2);
                Ctx.globalAlpha = 1.0;
            }
        }

        function updatePhysics() {
            updateParticles(); // Call particle update here

            // Apply Input
            if (inputState.throttle) {
                rocket.throttle = 1.0;
            } else {
                rocket.throttle = 0.0;
            }

            if (rocket.fuel <= 0) {
                rocket.throttle = 0;
                // Auto-end if out of fuel and falling (apex reached)
                if (rocket.vel.y < 0 && rocket.pos.y > 0) {
                    endGame(rocket.pos.y);
                    return; // Stop physics
                }
            }

            const altitude = rocket.pos.y;

            // 1. Gravity
            let g = GRAVITY;

            // 2. Drag
            const airDensity = AIR_DENSITY * Math.exp(-altitude / 10000);
            const vSq = rocket.vel.y * rocket.vel.y;
            const dragDir = rocket.vel.y > 0 ? -1 : 1;
            const area = 2.0;
            const drag = 0.5 * airDensity * vSq * 0.5 * area * dragDir;

            // Horizontal Drag/Physics
            const vX = rocket.vel.x;
            const dragX = -0.5 * airDensity * (vX * Math.abs(vX)) * 2.0;

            // 3. Thrust
            let thrustForce = 0;
            let thrustX = 0;
            if (rocket.fuel > 0) {
                if (rocket.throttle > 0) {
                    thrustForce = rocket.thrustPower * rocket.throttle;
                    const burnRate = (rocket.thrustPower / 200) * 0.1;
                    rocket.fuel -= burnRate;
                }

                // Particles
                rocket.parts.forEach(p => {
                    if (p.type === 'engine') {
                        // Engine Gimbal (Thrust Vectoring)
                        const vectorPower = 0.2; // 20% of thrust can be directed sideways
                        if (inputState.left) {
                            thrustX -= p.thrust * vectorPower;
                        }
                        if (inputState.right) {
                            thrustX += p.thrust * vectorPower;
                        }
                    }
                    if (p.type === 'structure' && (p.name.includes('Fin') || p.name.includes('Wing'))) {
                        // Aerodynamic Control Surfaces
                        // Force depends on velocity squared and air density
                        const vSq = rocket.vel.y * rocket.vel.y + rocket.vel.x * rocket.vel.x;
                        const dynamicPressure = 0.5 * airDensity * vSq;
                        const liftCoeff = 0.5; // Control authority

                        // Limit effectiveness at very high altitudes (vacuum)
                        if (altitude < 30000) {
                            const controlForce = dynamicPressure * liftCoeff;
                            if (inputState.left) thrustX -= controlForce;
                            if (inputState.right) thrustX += controlForce;
                        }
                    }
                    if (p.type === 'rcs') {
                        // RCS Logic
                        // If A pressed -> Move Left (Thrust Right)
                        if (inputState.left) {
                            thrustX -= p.thrust; // Force left
                            rocket.fuel -= 0.1;
                        }
                        if (inputState.right) {
                            thrustX += p.thrust; // Force right
                            rocket.fuel -= 0.1;
                        }
                    }
                });
            }

            const F_net = thrustForce + drag - (rocket.mass * g);
            const acc = F_net / rocket.mass;

            const F_netX = thrustX + dragX;
            const accX = F_netX / rocket.mass;

            const dt = 1 / 60;
            rocket.vel.y += acc * dt;
            rocket.pos.y += rocket.vel.y * dt;

            rocket.vel.x += accX * dt;
            rocket.pos.x += rocket.vel.x * dt;

            // Ground Collision
            if (rocket.pos.y < 0) {
                rocket.pos.y = 0;
                if (rocket.vel.y < -10) {
                    endGame(rocket.pos.y);
                } else {
                    rocket.vel.y = 0;
                    if (rocket.fuel <= 0) endGame(rocket.pos.y);
                }
            }

            // Moon Collision
            const MOON_ALT = 50000;
            if (rocket.pos.y >= MOON_ALT) {
                if (rocket.vel.y > 0 && rocket.vel.y < 50) {
                    alert("YOU REACHED THE MOON!");
                    rocket.vel.y = 0;
                    endGame(MOON_ALT * 2);
                } else if (rocket.vel.y > 50) {
                    endGame(MOON_ALT);
                }
            }

            // Update UI
            document.getElementById('altitude').innerText = Math.floor(rocket.pos.y);
            document.getElementById('velocity').innerText = Math.floor(rocket.vel.y);
            document.getElementById('fuel').innerText = Math.floor((rocket.fuel / rocket.maxFuel) * 100);

            cameraY = rocket.pos.y;
        }

        function drawWorld() {
            const VIEW_SCALE = 2.0;
            const groundScreenY = (Canvas.height - 50) + (cameraY * VIEW_SCALE);

            const alpha = Math.max(0, 1 - (rocket.pos.y / 20000));
            Ctx.fillStyle = `rgba(135, 206, 235, ${alpha})`;
            Ctx.fillRect(0, 0, Canvas.width, Canvas.height);

            Ctx.fillStyle = '#4CAF50';
            Ctx.fillRect(0, groundScreenY, Canvas.width, 1000);

            const moonY = groundScreenY - (50000 * VIEW_SCALE);
            Ctx.fillStyle = '#ddd';
            Ctx.beginPath();
            Ctx.arc(Canvas.width / 2, moonY, 400, 0, Math.PI * 2);
            Ctx.fill();

            Ctx.save();
            const cx = Canvas.width / 2;
            const cy = Canvas.height * 0.7;
            // Add horizontal translation for rocket.pos.x (Scale it?)
            // We want the camera to follow the rocket in X too?
            // Or just let rocket move in view.
            // Let's follow X.
            // Standard: Camera centers on rocket.
            // rocket at (0,0) relative.
            // Background moves -rocket.pos.x

            Ctx.translate(cx, cy); // Camera Center

            // Draw Ground relative to rocket
            Ctx.fillStyle = '#2e7d32';
            const gy = (rocket.pos.y * VIEW_SCALE);
            const gx = -rocket.pos.x * VIEW_SCALE;

            Ctx.fillRect(gx - 2000, gy, 4000, 500);

            // Draw Launch Pad
            Ctx.fillStyle = '#7f8c8d';
            Ctx.fillRect(gx - 100, gy - 20, 200, 20);

            // Draw Moon (Shifted by X too? Moon should be static roughly or parallax)
            // Moon is at x=0 world?
            const moonX = -rocket.pos.x * VIEW_SCALE;
            const my = -(50000 - rocket.pos.y) * VIEW_SCALE;

            Ctx.fillStyle = '#eee';
            Ctx.beginPath();
            Ctx.arc(moonX, my, 200, 0, Math.PI * 2);
            Ctx.fill();

            rocket.parts.forEach(p => {
                const rx = (p.x - 10) * GRID_SIZE;
                const ry = -(p.y) * GRID_SIZE;
                const scale = 0.5;
                const w = p.w * GRID_SIZE * scale;
                const h = p.h * GRID_SIZE * scale;

                // Use shared render logic
                Ctx.save();
                // ry is bottom relative to center. p.h is height.
                // We draw from Top Left.
                // relative Y of bottom is ry. Top is ry - h.
                Ctx.translate(rx * scale, ry * scale - h);

                // Render Visuals
                renderPartVisuals(p, w, h);
                Ctx.restore();

                // Engine flame
                if (p.type === 'engine' && rocket.throttle > 0 && rocket.fuel > 0) {
                    let flameColor = '#f57f17'; // Orange default
                    if (p.name.includes('Ion')) flameColor = '#3498db'; // Blue
                    if (p.name.includes('Nuclear')) flameColor = '#2ecc71'; // Greenish

                    Ctx.fillStyle = flameColor;
                    const flameBaseX = rx * scale + w / 2;
                    const flameBaseY = ry * scale;

                    Ctx.beginPath();
                    // Visually tilt flame if vectoring
                    let tilt = 0;
                    if (inputState.left) tilt = 5;
                    if (inputState.right) tilt = -5;

                    Ctx.moveTo(flameBaseX - 5, flameBaseY);
                    Ctx.lineTo(flameBaseX + tilt, flameBaseY + 20 + Math.random() * 30 * rocket.throttle);
                    Ctx.lineTo(flameBaseX + 5, flameBaseY);
                    Ctx.fill();

                    // Simple particle spawn for Engine
                    if (Math.random() > 0.5) {
                        Ctx.fillStyle = flameColor;
                        Ctx.fillRect(flameBaseX - 2, flameBaseY + 10 + Math.random() * 20, 2, 2);
                    }
                }

                // RCS Visuals
                if (p.type === 'rcs' && rocket.fuel > 0) {
                    const rcsX = rx * scale;
                    const rcsY = ry * scale - h / 2; // Mid height

                    if (inputState.left) {
                        // Thrusting Right (pushing left) -> Flame on Right
                        Ctx.fillStyle = 'white';
                        Ctx.globalAlpha = 0.7;
                        Ctx.beginPath(); Ctx.moveTo(rcsX + w, rcsY); Ctx.lineTo(rcsX + w + 10, rcsY + 5); Ctx.lineTo(rcsX + w, rcsY + 10); Ctx.fill();
                        Ctx.globalAlpha = 1.0;
                    }
                    if (inputState.right) {
                        // Thrusting Left -> Flame on Left
                        Ctx.fillStyle = 'white';
                        Ctx.globalAlpha = 0.7;
                        Ctx.beginPath(); Ctx.moveTo(rcsX, rcsY); Ctx.lineTo(rcsX - 10, rcsY + 5); Ctx.lineTo(rcsX, rcsY + 10); Ctx.fill();
                        Ctx.globalAlpha = 1.0;
                    }
                }
            });

            Ctx.restore();
        }

        function resetBuildCamera() { }

        function startFlight() {
            // validate rocket
            const hasCommand = installedParts.some(p => p.type === 'command');

            // Calculate Stats
            let totalMass = 0;
            let totalFuel = 0;
            let maxThrust = 0;

            installedParts.forEach(p => {
                totalMass += p.mass;
                if (p.fuel) totalFuel += p.fuel;
                if (p.thrust) maxThrust += p.thrust;
            });

            if (totalMass === 0) totalMass = 100;

            rocket = {
                pos: { x: 0, y: 0 },
                vel: { x: 0, y: 0 },
                mass: totalMass,
                fuel: totalFuel,
                maxFuel: totalFuel,
                thrustPower: maxThrust,
                throttle: 0.0, // Start with engine OFF
                parts: JSON.parse(JSON.stringify(installedParts))
            };

            cameraY = 0;
            // Reset input
            inputState.throttle = false;
            inputState.left = false;
            inputState.right = false;
        }

        // --- Input Handling ---
        let inputState = { throttle: false, left: false, right: false };

        window.addEventListener('keydown', (e) => {
            const k = e.key.toLowerCase();
            if (k === 'e') inputState.throttle = true;
            if (k === 'a' || k === 'arrowleft') inputState.left = true;
            if (k === 'd' || k === 'arrowright') inputState.right = true;

            // Dev Menu (Ctrl + Shift)
            if (e.ctrlKey && e.shiftKey) {
                toggleDev();
            }
        });

        window.addEventListener('keyup', (e) => {
            const k = e.key.toLowerCase();
            if (k === 'e') inputState.throttle = false;
            if (k === 'a' || k === 'arrowleft') inputState.left = false;
            if (k === 'd' || k === 'arrowright') inputState.right = false;
        });

        // --- Cheats ---
        function toggleDev() {
            const menu = document.getElementById('dev-menu');
            menu.style.display = menu.style.display === 'flex' ? 'none' : 'flex';
        }

        function cheatMoney() {
            money += 10000;
            updateMoneyDisplay();
        }

        function cheatFuel() {
            if (rocket) {
                rocket.fuel = rocket.maxFuel;
            }
        }

        function cheatMoon() {
            if (rocket) {
                rocket.pos.y = 49000;
                rocket.vel.y = 100;
            }
        }

        function endGame(altitude) {
            if (altitude > maxAltitudeReached) {
                maxAltitudeReached = altitude;
            }
            document.getElementById('max-alt').innerText = Math.floor(altitude);
            // $100 per 100m = $1 per 1m
            const earned = Math.floor(altitude);
            money += earned;
            document.getElementById('earnings').innerText = earned;
            document.getElementById('money-display').innerText = money;
            switchState(STATE.RESULTS);
        }

        // --- Building System ---

        // Part Definitions and State
        // (installedParts moved to top: line 247)
        let isDragging = false;
        let dragOffset = { x: 0, y: 0 };
        let dragPart = null;
        let isNewPart = false;
        let isDeleteMode = false;

        // Grid Settings
        const GRID_X_CENTER = 10;
        // Initial Money
        money = 300;
        const GRID_Y_BOTTOM = 18;

        // Convert Grid to Pixel
        function gridToPixel(gx, gy) {
            const centerX = Canvas.width / 2;
            const bottomY = Canvas.height - 150;

            return {
                x: centerX + (gx - GRID_X_CENTER) * GRID_SIZE,
                y: bottomY - (GRID_Y_BOTTOM - gy) * GRID_SIZE
            };
        }

        // Convert Pixel to Grid
        function pixelToGrid(px, py) {
            const centerX = Canvas.width / 2;
            const bottomY = Canvas.height - 150;

            return {
                x: Math.floor((px - centerX) / GRID_SIZE) + GRID_X_CENTER,
                // Y increases UP. Mouse Y increases DOWN.
                // bottomY is Y=0.
                // So (bottomY - py) gives positive distance up.
                y: Math.floor((bottomY - py) / GRID_SIZE)
            };
        }

        function spawnPart(partType) {
            if (money < partType.cost) {
                alert("Not enough money! Need $" + partType.cost);
                return;
            }

            money -= partType.cost;
            updateMoneyDisplay();

            dragPart = { ...partType, x: 0, y: 0, id: Date.now() };
            isDragging = true;
            isNewPart = true;
        }

        function updateMoneyDisplay() {
            document.getElementById('money-display').innerText = money;
            document.getElementById('money-display').style.color = 'lightgreen';
        }


        function spawnPart(partTemplate) {
            if (currentState !== STATE.BUILD) return;
            isDragging = true;
            isNewPart = true;
            dragPart = {
                ...partTemplate,
                x: 0,
                y: 0,
                id: Date.now()
            };
            // Initial position based on mouse? Or center.
            // We'll update in mousemove.
        }

        Canvas.addEventListener('mousedown', (e) => {
            if (currentState !== STATE.BUILD) return;

            const rect = Canvas.getBoundingClientRect();
            const mx = e.clientX - rect.left;
            const my = e.clientY - rect.top;

            // Convert to Grid Coords
            // Center X is Canvas.width/2
            // Bottom Y is Canvas.height - 150
            const cx = Canvas.width / 2;
            const by = Canvas.height - 150;

            const gridX = Math.floor((mx - cx) / GRID_SIZE) + GRID_X_CENTER;
            const gridY = Math.floor((by - my) / GRID_SIZE);

            // Check if clicking existing part
            // Search in reverse to pick top item
            for (let i = installedParts.length - 1; i >= 0; i--) {
                const p = installedParts[i];
                if (gridX >= p.x && gridX < p.x + p.w &&
                    gridY >= p.y && gridY < p.y + p.h) {

                    if (isDeleteMode) {
                        installedParts.splice(i, 1);
                        return;
                    }

                    // Start Dragging Existing
                    isDragging = true;
                    isNewPart = false;
                    dragPart = p;
                    dragOffset.x = gridX - p.x;
                    dragOffset.y = gridY - p.y;

                    // Remove from list while dragging
                    installedParts.splice(i, 1);
                    return;
                }
            }
        });

        Canvas.addEventListener('mousemove', (e) => {
            if (currentState !== STATE.BUILD) return;

            const rect = Canvas.getBoundingClientRect();
            const mx = e.clientX - rect.left;
            const my = e.clientY - rect.top;

            // Update Drag Part
            if (isDragging && dragPart) {
                const cx = Canvas.width / 2;
                const by = Canvas.height - 150;

                const gridX = Math.floor((mx - cx) / GRID_SIZE) + GRID_X_CENTER;
                const gridY = Math.floor((by - my) / GRID_SIZE);

                // Snap
                dragPart.x = gridX - (isNewPart ? Math.floor(dragPart.w / 2) : dragOffset.x);
                dragPart.y = gridY - (isNewPart ? Math.floor(dragPart.h / 2) : dragOffset.y);
            }
        });

        Canvas.addEventListener('mouseup', (e) => {
            if (currentState !== STATE.BUILD) return;

            if (isDragging && dragPart) {
                // Drop
                // Check bounds/validity?
                // For now, just place.
                // If y < 0 (below ground), delete?
                if (dragPart.y < 0) {
                    // Sold / Deleted
                } else {
                    // Check overlap?
                    let overlap = false;
                    for (const p of installedParts) {
                        if (rectsOverlap(dragPart, p)) overlap = true;
                    }

                    if (!overlap) {
                        installedParts.push(dragPart);
                    }
                }

                dragPart = null;
                isDragging = false;
            }
        });

        function rectsOverlap(r1, r2) {
            return r1.x < r2.x + r2.w &&
                r1.x + r1.w > r2.x &&
                r1.y < r2.y + r2.h &&
                r1.y + r1.h > r2.y;
        }

        function drawGrid() {
            Ctx.strokeStyle = 'rgba(255, 255, 255, 0.1)';
            Ctx.lineWidth = 1;

            const centerX = Canvas.width / 2;
            const bottomY = Canvas.height - 150;

            Ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
            Ctx.font = '20px Arial';
            Ctx.fillText("Drag parts here to build", centerX - 100, bottomY - 300);
            Ctx.fillText("Drop outside to sell", centerX - 80, bottomY + 40);

            for (let i = -10; i <= 10; i++) {
                const x = centerX + i * GRID_SIZE;
                Ctx.beginPath();
                Ctx.moveTo(x, 0);
                Ctx.lineTo(x, Canvas.height);
                Ctx.stroke();
            }

            for (let i = 0; i <= 20; i++) {
                const y = bottomY - i * GRID_SIZE;
                Ctx.beginPath();
                Ctx.moveTo(0, y);
                Ctx.lineTo(Canvas.width, y);
                Ctx.stroke();
            }
        }

        function drawRocket(px, py) {
            installedParts.forEach(p => drawPart(p));

            if (isDragging && dragPart) {
                Ctx.globalAlpha = 0.5;
                drawPart(dragPart);
                Ctx.globalAlpha = 1.0;
            }
        }

        function drawPart(p) {
            const cx = Canvas.width / 2;
            const by = Canvas.height - 150;

            // Coordinates for drawing
            // ScreenX left, ScreenY Top

            // NOTE: This drawing function is used for BOTH build UI (screen space) 
            // and Flight (transformed space).
            // BUT: In Flight, we call it with a scale? No, we used fillRect manual logic in drawWorld.
            // Wait, we need to update drawWorld's rendering logic too if we want "realistic" models in flight!
            // Actually, let's unify. drawWorld currently copies logic. Ideally we call drawPart with a transform.
            // But flight uses "GRID_SIZE * scale". 

            // Let's UPDATE drawWorld to call this function?
            // Or just update this function to handle `drawWorld` case?
            // The `drawWorld` loop manually draws rects.
            // Let's Stick to updating this function for BUILD mode first,
            // And then copy/refactor drawWorld to match.

            // Actually, the user wants realistic models EVERYWHERE.
            // So I should refactor drawWorld to use a shared render function.
            // For now, I'll implement the "Realistic" drawing HERE, and then update drawWorld to use this style manually or calling a helper.

            const x = cx + (p.x - GRID_X_CENTER) * GRID_SIZE;
            const pixelBottom = by - (p.y * GRID_SIZE);
            const w = p.w * GRID_SIZE;
            const h = p.h * GRID_SIZE;
            const screenX = x;
            const screenY = pixelBottom - h;

            Ctx.save();
            Ctx.translate(screenX, screenY);

            // Draw Part based on type
            renderPartVisuals(p, w, h);

            // Selection / Drag Highlight
            Ctx.lineWidth = 2;
            Ctx.strokeStyle = 'rgba(255,255,255,0.5)';
            Ctx.strokeRect(0, 0, w, h);

            // Label
            Ctx.fillStyle = 'white';
            Ctx.font = '10px Arial';
            Ctx.fillText(p.name, 5, 12);

            Ctx.restore();
        }

        function renderPartVisuals(p, w, h) {
            const cx = w / 2;
            const cy = h / 2;

            // Helper: Metallic Gradient
            const metallic = (ctx, x, y, w, h, baseColor) => {
                const g = ctx.createLinearGradient(x, y, x + w, y);
                g.addColorStop(0, adjustColor(baseColor, -30));
                g.addColorStop(0.2, adjustColor(baseColor, 10));
                g.addColorStop(0.5, adjustColor(baseColor, -10));
                g.addColorStop(0.8, adjustColor(baseColor, 10));
                g.addColorStop(1, adjustColor(baseColor, -30));
                return g;
            };

            // Helper: Draw Rivets
            const rivets = (ctx, x, y, w, h, rows, cols) => {
                ctx.fillStyle = 'rgba(0,0,0,0.3)';
                for (let i = 0; i <= rows; i++) {
                    for (let j = 0; j <= cols; j++) {
                        ctx.beginPath();
                        ctx.arc(x + (w / cols) * j, y + (h / rows) * i, 1.5, 0, Math.PI * 2);
                        ctx.fill();
                    }
                }
            };

            if (p.type === 'command') {
                if (p.name.includes('Probe')) {
                    // Small probe core
                    Ctx.fillStyle = metallic(Ctx, 0, 0, w, h, '#f1c40f');
                    Ctx.beginPath();
                    Ctx.arc(w / 2, h / 2, Math.min(w, h) / 2, 0, Math.PI * 2);
                    Ctx.fill();
                    Ctx.strokeStyle = 'rgba(0,0,0,0.2)';
                    Ctx.stroke();
                    Ctx.fillStyle = '#2c3e50';
                    Ctx.fillRect(w * 0.4, h * 0.2, w * 0.2, h * 0.6); // Antenna base
                } else if (p.name.includes('Lander')) {
                    // Lander Can - wider, shorter
                    Ctx.fillStyle = metallic(Ctx, 0, 0, w, h, '#ecf0f1');
                    Ctx.fillRect(0, h * 0.2, w, h * 0.8);
                    Ctx.beginPath();
                    Ctx.arc(w / 2, h * 0.2, w / 2, Math.PI, 0, false);
                    Ctx.fill();
                    Ctx.strokeStyle = 'rgba(0,0,0,0.2)';
                    Ctx.stroke();
                    // Window
                    Ctx.fillStyle = '#3498db';
                    Ctx.beginPath(); Ctx.arc(w * 0.3, h * 0.5, w * 0.1, 0, Math.PI * 2); Ctx.fill();
                    Ctx.beginPath(); Ctx.arc(w * 0.7, h * 0.5, w * 0.1, 0, Math.PI * 2); Ctx.fill();
                } else {
                    // High-tech Capsule (default command)
                    // Body
                    const g = Ctx.createLinearGradient(0, 0, w, 0);
                    g.addColorStop(0, '#bdc3c7');
                    g.addColorStop(0.5, '#ecf0f1');
                    g.addColorStop(1, '#bdc3c7');
                    Ctx.fillStyle = g;

                    Ctx.beginPath();
                    Ctx.moveTo(0, h);
                    Ctx.lineTo(w, h); // Bottom
                    Ctx.lineTo(w, h * 0.3); // Side vertical
                    Ctx.quadraticCurveTo(w, 0, w / 2, 0); // Smooth top dome
                    Ctx.quadraticCurveTo(0, 0, 0, h * 0.3);
                    Ctx.closePath();
                    Ctx.fill();

                    // Shading/Stroke
                    Ctx.strokeStyle = 'rgba(0,0,0,0.2)';
                    Ctx.lineWidth = 1;
                    Ctx.stroke();

                    // Window (Reflective)
                    Ctx.save();
                    Ctx.beginPath();
                    Ctx.arc(w / 2, h * 0.4, w * 0.15, 0, Math.PI * 2);
                    Ctx.clip();
                    // Glass gradient
                    const glass = Ctx.createLinearGradient(w / 2 - w * 0.15, h * 0.4 - w * 0.15, w / 2 + w * 0.15, h * 0.4 + w * 0.15);
                    glass.addColorStop(0, '#2980b9');
                    glass.addColorStop(1, '#1abc9c');
                    Ctx.fillStyle = glass;
                    Ctx.fill();
                    // Specular highlight
                    Ctx.fillStyle = 'rgba(255,255,255,0.8)';
                    Ctx.beginPath(); Ctx.arc(w / 2 - w * 0.05, h * 0.4 - w * 0.05, w * 0.03, 0, Math.PI * 2); Ctx.fill();
                    Ctx.restore();

                    // Hatch
                    Ctx.strokeStyle = 'rgba(0,0,0,0.4)';
                    Ctx.strokeRect(w * 0.4, h * 0.6, w * 0.2, h * 0.25);
                    rivets(Ctx, w * 0.38, h * 0.58, w * 0.24, h * 0.29, 2, 2);
                }
            } else if (p.type === 'fuel') {
                // Determine style based on name
                let baseColor = '#bdc3c7'; // Default
                let style = 'standard';

                if (p.name.includes('Titan')) { baseColor = '#e67e22'; style = 'insulation'; } // SLS Orange
                else if (p.name.includes('Behemoth')) { baseColor = '#7f8c8d'; style = 'industrial'; }
                else if (p.name.includes('Galaxy')) { baseColor = '#2c3e50'; style = 'scifi'; }

                // Main cylinder
                Ctx.fillStyle = metallic(Ctx, 0, 0, w, h, baseColor);
                Ctx.fillRect(0, 0, w, h);

                // Texture/Detail
                if (style === 'insulation') {
                    // Foam texture (noise-ish)
                    Ctx.fillStyle = 'rgba(255,255,255,0.05)';
                    for (let i = 0; i < 20; i++) Ctx.fillRect(Math.random() * w, Math.random() * h, 2, 2);
                    // Ribs
                    Ctx.strokeStyle = 'rgba(0,0,0,0.1)';
                    for (let i = 0; i < 10; i++) {
                        Ctx.beginPath(); Ctx.moveTo(0, h * (i / 10)); Ctx.lineTo(w, h * (i / 10)); Ctx.stroke();
                    }
                } else if (style === 'industrial') {
                    // Hazard stripes
                    Ctx.fillStyle = 'rgba(241, 196, 15, 0.2)';
                    Ctx.beginPath(); Ctx.moveTo(0, 0); Ctx.lineTo(w * 0.2, 0); Ctx.lineTo(0, h * 0.2); Ctx.fill();

                    // Heavy riveting
                    rivets(Ctx, 2, 2, w - 4, h - 4, 4, 2);
                } else if (style === 'scifi') {
                    // Hex pattern overlay
                    Ctx.strokeStyle = '#3498db';
                    Ctx.lineWidth = 1;
                    Ctx.globalAlpha = 0.3;
                    Ctx.beginPath();
                    Ctx.moveTo(0, 0); Ctx.lineTo(w, h);
                    Ctx.moveTo(w, 0); Ctx.lineTo(0, h);
                    Ctx.stroke();
                    Ctx.globalAlpha = 1;
                } else {
                    // Standard Tank
                    rivets(Ctx, 0, 0, w, h, 3, 2);
                    Ctx.fillStyle = '#2c3e50';
                    Ctx.fillRect(w * 0.45, 0, w * 0.1, h); // Vertical pipe
                }

                // Top/Bottom Caps illusion
                Ctx.fillStyle = 'rgba(0,0,0,0.1)';
                Ctx.fillRect(0, 0, w, h * 0.05);
                Ctx.fillRect(0, h * 0.95, w, h * 0.05);

            } else if (p.type === 'engine') {
                // Turbopump machinery
                Ctx.fillStyle = '#34495e';
                Ctx.fillRect(w * 0.1, 0, w * 0.8, h * 0.4);
                // Pipes
                Ctx.strokeStyle = '#95a5a6';
                Ctx.lineWidth = 2;
                Ctx.beginPath(); Ctx.moveTo(w * 0.2, 0); Ctx.bezierCurveTo(w * 0.2, h * 0.2, w * 0.1, h * 0.2, w * 0.1, h * 0.4); Ctx.stroke();
                Ctx.beginPath(); Ctx.moveTo(w * 0.8, 0); Ctx.bezierCurveTo(w * 0.8, h * 0.2, w * 0.9, h * 0.2, w * 0.9, h * 0.4); Ctx.stroke();

                // Nozzle (Complex bell shape)
                const nozzleG = Ctx.createLinearGradient(0, h * 0.4, 0, h);
                nozzleG.addColorStop(0, '#2c3e50'); // Dark metal throat
                nozzleG.addColorStop(0.5, '#5d4037'); // Heat discolored
                nozzleG.addColorStop(1, '#d35400'); // Hot glowing tip
                Ctx.fillStyle = nozzleG;

                Ctx.beginPath();
                Ctx.moveTo(w * 0.25, h * 0.4); // Throat L
                Ctx.quadraticCurveTo(w * 0.1, h * 0.7, 0, h); // Bell L
                Ctx.lineTo(w, h); // Bottom rim
                Ctx.quadraticCurveTo(w * 0.9, h * 0.7, w * 0.75, h * 0.4); // Bell R
                Ctx.closePath();
                Ctx.fill();

                // Inner glow
                const glow = Ctx.createRadialGradient(w / 2, h, 0, w / 2, h, w * 0.5);
                glow.addColorStop(0, 'rgba(243, 156, 18, 0.4)');
                glow.addColorStop(1, 'rgba(0,0,0,0)');
                Ctx.fillStyle = glow;
                Ctx.fill();

            } else if (p.type === 'rcs') {
                // Metal Box
                Ctx.fillStyle = metallic(Ctx, w * 0.1, h * 0.1, w * 0.8, h * 0.8, '#95a5a6');
                Ctx.fillRect(w * 0.1, h * 0.1, w * 0.8, h * 0.8);
                Ctx.strokeStyle = '#7f8c8d';
                Ctx.strokeRect(w * 0.1, h * 0.1, w * 0.8, h * 0.8);

                // Black thruster cones
                Ctx.fillStyle = '#2c3e50';
                // Left
                Ctx.beginPath(); Ctx.moveTo(w * 0.1, h * 0.5); Ctx.lineTo(0, h * 0.3); Ctx.lineTo(0, h * 0.7); Ctx.fill();
                // Right
                Ctx.beginPath(); Ctx.moveTo(w * 0.9, h * 0.5); Ctx.lineTo(w, h * 0.3); Ctx.lineTo(w, h * 0.7); Ctx.fill();

                // Detail dot
                Ctx.fillStyle = 'red';
                Ctx.beginPath(); Ctx.arc(w / 2, h / 2, 2, 0, Math.PI * 2); Ctx.fill();

            } else if (p.type === 'structure') {
                if (p.name.includes('Nose')) {
                    // Triangle
                    Ctx.fillStyle = p.color;
                    Ctx.beginPath(); Ctx.moveTo(0, h); Ctx.lineTo(w, h); Ctx.lineTo(w / 2, 0); Ctx.fill();
                    // Highlight
                    Ctx.fillStyle = 'rgba(255,255,255,0.2)';
                    Ctx.beginPath(); Ctx.moveTo(w / 2, h); Ctx.lineTo(w, h); Ctx.lineTo(w / 2, 0); Ctx.fill();
                } else if (p.name.includes('Fin')) {
                    // Fin shape
                    Ctx.fillStyle = p.color;
                    Ctx.beginPath(); Ctx.moveTo(0, 0); Ctx.lineTo(w, h); Ctx.lineTo(0, h); Ctx.fill();
                } else if (p.name.includes('Truss')) {
                    // Truss lattice
                    Ctx.strokeStyle = '#7f8c8d';
                    Ctx.lineWidth = 2;
                    Ctx.strokeRect(0, 0, w, h);
                    Ctx.beginPath(); Ctx.moveTo(0, 0); Ctx.lineTo(w, h); Ctx.moveTo(w, 0); Ctx.lineTo(0, h); Ctx.stroke();
                } else if (p.name.includes('Leg')) {
                    // Leg visual
                    Ctx.fillStyle = '#2c3e50';
                    Ctx.fillRect(w * 0.3, 0, w * 0.4, h * 0.8);
                    Ctx.fillStyle = '#95a5a6';
                    Ctx.fillRect(0, h * 0.8, w, h * 0.2); // Foot
                }
            } else {
                Ctx.fillStyle = p.color;
                Ctx.fillRect(0, 0, w, h);
            }
        }

        // Color helper
        function adjustColor(col, amt) {
            let usePound = false;
            if (col[0] == "#") { col = col.slice(1); usePound = true; }
            let num = parseInt(col, 16);
            let r = (num >> 16) + amt;
            if (r > 255) r = 255; else if (r < 0) r = 0;
            let b = ((num >> 8) & 0x00FF) + amt;
            if (b > 255) b = 255; else if (b < 0) b = 0;
            let g = (num & 0x0000FF) + amt;
            if (g > 255) g = 255; else if (g < 0) g = 0;
            const hex = (g | (b << 8) | (r << 16)).toString(16).padStart(6, '0');
            return (usePound ? "#" : "") + hex;
        }

        function updateBuildUI() {
            const buildUI = document.getElementById('build-ui');
            buildUI.innerHTML = ''; // Clear existing

            availableParts.forEach(part => {
                const btn = document.createElement('div');
                btn.classList.add('part-btn');
                btn.style.borderColor = part.color;

                const isLocked = maxAltitudeReached < part.reqAlt;

                if (isLocked) {
                    btn.style.opacity = '0.5';
                    btn.style.cursor = 'not-allowed';
                    btn.innerHTML = `<span style="font-size:10px;">Reach</span>${part.reqAlt}m`;
                    btn.onclick = () => alert(`Reach ${part.reqAlt}m altitude to unlock this part!`);
                } else {
                    btn.innerHTML = `<span style="background:${part.color}; width:20px; height:20px; display:block; margin-bottom:5px;"></span>${part.name}<br>$${part.cost}`;
                    btn.onclick = () => spawnPart(part);
                }
                buildUI.appendChild(btn);
            });

            // Delete Mode Button
            const delBtn = document.createElement('div');
            delBtn.classList.add('part-btn');
            delBtn.style.borderColor = isDeleteMode ? '#e74c3c' : 'white';
            delBtn.style.background = isDeleteMode ? '#c0392b' : 'transparent';
            delBtn.innerHTML = `<span style="font-size:20px;">🗑️</span>${isDeleteMode ? 'ON' : 'DEL'}`;
            delBtn.onclick = () => {
                isDeleteMode = !isDeleteMode;
                updateBuildUI();
            };
            buildUI.appendChild(delBtn);

            updateMoneyDisplay();
        }

        function setupUI() {
            document.getElementById('start-btn').onclick = () => switchState(STATE.BUILD);
            document.getElementById('launch-btn').onclick = () => switchState(STATE.FLIGHT);
            // Abort now triggers endGame with current altitude (Cash Out)
            document.getElementById('abort-btn').onclick = () => endGame(rocket.pos.y);
            document.getElementById('return-btn').onclick = () => switchState(STATE.BUILD);
            updateBuildUI();
        }

        function init() {
            setupUI();
            gameLoop();
        }

        // Init
        init();

    </script>
