<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Fruit Catcher – The Pizza Edition</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        body {
            background: #0a1a0a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Courier New', monospace;
            color: #fff
        }

        h1 {
            color: #4ade80;
            font-size: 2rem;
            margin-bottom: 8px;
            text-shadow: 0 0 20px #4ade80
        }

        canvas {
            border: 2px solid #4ade80;
            box-shadow: 0 0 30px rgba(74, 222, 128, 0.4)
        }

        #hud {
            margin-top: 10px;
            color: #4ade80
        }

        #ctrl {
            margin-top: 6px;
            color: #555;
            font-size: .8rem
        }
    </style>
</head>

<body>
    <h1>🍓 Fruit Catcher</h1>
    <canvas id="c" width="550" height="500"></canvas>
    <div id="hud">Score: <span id="sc">0</span> &nbsp; Lives: <span id="li">5</span> &nbsp; Level: <span
            id="lv">1</span></div>
    <div id="ctrl">Mouse / Arrow Keys to move basket | Catch fruit, avoid bombs! | R: restart</div>
    <script>
        const canvas = document.getElementById('c'), ctx = canvas.getContext('2d');
        const W = 550, H = 500;
        const FRUITS = ['🍎', '🍊', '🍋', '🍇', '🍓', '🍑', '🥝', '🍒'];
        let basket, items, score, lives, level, over, frame = 0, spawnRate;
        function init() {
            basket = { x: W / 2 - 40, y: H - 50, w: 80, h: 20 };
            items = []; score = 0; lives = 5; level = 1; over = false; spawnRate = 80;
            document.getElementById('sc').textContent = 0; document.getElementById('li').textContent = 5; document.getElementById('lv').textContent = 1;
        }
        canvas.addEventListener('mousemove', e => { const r = canvas.getBoundingClientRect(); basket.x = e.clientX - r.left - basket.w / 2; });
        document.addEventListener('keydown', e => { if (e.key === 'ArrowLeft') basket.x -= 20; if (e.key === 'ArrowRight') basket.x += 20; if (e.key === 'r' || e.key === 'R') init(); e.preventDefault(); });
        function spawnItem() {
            const bomb = Math.random() < 0.15 + level * 0.02;
            items.push({ x: Math.random() * (W - 30) + 15, y: -30, vy: 2 + Math.random() * level * 0.5, emoji: bomb ? '💣' : FRUITS[Math.floor(Math.random() * FRUITS.length)], bomb, size: 32 + Math.random() * 10 });
        }
        function update() {
            if (over) return;
            frame++; basket.x = Math.max(0, Math.min(W - basket.w, basket.x));
            if (frame % Math.max(25, spawnRate - level * 5) === 0) spawnItem();
            items = items.filter(it => {
                it.y += it.vy;
                if (it.y > H - it.size / 2 && it.x > basket.x && it.x < basket.x + basket.w) {
                    if (it.bomb) { lives -= 2; document.getElementById('li').textContent = Math.max(0, lives); if (lives <= 0) over = true; }
                    else { score += 10 * level; document.getElementById('sc').textContent = score; level = Math.floor(score / 200) + 1; document.getElementById('lv').textContent = level; }
                    return false;
                }
                if (it.y > H + 30) { if (!it.bomb) { lives--; document.getElementById('li').textContent = Math.max(0, lives); if (lives <= 0) over = true; } return false; }
                return true;
            });
        }
        function draw() {
            ctx.fillStyle = '#0a1a0a'; ctx.fillRect(0, 0, W, H);
            // sky gradient
            const grad = ctx.createLinearGradient(0, 0, 0, H); grad.addColorStop(0, '#0f172a'); grad.addColorStop(1, '#0a1a0a'); ctx.fillStyle = grad; ctx.fillRect(0, 0, W, H);
            items.forEach(it => { ctx.font = `${it.size}px sans-serif`; ctx.textAlign = 'center'; ctx.fillText(it.emoji, it.x, it.y); });
            // basket
            ctx.fillStyle = '#92400e'; ctx.beginPath(); ctx.roundRect(basket.x, basket.y, basket.w, basket.h, 4); ctx.fill();
            ctx.fillStyle = '#b45309'; ctx.fillRect(basket.x + 4, basket.y - 6, basket.w - 8, 8);
            if (over) { ctx.fillStyle = 'rgba(0,0,0,0.7)'; ctx.fillRect(0, 0, W, H); ctx.fillStyle = '#ef4444'; ctx.font = 'bold 32px monospace'; ctx.textAlign = 'center'; ctx.fillText('GAME OVER', W / 2, H / 2 - 20); ctx.font = '20px monospace'; ctx.fillStyle = '#fbbf24'; ctx.fillText(`Score: ${score} | Press R`, W / 2, H / 2 + 25); }
        }
        function loop() { update(); draw(); requestAnimationFrame(loop); }
        init(); loop();
    </script>
</body>

</html>
