<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Wordle Clone – The Pizza Edition</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;800&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        body {
            background: #0f172a;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Outfit', sans-serif;
            color: #fff;
            padding: 20px
        }

        h1 {
            font-size: 2.5rem;
            color: #4ade80;
            text-shadow: 0 0 20px rgba(74, 222, 128, 0.4);
            margin-bottom: 16px
        }

        #board {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: 20px
        }

        .row {
            display: flex;
            gap: 6px
        }

        .tile {
            width: 58px;
            height: 58px;
            border: 2px solid #334155;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: 800;
            border-radius: 8px;
            transition: all .3s;
            text-transform: uppercase
        }

        .tile.filled {
            border-color: #64748b;
            animation: pop .08s ease
        }

        .tile.correct {
            background: #166534;
            border-color: #22c55e;
            color: #4ade80
        }

        .tile.present {
            background: #92400e;
            border-color: #f59e0b;
            color: #fbbf24
        }

        .tile.absent {
            background: #1e293b;
            border-color: #334155;
            color: #64748b
        }

        @keyframes pop {
            0% {
                transform: scale(1.12)
            }

            100% {
                transform: scale(1)
            }
        }

        #keyboard {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px
        }

        .key-row {
            display: flex;
            gap: 5px
        }

        .key {
            padding: 12px 8px;
            min-width: 36px;
            border: none;
            border-radius: 6px;
            background: #334155;
            color: #fff;
            font-family: inherit;
            font-size: .85rem;
            font-weight: 700;
            cursor: pointer;
            transition: all .15s
        }

        .key:hover {
            background: #475569
        }

        .key.wide {
            min-width: 56px;
            font-size: .75rem
        }

        .key.correct {
            background: #166534
        }

        .key.present {
            background: #92400e
        }

        .key.absent {
            background: #1e293b;
            color: #475569
        }

        #msg {
            height: 32px;
            color: #facc15;
            font-size: 1.1rem;
            font-weight: 700;
            text-align: center;
            margin: 8px 0
        }

        #new-game {
            padding: 10px 24px;
            background: linear-gradient(135deg, #059669, #047857);
            border: none;
            color: #fff;
            border-radius: 10px;
            cursor: pointer;
            font-family: inherit;
            font-size: 1rem;
            font-weight: 700;
            margin-top: 8px;
            transition: all .2s
        }

        #new-game:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(5, 150, 105, 0.4)
        }
    </style>
</head>

<body>
    <h1>🟩 Wordle</h1>
    <div id="board"></div>
    <div id="msg"></div>
    <div id="keyboard"></div>
    <button id="new-game" onclick="init()">New Game</button>
    <script>
        const WORDS = ['brave', 'chunk', 'flame', 'glyph', 'jumbo', 'knack', 'plaza', 'queen', 'slack', 'thyme', 'plumb', 'crisp', 'blaze', 'groan', 'flair', 'showy', 'quirk', 'dwarf', 'fixed', 'jazzy', 'boxer', 'cleft', 'grime', 'hutch', 'proxy', 'vinyl', 'snowy', 'epoch', 'flint', 'bliss', 'blunt', 'clang', 'digit', 'favor', 'grind', 'hazel', 'infer', 'jazzy', 'karma', 'kneel', 'light', 'mango', 'nerve', 'olive', 'paint', 'quest', 'radar', 'shear', 'tiara', 'uncle', 'vapor'];
        const KEYBOARD = [['q', 'w', 'e', 'r', 't', 'y', 'u', 'i', 'o', 'p'], ['a', 's', 'd', 'f', 'g', 'h', 'j', 'k', 'l'], ['ENTER', 'z', 'x', 'c', 'v', 'b', 'n', 'm', '⌫']];
        let secret, guesses, current, over;
        function init() {
            secret = WORDS[Math.floor(Math.random() * WORDS.length)];
            guesses = []; current = ''; over = false;
            document.getElementById('msg').textContent = '';
            renderBoard(); renderKeyboard();
        }
        function renderBoard() {
            const board = document.getElementById('board'); board.innerHTML = '';
            for (let r = 0; r < 6; r++) {
                const row = document.createElement('div'); row.className = 'row';
                const guess = guesses[r] || '';
                const isActive = r === guesses.length && !over;
                for (let c = 0; c < 5; c++) {
                    const tile = document.createElement('div'); tile.className = 'tile';
                    const letter = isActive ? current[c] : guess[c];
                    tile.textContent = letter || '';
                    if (!isActive && guess[c]) {
                        if (secret[c] === guess[c]) tile.classList.add('correct');
                        else if (secret.includes(guess[c])) tile.classList.add('present');
                        else tile.classList.add('absent');
                    } else if (letter) tile.classList.add('filled');
                    row.appendChild(tile);
                }
                board.appendChild(row);
            }
        }
        function renderKeyboard() {
            const kb = document.getElementById('keyboard'); kb.innerHTML = '';
            KEYBOARD.forEach(row => {
                const div = document.createElement('div'); div.className = 'key-row';
                row.forEach(k => {
                    const btn = document.createElement('button'); btn.className = 'key'; if (k.length > 1) btn.classList.add('wide'); btn.textContent = k; btn.dataset.key = k;
                    const allGuessed = guesses.map(g => [...g]).flat();
                    const li = k.toLowerCase();
                    if (guesses.some((g, gi) => g.includes(li) && secret.includes(li))) {
                        if (guesses.some((g, gi) => [...g].some((c, ci) => c === li && secret[ci] === li))) btn.classList.add('correct');
                        else btn.classList.add('present');
                    } else if (allGuessed.includes(li)) btn.classList.add('absent');
                    btn.onclick = () => handleKey(k); div.appendChild(btn);
                });
                kb.appendChild(div);
            });
        }
        function handleKey(k) {
            if (over) return;
            if (k === '⌫' || k === 'Backspace') { current = current.slice(0, -1); }
            else if (k === 'ENTER' || k === 'Enter') {
                if (current.length < 5) { document.getElementById('msg').textContent = 'Need 5 letters!'; return; }
                if (!WORDS.includes(current) && !WORDS.includes(current)) {/* allow any 5-letter attempt */ }
                guesses.push(current); current = '';
                const won = guesses[guesses.length - 1] === secret;
                if (won) { over = true; document.getElementById('msg').textContent = '🎉 Brilliant!'; }
                else if (guesses.length === 6) { over = true; document.getElementById('msg').textContent = `The word was: ${secret.toUpperCase()}`; }
                else document.getElementById('msg').textContent = '';
            } else if (k.length === 1 && /[a-z]/i.test(k) && current.length < 5) { current += k.toLowerCase(); }
            renderBoard(); renderKeyboard();
        }
        document.addEventListener('keydown', e => { if (e.ctrlKey || e.altKey || e.metaKey) return; handleKey(e.key); e.preventDefault(); });
        init();
    </script>
</body>

</html>
