<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Color Rush – The Pizza Edition</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        body {
            background: #0f172a;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Outfit', sans-serif;
            color: #fff
        }

        h1 {
            color: #f472b6;
            font-size: 2.5rem;
            margin-bottom: 12px;
            text-shadow: 0 0 20px rgba(244, 114, 182, 0.5)
        }

        .card {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(244, 114, 182, 0.2);
            border-radius: 24px;
            padding: 36px;
            text-align: center;
            width: min(450px, 95vw)
        }

        #word-display {
            font-size: 3.5rem;
            font-weight: 800;
            margin: 24px 0;
            min-height: 80px;
            text-shadow: 0 0 20px currentColor;
            animation: appear .2s ease
        }

        .buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin: 20px 0
        }

        .col-btn {
            padding: 18px;
            border: none;
            border-radius: 14px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all .15s;
            font-family: inherit;
            opacity: 0.9
        }

        .col-btn:hover {
            transform: scale(1.05);
            opacity: 1
        }

        .col-btn:active {
            transform: scale(0.97)
        }

        #score-bar {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px
        }

        #timer-bar {
            height: 8px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 4px;
            margin-bottom: 16px
        }

        .timer-fill {
            height: 100%;
            border-radius: 4px;
            transition: width .1s linear;
            background: linear-gradient(90deg, #f59e0b, #ef4444)
        }

        #msg {
            font-size: 1.2rem;
            min-height: 30px;
            font-weight: 600
        }

        @keyframes appear {
            0% {
                transform: scale(0.8);
                opacity: 0
            }

            100% {
                transform: scale(1);
                opacity: 1
            }
        }
    </style>
</head>

<body>
    <h1>🎨 Color Rush</h1>
    <div class="card">
        <div id="score-bar"><span>Score: <strong id="sc">0</strong></span><span>Best: <strong
                    id="bs">0</strong></span><span>Time: <strong id="tm">30</strong>s</span></div>
        <div class="timer-bar">
            <div class="timer-fill" id="tf" style="width:100%"></div>
        </div>
        <div id="word-display">—</div>
        <div id="msg">Click the COLOR of the text, not the word!</div>
        <div class="buttons" id="buttons"></div>
    </div>
    <script>
        const COLORS = [
            { name: 'RED', hex: '#ef4444' }, { name: 'BLUE', hex: '#3b82f6' }, { name: 'GREEN', hex: '#22c55e' },
            { name: 'YELLOW', hex: '#facc15' }, { name: 'PURPLE', hex: '#a855f7' }, { name: 'ORANGE', hex: '#f97316' },
            { name: 'PINK', hex: '#ec4899' }, { name: 'CYAN', hex: '#22d3ee' },
        ];
        let score = 0, best = 0, timer, timeLeft, gameActive;
        function startGame() {
            score = 0; timeLeft = 30; gameActive = true; document.getElementById('sc').textContent = 0;
            document.getElementById('msg').textContent = '';
            clearInterval(timer);
            timer = setInterval(() => { timeLeft -= 0.1; document.getElementById('tf').style.width = (timeLeft / 30 * 100) + '%'; document.getElementById('tm').textContent = Math.ceil(timeLeft); if (timeLeft <= 0) { endGame(); } }, 100);
            nextRound();
        }
        function endGame() { clearInterval(timer); gameActive = false; if (score > best) { best = score; document.getElementById('bs').textContent = best; } document.getElementById('word-display').textContent = 'DONE!'; document.getElementById('word-display').style.color = '#f472b6'; document.getElementById('msg').textContent = `Final Score: ${score}! Click a color to play again.`; document.getElementById('buttons').innerHTML = ''; const btn = document.createElement('button'); btn.className = 'col-btn'; btn.style.background = 'linear-gradient(135deg,#7c3aed,#f472b6)'; btn.style.color = '#fff'; btn.style.gridColumn = '1/-1'; btn.textContent = '🔄 Play Again'; btn.onclick = startGame; document.getElementById('buttons').appendChild(btn); }
        let correctColor;
        function nextRound() {
            if (!gameActive) return;
            const word = COLORS[Math.floor(Math.random() * COLORS.length)];
            const displayColor = COLORS[Math.floor(Math.random() * COLORS.length)];
            correctColor = displayColor;
            const wd = document.getElementById('word-display');
            wd.textContent = word.name; wd.style.color = displayColor.hex;
            // pick 4 options incl. correct
            const opts = new Set([displayColor]);
            while (opts.size < 4) opts.add(COLORS[Math.floor(Math.random() * COLORS.length)]);
            const shuffled = [...opts].sort(() => Math.random() - .5);
            const btns = document.getElementById('buttons'); btns.innerHTML = '';
            shuffled.forEach(c => {
                const btn = document.createElement('button'); btn.className = 'col-btn'; btn.textContent = c.name; btn.style.background = c.hex; btn.style.color = isLight(c.hex) ? '#1e293b' : '#fff';
                btn.onclick = () => checkAnswer(c === correctColor); btns.appendChild(btn);
            });
        }
        function isLight(hex) { const r = parseInt(hex.slice(1, 3), 16), g = parseInt(hex.slice(3, 5), 16), b = parseInt(hex.slice(5, 7), 16); return (r * 299 + g * 587 + b * 114) / 1000 > 128; }
        function checkAnswer(correct) {
            if (!gameActive) return;
            if (correct) { score += 10; document.getElementById('msg').textContent = '✅ Correct! +10'; document.getElementById('msg').style.color = '#4ade80'; }
            else { score = Math.max(0, score - 5); document.getElementById('msg').textContent = '❌ Wrong! -5'; document.getElementById('msg').style.color = '#ef4444'; }
            document.getElementById('sc').textContent = score;
            nextRound();
        }
        // Show start button initially
        const btns = document.getElementById('buttons');
        const startBtn = document.createElement('button'); startBtn.className = 'col-btn'; startBtn.style.background = 'linear-gradient(135deg,#7c3aed,#f472b6)'; startBtn.style.color = '#fff'; startBtn.style.gridColumn = '1/-1'; startBtn.textContent = '▶ Start Game'; startBtn.onclick = startGame; btns.appendChild(startBtn);
    </script>
</body>

</html>
