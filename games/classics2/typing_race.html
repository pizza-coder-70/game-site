<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Typing Race – The Pizza Edition</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        body {
            background: #0a0a18;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Outfit', sans-serif;
            color: #fff;
            padding: 20px
        }

        h1 {
            color: #38bdf8;
            font-size: 2.5rem;
            margin-bottom: 12px;
            text-shadow: 0 0 20px rgba(56, 189, 248, 0.5)
        }

        .card {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(56, 189, 248, 0.25);
            border-radius: 24px;
            padding: 36px;
            width: min(700px, 95vw)
        }

        #target-text {
            font-size: 1.4rem;
            line-height: 1.8;
            margin-bottom: 20px;
            color: #475569;
            font-family: 'Courier New', monospace;
            background: #0f172a;
            padding: 16px;
            border-radius: 12px;
            letter-spacing: 0.05em
        }

        span.correct {
            color: #4ade80
        }

        span.wrong {
            color: #ef4444;
            background: rgba(239, 68, 68, 0.15);
            border-radius: 2px
        }

        span.cursor {
            border-left: 2px solid #38bdf8;
            animation: blink .8s infinite
        }

        @keyframes blink {

            0%,
            100% {
                opacity: 1
            }

            50% {
                opacity: 0
            }
        }

        #input-area {
            width: 100%;
            padding: 14px;
            background: #0f172a;
            border: 2px solid #1e3a5f;
            border-radius: 12px;
            color: #fff;
            font-size: 1.1rem;
            font-family: 'Courier New', monospace;
            outline: none;
            resize: none;
            height: 80px;
            transition: border-color .2s
        }

        #input-area:focus {
            border-color: #38bdf8;
            box-shadow: 0 0 12px rgba(56, 189, 248, 0.2)
        }

        .stats {
            display: flex;
            gap: 24px;
            margin: 16px 0;
            flex-wrap: wrap
        }

        .stat {
            text-align: center;
            flex: 1;
            min-width: 80px
        }

        .stat-val {
            font-size: 2rem;
            font-weight: 800;
            color: #38bdf8
        }

        .stat-lbl {
            color: #64748b;
            font-size: .8rem;
            text-transform: uppercase
        }

        .progress-bar {
            height: 6px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 3px;
            margin-bottom: 16px
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #0ea5e9, #38bdf8);
            border-radius: 3px;
            transition: width .2s
        }

        button {
            padding: 10px 28px;
            background: linear-gradient(135deg, #0284c7, #0ea5e9);
            border: none;
            color: #fff;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            margin-top: 12px;
            transition: all .2s
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 18px rgba(14, 165, 233, 0.4)
        }

        select {
            padding: 8px;
            background: #1e293b;
            color: #fff;
            border: 1px solid #0ea5e9;
            border-radius: 8px;
            font-family: inherit;
            margin-bottom: 12px
        }
    </style>
</head>

<body>
    <h1>⌨️ Typing Race</h1>
    <div class="card">
        <select id="diff" onchange="init()">
            <option value="easy">Easy – Short sentences</option>
            <option value="medium" selected>Medium – Longer sentences</option>
            <option value="hard">Hard – Complex passages</option>
        </select>
        <div class="progress-bar">
            <div class="progress-fill" id="pf" style="width:0%"></div>
        </div>
        <div id="target-text"></div>
        <textarea id="input-area" placeholder="Click here and start typing..." autocomplete="off" autocorrect="off"
            spellcheck="false" autocapitalize="off"></textarea>
        <div class="stats">
            <div class="stat">
                <div class="stat-val" id="wpm">0</div>
                <div class="stat-lbl">WPM</div>
            </div>
            <div class="stat">
                <div class="stat-val" id="acc">100</div>
                <div class="stat-lbl">Accuracy %</div>
            </div>
            <div class="stat">
                <div class="stat-val" id="tm">0</div>
                <div class="stat-lbl">Seconds</div>
            </div>
            <div class="stat">
                <div class="stat-val" id="chars">0</div>
                <div class="stat-lbl">Chars</div>
            </div>
        </div>
        <button onclick="init()">New Text</button>
    </div>
    <script>
        const TEXTS = {
            easy: ["The quick brown fox jumps over the lazy dog.", "Pack my box with five dozen liquor jugs.", "Hello world, this is a typing test for beginners.", "The sun sets slowly behind the distant mountains.", "Cats and dogs play together in the backyard."],
            medium: ["Adventure awaits those who dare to explore the unknown lands beyond the horizon.", "Programming is the art of telling another human what one wants the computer to do.", "The best way to predict the future is to invent it with your own hands and mind.", "Space is the final frontier, filled with wonders that stretch the imagination far.", "Every great journey begins with a single step taken in the right direction."],
            hard: ["In the beginning was the Word, and though time has passed the essence of language remains the most powerful tool humanity has ever wielded to share ideas across space and generations.", "Cryptography relies on mathematical problems that are easy to perform but computationally infeasible to reverse without knowing the secret key that unlocks the encoded information.", "The philosophical question of whether consciousness is merely an emergent property of complex systems or something fundamentally different has puzzled thinkers for centuries without resolution."],
        };
        let text, startTime, started, timer, errors, totalTyped;
        function init() {
            const diff = document.getElementById('diff').value;
            const pool = TEXTS[diff]; text = pool[Math.floor(Math.random() * pool.length)];
            started = false; errors = 0; totalTyped = 0;
            if (timer) clearInterval(timer);
            document.getElementById('wpm').textContent = 0; document.getElementById('acc').textContent = 100; document.getElementById('tm').textContent = 0; document.getElementById('chars').textContent = 0;
            document.getElementById('pf').style.width = '0%';
            document.getElementById('input-area').value = '';
            renderText(0, '');
        }
        function renderText(pos, input) {
            let html = '';
            for (let i = 0; i < text.length; i++) {
                if (i < pos) { const correct = i < input.length && input[i] === text[i]; html += `<span class="${correct ? 'correct' : 'wrong'}">${text[i]}</span>`; }
                else if (i === pos) { html += `<span class="cursor">${text[i]}</span>`; }
                else { html += `<span>${text[i]}</span>`; }
            }
            document.getElementById('target-text').innerHTML = html;
        }
        document.getElementById('input-area').addEventListener('input', e => {
            const input = e.target.value;
            if (!started && input.length > 0) { started = true; startTime = Date.now(); timer = setInterval(tick, 500); }
            totalTyped = input.length;
            let errs = 0; for (let i = 0; i < input.length; i++)if (input[i] !== text[i]) errs++;
            errors = errs;
            const acc = totalTyped > 0 ? Math.max(0, Math.round(((totalTyped - errors) / totalTyped) * 100)) : 100;
            document.getElementById('acc').textContent = acc;
            document.getElementById('chars').textContent = totalTyped;
            document.getElementById('pf').style.width = (Math.min(input.length / text.length, 1) * 100) + '%';
            renderText(input.length, input);
            if (input === text) {
                clearInterval(timer);
                const elapsed = (Date.now() - startTime) / 60000;
                const wpm = Math.round((text.split(' ').length) / elapsed);
                document.getElementById('wpm').textContent = wpm;
                document.getElementById('input-area').style.borderColor = '#4ade80';
                // Show YOU WIN overlay
                const overlay = document.createElement('div');
                overlay.style.cssText = 'position:fixed;inset:0;background:rgba(10,10,24,0.92);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:99;font-family:inherit';
                overlay.innerHTML = `<div style="font-size:3.5rem;color:#4ade80;text-shadow:0 0 30px #4ade80;margin-bottom:12px">YOU WIN! 🎉</div><div style="font-size:1.3rem;color:#38bdf8;margin-bottom:6px">${wpm} WPM</div><div style="font-size:1rem;color:#64748b;margin-bottom:24px">${Math.floor((Date.now() - startTime) / 1000)}s | ${Math.round((input.length - errors) / input.length * 100)}% accuracy</div><button onclick="this.parentNode.remove();init()" style="padding:12px 28px;background:linear-gradient(135deg,#0284c7,#0ea5e9);border:none;color:#fff;border-radius:10px;cursor:pointer;font-size:1rem;font-family:inherit">New Race</button>`;
                document.body.appendChild(overlay);
            }
        });
        function tick() {
            if (!started) return;
            const elapsed = Math.floor((Date.now() - startTime) / 1000); document.getElementById('tm').textContent = elapsed;
            const inp = document.getElementById('input-area').value; const words = inp.trim().split(/\s+/).length;
            const wpm = Math.round(words / ((Date.now() - startTime) / 60000)); document.getElementById('wpm').textContent = wpm;
        }
        init();
    </script>
</body>

</html>
