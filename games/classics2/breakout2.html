<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Breakout Deluxe – The Pizza Edition</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        body {
            background: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Courier New', monospace;
            color: #fff
        }

        h1 {
            color: #38bdf8;
            font-size: 2rem;
            margin-bottom: 8px;
            text-shadow: 0 0 20px #38bdf8
        }

        canvas {
            border: 2px solid #38bdf8;
            box-shadow: 0 0 30px rgba(56, 189, 248, 0.4)
        }

        #hud {
            margin-top: 10px;
            color: #38bdf8
        }

        #ctrl {
            margin-top: 6px;
            color: #555;
            font-size: .8rem
        }
    </style>
</head>

<body>
    <h1>Breakout Deluxe</h1>
    <canvas id="c" width="480" height="560"></canvas>
    <div id="hud">Score: <span id="sc">0</span> &nbsp; Lives: <span id="li">3</span> &nbsp; Level: <span
            id="lv">1</span></div>
    <div id="ctrl">Mouse to move | Click/Space to launch | Power-ups drop!</div>
    <script>
        const canvas = document.getElementById('c'), ctx = canvas.getContext('2d');
        const W = 480, H = 560;
        const POWERUP_TYPES = [{ name: 'wide', color: '#22c55e', emoji: '↔' }, { name: 'multi', color: '#f97316', emoji: '×3' }, { name: 'slow', color: '#3b82f6', emoji: '🐢' }, { name: 'fire', color: '#ef4444', emoji: '🔥' }];
        let paddle, balls, bricks, powerups, score, lives, level, launched;
        function makeBricks(lvl) {
            const bs = []; const rows = 4 + lvl, cols = 8, bw = 52, bh = 16, gap = 3;
            const COLORS = ['#ef4444', '#f97316', '#eab308', '#22c55e', '#3b82f6', '#a855f7'];
            for (let r = 0; r < rows; r++)for (let c = 0; c < cols; c++) {
                bs.push({ x: c * (bw + gap) + 10, y: r * (bh + gap) + 50, w: bw, h: bh, alive: true, color: COLORS[r % COLORS.length], hp: r < 2 ? 1 : 2 });
            }
            return bs;
        }
        function init() {
            level = 1; score = 0; lives = 3; launched = false;
            paddle = { x: W / 2 - 50, y: H - 30, w: 100, h: 12, wide: 0 };
            balls = [{ x: W / 2, y: H - 50, vx: 3.5, vy: -4, r: 8 }];
            powerups = []; bricks = makeBricks(level);
            document.getElementById('sc').textContent = 0; document.getElementById('lv').textContent = 1; document.getElementById('li').textContent = 3;
        }
        canvas.addEventListener('mousemove', e => { const r = canvas.getBoundingClientRect(); paddle.x = e.clientX - r.left - paddle.w / 2; });
        canvas.addEventListener('click', () => { if (!launched) launched = true; });
        document.addEventListener('keydown', e => { if (e.key === 'r' || e.key === 'R') init(); if (e.key === ' ') launched = true; e.preventDefault(); });
        function clamp(v, a, b) { return Math.max(a, Math.min(b, v)); }
        function update() {
            paddle.x = clamp(paddle.x, 0, W - paddle.w); if (paddle.wide > 0) paddle.wide--; else paddle.w = 100;
            if (!launched) { balls[0].x = paddle.x + paddle.w / 2; balls[0].y = paddle.y - balls[0].r - 2; return; }
            balls = balls.filter(ball => {
                ball.x += ball.vx; ball.y += ball.vy;
                if (ball.x - ball.r < 0 || ball.x + ball.r > W) ball.vx *= -1;
                if (ball.y - ball.r < 0) ball.vy *= -1;
                if (ball.y > H + 30) return false;
                if (ball.y + ball.r >= paddle.y && ball.x >= paddle.x && ball.x <= paddle.x + paddle.w && ball.vy > 0) { ball.vy = -Math.abs(ball.vy); ball.vx += (ball.x - (paddle.x + paddle.w / 2)) * 0.08; }
                for (const b of bricks) { if (!b.alive) continue; if (ball.x + ball.r > b.x && ball.x - ball.r < b.x + b.w && ball.y + ball.r > b.y && ball.y - ball.r < b.y + b.h) { ball.vy *= -1; b.hp--; if (b.hp <= 0) { b.alive = false; score += 10 * level; document.getElementById('sc').textContent = score; if (Math.random() < 0.15) powerups.push({ x: b.x + b.w / 2, y: b.y, vy: 2, ...POWERUP_TYPES[Math.floor(Math.random() * POWERUP_TYPES.length)], h: 18, w: 32 }); } break; } }
                return true;
            });
            if (balls.length === 0) { lives--; document.getElementById('li').textContent = lives; if (lives <= 0) return; launched = false; balls = [{ x: W / 2, y: H - 50, vx: 3.5, vy: -4, r: 8 }]; }
            // powerups
            powerups = powerups.filter(pu => { pu.y += pu.vy; if (pu.y > paddle.y && pu.y < paddle.y + paddle.h && pu.x > paddle.x && pu.x < paddle.x + paddle.w) { applyPowerup(pu); return false; } return pu.y < H; });
            if (bricks.every(b => !b.alive)) {
                level++;
                if (level > 5) {
                    // VICTORY!
                    ctx.fillStyle = 'rgba(0,0,0,0.85)'; ctx.fillRect(0, 0, W, H);
                    ctx.fillStyle = '#38bdf8'; ctx.font = 'bold 52px monospace'; ctx.textAlign = 'center';
                    ctx.fillText('YOU WIN!', W / 2, H / 2 - 50);
                    ctx.font = 'bold 22px monospace'; ctx.fillStyle = '#facc15'; ctx.fillText(`🏆 Score: ${score}`, W / 2, H / 2);
                    ctx.font = '16px monospace'; ctx.fillStyle = '#aaa'; ctx.fillText('All 5 levels cleared! Press R', W / 2, H / 2 + 45);
                    return;
                }
                bricks = makeBricks(level); launched = false; balls = [{ x: W / 2, y: H - 50, vx: 3.5 + level * 0.3, vy: -(4 + level * 0.2), r: 8 }]; document.getElementById('lv').textContent = level;
            }
        }
        function applyPowerup(pu) {
            if (pu.name === 'wide') { paddle.w = 160; paddle.wide = 300; }
            else if (pu.name === 'multi') { balls.push({ ...balls[0], vx: balls[0].vx * -1.2, vy: balls[0].vy * 1.1, r: 8 }); balls.push({ ...balls[0], vx: balls[0].vx * 1.2, vy: balls[0].vy * 0.9, r: 8 }); }
            else if (pu.name === 'slow') { balls.forEach(b => { b.vx *= 0.7; b.vy *= 0.7; }); }
            else if (pu.name === 'fire') { bricks.forEach(b => { if (!b.alive) return; if (Math.abs(b.x + b.w / 2 - paddle.x - paddle.w / 2) < 100) { b.hp = 0; b.alive = false; } }); }
        }
        function draw() {
            ctx.fillStyle = '#000'; ctx.fillRect(0, 0, W, H);
            // starfield
            for (let i = 0; i < 40; i++) { ctx.fillStyle = `rgba(255,255,255,0.${i % 3 + 1})`; ctx.fillRect((i * 137) % W, (i * 53) % H, 1, 1); }
            bricks.forEach(b => { if (!b.alive) return; ctx.fillStyle = b.color + (b.hp === 1 ? 'aa' : 'ff'); ctx.beginPath(); ctx.roundRect(b.x, b.y, b.w, b.h, 3); ctx.fill(); if (b.hp > 1) { ctx.fillStyle = 'rgba(255,255,255,0.3)'; ctx.fillRect(b.x + 3, b.y + 3, b.w - 6, 3); } });
            powerups.forEach(pu => { ctx.fillStyle = pu.color; ctx.beginPath(); ctx.roundRect(pu.x - pu.w / 2, pu.y, pu.w, pu.h, 4); ctx.fill(); ctx.fillStyle = '#fff'; ctx.font = 'bold 11px monospace'; ctx.textAlign = 'center'; ctx.fillText(pu.emoji, pu.x, pu.y + 13); });
            ctx.fillStyle = '#38bdf8'; ctx.beginPath(); ctx.roundRect(paddle.x, paddle.y, paddle.w, paddle.h, 6); ctx.fill();
            balls.forEach(ball => { const g = ctx.createRadialGradient(ball.x - ball.r * 0.3, ball.y - ball.r * 0.3, 1, ball.x, ball.y, ball.r); g.addColorStop(0, '#fff'); g.addColorStop(1, '#38bdf8'); ctx.beginPath(); ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2); ctx.fillStyle = g; ctx.fill(); });
            if (lives <= 0) { ctx.fillStyle = 'rgba(0,0,0,0.7)'; ctx.fillRect(0, 0, W, H); ctx.fillStyle = '#ef4444'; ctx.font = 'bold 32px monospace'; ctx.textAlign = 'center'; ctx.fillText('GAME OVER', W / 2, H / 2 - 20); ctx.font = '18px monospace'; ctx.fillStyle = '#fff'; ctx.fillText(`Score: ${score} | Press R`, W / 2, H / 2 + 20); }
        }
        function loop() { if (lives > 0) update(); draw(); requestAnimationFrame(loop); }
        init(); loop();
    </script>
</body>

</html>
