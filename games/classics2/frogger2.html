<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Frogger 2 – The Pizza Edition</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        body {
            background: #0a1a0a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Courier New', monospace
        }

        h1 {
            color: #4ade80;
            font-size: 2rem;
            margin-bottom: 8px;
            text-shadow: 0 0 20px #4ade80
        }

        canvas {
            border: 2px solid #4ade80;
            box-shadow: 0 0 30px rgba(74, 222, 128, 0.4)
        }

        #hud {
            margin-top: 10px;
            color: #4ade80
        }

        #ctrl {
            margin-top: 6px;
            color: #555;
            font-size: .8rem
        }
    </style>
</head>

<body>
    <h1>Frogger 2</h1>
    <canvas id="c" width="540" height="540"></canvas>
    <div id="hud">Score: <span id="sc">0</span> &nbsp; Lives: <span id="li">3</span></div>
    <div id="ctrl">Arrow Keys / WASD to hop | R: restart | Reach the lily pads!</div>
    <script>
        const canvas = document.getElementById('c'), ctx = canvas.getContext('2d');
        const CS = 60, COLS = 9, ROWS = 9;
        const LANES = [
            { type: 'safe', bg: '#14532d' },
            { type: 'log', bg: '#134e4a', dir: 1, speed: 1.2, items: [{ x: 0, w: 3 }, { x: 5, w: 2 }] },
            { type: 'log', bg: '#134e4a', dir: -1, speed: 1.5, items: [{ x: 1, w: 2 }, { x: 4, w: 3 }] },
            { type: 'log', bg: '#134e4a', dir: 1, speed: 1, items: [{ x: 0, w: 4 }, { x: 6, w: 2 }] },
            { type: 'safe', bg: '#1a3300' },
            { type: 'car', bg: '#1c1917', dir: -1, speed: 1.8, items: [{ x: 1 }, { x: 4 }, { x: 7 }] },
            { type: 'car', bg: '#1c1917', dir: 1, speed: 1.4, items: [{ x: 0 }, { x: 3 }, { x: 6 }] },
            { type: 'car', bg: '#1c1917', dir: -1, speed: 2.2, items: [{ x: 2 }, { x: 5 }] },
            { type: 'safe', bg: '#14532d' },
        ];
        const GOAL_ROW = 0;
        let frog, lanes, score, lives, over, pads;
        function initLanes() { return LANES.map((l, i) => ({ ...l, y: i * CS, items: l.items ? l.items.map(it => ({ ...it, xf: it.x * CS })) : null })); }
        function init() {
            frog = { row: 8, col: 4, onLog: false, logVx: 0, px: 4 * CS + 10, py: 8 * CS + 10 };
            lives = 3; score = 0; over = false; pads = [false, false, false, false, false];
            lanes = initLanes();
            document.getElementById('sc').textContent = 0; document.getElementById('li').textContent = 3;
        }
        document.addEventListener('keydown', e => {
            if (e.key === 'r' || e.key === 'R') { init(); return; }
            if (over) return;
            if (e.key === 'ArrowLeft' || e.key === 'a') { frog.col = Math.max(0, frog.col - 1); }
            else if (e.key === 'ArrowRight' || e.key === 'd') { frog.col = Math.min(COLS - 1, frog.col + 1); }
            else if (e.key === 'ArrowUp' || e.key === 'w') { frog.row = Math.max(0, frog.row - 1); }
            else if (e.key === 'ArrowDown' || e.key === 's') { frog.row = Math.min(8, frog.row + 1); }
            e.preventDefault();
        });
        function update() {
            if (over) return;
            lanes.forEach(l => { if (!l.items) return; l.items.forEach(it => { it.xf += l.dir * l.speed; const maxW = it.w ? it.w * CS : CS; if (l.dir > 0 && it.xf > COLS * CS) it.xf = -(maxW); if (l.dir < 0 && it.xf + maxW < 0) it.xf = COLS * CS; }); });
            frog.px = frog.col * CS + 10; frog.py = frog.row * CS + 10;
            const lane = lanes[frog.row];
            if (lane.type === 'log') {
                let onAny = false;
                for (const it of lane.items) { const lw = (it.w || 1) * CS; if (frog.px + 20 > it.xf && frog.px < it.xf + lw) { onAny = true; frog.px += lane.dir * lane.speed; frog.col = Math.floor(frog.px / CS); break; } }
                if (!onAny) { lives--; document.getElementById('li').textContent = lives; resetFrog(); if (lives <= 0) over = true; return; }
            }
            frog.col = Math.max(0, Math.min(COLS - 1, frog.col));
            if (frog.row === 0) { score += 50; document.getElementById('sc').textContent = score; resetFrog(); }
        }
        function resetFrog() { frog = { row: 8, col: 4, px: 4 * CS + 10, py: 8 * CS + 10 }; }
        function draw() {
            ctx.fillStyle = '#000'; ctx.fillRect(0, 0, canvas.width, canvas.height);
            lanes.forEach((l, li) => {
                ctx.fillStyle = l.bg; ctx.fillRect(0, li * CS, canvas.width, CS);
                if (l.type === 'log' && l.items) { l.items.forEach(it => { ctx.fillStyle = '#92400e'; ctx.beginPath(); ctx.roundRect(it.xf, li * CS + 8, (it.w || 1) * CS - 4, CS - 16, 8); ctx.fill(); }); }
                if (l.type === 'car' && l.items) { l.items.forEach(it => { ctx.fillStyle = l.dir > 0 ? '#ef4444' : '#3b82f6'; ctx.beginPath(); ctx.roundRect(it.xf, li * CS + 14, CS - 8, CS - 28, 6); ctx.fill(); }); }
            });
            // goal row lily pads
            const padPositions = [1, 2, 4, 6, 7];
            padPositions.forEach(c => { ctx.fillStyle = '#22c55e'; ctx.beginPath(); ctx.ellipse(c * CS + CS / 2, GOAL_ROW * CS + CS / 2, CS / 2 - 6, CS / 2 - 10, 0, 0, Math.PI * 2); ctx.fill(); });
            // frog
            ctx.font = `${CS - 8}px monospace`; ctx.textAlign = 'center'; ctx.fillText('🐸', frog.col * CS + CS / 2, frog.row * CS + CS - 4);
            if (over) { ctx.fillStyle = 'rgba(0,0,0,0.65)'; ctx.fillRect(0, 0, canvas.width, canvas.height); ctx.fillStyle = '#4ade80'; ctx.font = 'bold 36px monospace'; ctx.textAlign = 'center'; ctx.fillText('GAME OVER', 270, 250); ctx.font = '18px monospace'; ctx.fillStyle = '#fff'; ctx.fillText(`Score: ${score} | Press R`, 270, 300); }
        }
        function loop() { update(); draw(); requestAnimationFrame(loop); }
        init(); loop();
    </script>
</body>

</html>
