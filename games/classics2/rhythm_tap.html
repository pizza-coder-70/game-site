<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Rhythm Tap – The Pizza Edition</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        body {
            background: #0a0018;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Courier New', monospace;
            color: #fff
        }

        h1 {
            color: #ec4899;
            font-size: 2rem;
            margin-bottom: 8px;
            text-shadow: 0 0 20px #ec4899
        }

        canvas {
            border: 2px solid #ec4899;
            box-shadow: 0 0 30px rgba(236, 72, 153, 0.4)
        }

        #hud {
            margin-top: 10px;
            color: #ec4899
        }

        #ctrl {
            margin-top: 6px;
            color: #555;
            font-size: .8rem
        }
    </style>
</head>

<body>
    <h1>🎵 Rhythm Tap</h1>
    <canvas id="c" width="480" height="600"></canvas>
    <div id="hud">Score: <span id="sc">0</span> &nbsp; Combo: <span id="co">0</span>x &nbsp; Best: <span
            id="bs">0</span></div>
    <div id="ctrl">Press D, F, J, K when circles reach the bottom zone! | R: restart</div>
    <script>
        const canvas = document.getElementById('c'), ctx = canvas.getContext('2d');
        const W = 480, H = 600;
        const LANES = [{ key: 'd', x: 80, color: '#ef4444' }, { key: 'f', x: 200, color: '#22c55e' }, { key: 'j', x: 320, color: '#3b82f6' }, { key: 'k', x: 440, color: '#a855f7' }];
        const HIT_Y = 520, NOTE_SPEED = 4;
        let notes, score, combo, best = 0, over, keys, frame = 0, spawnTimer = 0, active;
        function init() { notes = []; score = 0; combo = 0; over = false; keys = {}; active = {}; frame = 0; spawnTimer = 0; document.getElementById('sc').textContent = 0; document.getElementById('co').textContent = 0; }
        document.addEventListener('keydown', e => {
            keys[e.key.toLowerCase()] = true;
            if (e.key === 'r' || e.key === 'R') { init(); return; }
            const lane = LANES.find(l => l.key === e.key.toLowerCase());
            if (lane) { hitLane(lane); active[lane.key] = 8; }
            e.preventDefault();
        });
        document.addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; });
        const PATTERNS = ['d', 'f', 'j', 'k', 'df', 'jk', 'd', 'k', 'f', 'j', 'd', 'f', 'j', 'k'];
        let patIdx = 0;
        function spawn() {
            const pat = PATTERNS[patIdx % PATTERNS.length]; patIdx++;
            if (pat.length === 1) { const lane = LANES.find(l => l.key === pat); notes.push({ x: lane.x, y: -30, r: 28, color: lane.color, key: lane.key, hit: false, miss: false }); }
            else { pat.split('').forEach(k => { const lane = LANES.find(l => l.key === k); notes.push({ x: lane.x, y: -30, r: 28, color: lane.color, key: lane.key, hit: false, miss: false }); }); }
            spawnTimer = Math.max(45, 80 - Math.floor(score / 200));
        }
        let feedbacks = [];
        function hitLane(lane) {
            const hit = notes.find(n => !n.hit && !n.miss && n.key === lane.key && Math.abs(n.y - HIT_Y) < 50);
            if (hit) { hit.hit = true; const acc = Math.abs(hit.y - HIT_Y); const pts = acc < 15 ? 100 : acc < 30 ? 70 : 40; combo++; score += pts * Math.max(1, Math.floor(combo / 5)); document.getElementById('sc').textContent = score; document.getElementById('co').textContent = combo; if (score > best) { best = score; document.getElementById('bs').textContent = best; } feedbacks.push({ x: lane.x, y: HIT_Y, text: acc < 15 ? 'PERFECT!' : acc < 30 ? 'GREAT!' : 'GOOD!', color: acc < 15 ? '#fbbf24' : '#4ade80', life: 30 }); }
            else { combo = 0; document.getElementById('co').textContent = 0; }
        }
        function update() {
            frame++; spawnTimer--; if (spawnTimer <= 0) spawn();
            for (const k in active) if (active[k] > 0) active[k]--;
            notes = notes.filter(n => { n.y += NOTE_SPEED; if (!n.hit && n.y > HIT_Y + 60) { n.miss = true; combo = 0; document.getElementById('co').textContent = 0; feedbacks.push({ x: n.x, y: HIT_Y, text: 'MISS', color: '#ef4444', life: 25 }); } return n.y < H + 50; });
            feedbacks = feedbacks.filter(f => { f.y -= 1; f.life--; return f.life > 0; });
        }
        function draw() {
            ctx.fillStyle = '#0a0018'; ctx.fillRect(0, 0, W, H);
            // track lines
            LANES.forEach(l => { ctx.strokeStyle = `rgba(${l.color === '#ef4444' ? '239,68,68' : l.color === '#22c55e' ? '34,197,94' : l.color === '#3b82f6' ? '59,130,246' : '168,85,247'},0.15)`; ctx.lineWidth = 56; ctx.beginPath(); ctx.moveTo(l.x, 0); ctx.lineTo(l.x, H); ctx.stroke(); });
            // hit zone
            LANES.forEach(l => {
                const ac = active[l.key];
                ctx.beginPath(); ctx.arc(l.x, HIT_Y, 32, 0, Math.PI * 2); ctx.strokeStyle = l.color + '88'; ctx.lineWidth = 3; ctx.stroke();
                if (ac > 0) { ctx.beginPath(); ctx.arc(l.x, HIT_Y, 32, 0, Math.PI * 2); ctx.fillStyle = l.color + '33'; ctx.fill(); }
                ctx.fillStyle = '#fff'; ctx.font = 'bold 14px monospace'; ctx.textAlign = 'center'; ctx.fillText(l.key.toUpperCase(), l.x, HIT_Y + 5);
            });
            // notes
            notes.forEach(n => { if (n.hit) return; ctx.beginPath(); ctx.arc(n.x, n.y, n.r, 0, Math.PI * 2); ctx.fillStyle = n.miss ? '#334155' : n.color; ctx.fill(); ctx.strokeStyle = 'rgba(255,255,255,0.4)'; ctx.lineWidth = 2; ctx.stroke(); });
            // feedback
            feedbacks.forEach(f => { ctx.fillStyle = f.color; ctx.font = 'bold 18px monospace'; ctx.textAlign = 'center'; ctx.globalAlpha = f.life / 25; ctx.fillText(f.text, f.x, f.y); ctx.globalAlpha = 1; });
            // combo
            if (combo >= 5) { ctx.fillStyle = '#fbbf24'; ctx.font = 'bold 22px monospace'; ctx.textAlign = 'center'; ctx.fillText(`${combo}x COMBO!`, W / 2, 50); }
        }
        function loop() { update(); draw(); requestAnimationFrame(loop); }
        init(); loop();
    </script>
</body>

</html>
