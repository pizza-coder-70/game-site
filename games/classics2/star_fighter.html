<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Star Fighter – The Pizza Edition</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        body {
            background: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Courier New', monospace;
            color: #fff
        }

        h1 {
            color: #f97316;
            font-size: 2rem;
            margin-bottom: 8px;
            text-shadow: 0 0 20px #f97316
        }

        canvas {
            border: 2px solid #f97316;
            box-shadow: 0 0 30px rgba(249, 115, 22, 0.4)
        }

        #hud {
            margin-top: 10px;
            color: #f97316
        }

        #ctrl {
            margin-top: 6px;
            color: #555;
            font-size: .8rem
        }
    </style>
</head>

<body>
    <h1>★ Star Fighter</h1>
    <canvas id="c" width="480" height="600"></canvas>
    <div id="hud">Score: <span id="sc">0</span> &nbsp; Lives: <span id="li">3</span> &nbsp; Level: <span
            id="lv">1</span></div>
    <div id="ctrl">Arrow Keys / WASD to move | Auto-fire | R: restart</div>
    <script>
        const canvas = document.getElementById('c'), ctx = canvas.getContext('2d');
        const W = 480, H = 600;
        let ship, enemies, bullets, eBullets, particles, score, lives, level, over, frame = 0;
        function rand(a, b) { return a + Math.random() * (b - a); }
        function makeEnemy(lvl) { return { x: rand(30, W - 30), y: rand(-200, -30), w: 32, h: 24, vx: (Math.random() - .5) * 1.5, vy: 1 + lvl * 0.3, hp: lvl > 3 ? 2 : 1, shTimer: rand(60, 180), color: `hsl(${rand(280, 360)},80%,60%)` }; }
        function init() {
            ship = { x: W / 2, y: H - 70, w: 36, h: 28, inv: 0 };
            enemies = Array.from({ length: 6 }, () => makeEnemy(1));
            bullets = []; eBullets = []; particles = []; score = 0; lives = 3; level = 1; over = false;
            document.getElementById('sc').textContent = 0; document.getElementById('li').textContent = 3; document.getElementById('lv').textContent = 1;
        }
        document.addEventListener('keydown', e => { if (e.key === 'r' || e.key === 'R') init(); });
        let keys = {};
        document.addEventListener('keydown', e => { keys[e.key] = true; }); document.addEventListener('keyup', e => { keys[e.key] = false; });
        let shotT = 0;
        function explode(x, y) { for (let i = 0; i < 12; i++)particles.push({ x, y, vx: rand(-3, 3), vy: rand(-3, 3), life: 40, color: `hsl(${rand(0, 60)},100%,60%)` }); }
        function update() {
            if (over) return; frame++;
            if (keys['ArrowLeft'] || keys['a']) ship.x = Math.max(ship.w / 2, ship.x - 5);
            if (keys['ArrowRight'] || keys['d']) ship.x = Math.min(W - ship.w / 2, ship.x + 5);
            if (keys['ArrowUp'] || keys['w']) ship.y = Math.max(60, ship.y - 4);
            if (keys['ArrowDown'] || keys['s']) ship.y = Math.min(H - 40, ship.y + 4);
            if (ship.inv > 0) ship.inv--;
            // auto fire
            shotT--; if (shotT <= 0) { bullets.push({ x: ship.x, y: ship.y - 20, vy: -9, w: 6, h: 16 }); shotT = 12; }
            bullets = bullets.filter(b => { b.y += b.vy; return b.y > 0; });
            enemies = enemies.filter(e => {
                e.x += e.vx; e.y += e.vy;
                if (e.x < 20 || e.x > W - 20) e.vx *= -1;
                e.shTimer--;
                if (e.shTimer <= 0) { eBullets.push({ x: e.x, y: e.y + e.h / 2, vx: (ship.x - e.x) * 0.03, vy: 3 + level * 0.2 }); e.shTimer = rand(60, 150 + level * 10); }
                if (e.y > H + 50) { enemies.push(makeEnemy(level)); return false; }
                // check bullets vs enemy
                for (let bi = bullets.length - 1; bi >= 0; bi--) {
                    if (Math.abs(bullets[bi].x - e.x) < e.w && Math.abs(bullets[bi].y - e.y) < e.h) {
                        bullets.splice(bi, 1); e.hp--;
                        if (e.hp <= 0) { explode(e.x, e.y); score += 20 * level; document.getElementById('sc').textContent = score; level = Math.floor(score / 300) + 1; document.getElementById('lv').textContent = level; enemies.push(makeEnemy(level)); return false; }
                        break;
                    }
                }
                // vs ship
                if (ship.inv === 0 && Math.abs(e.x - ship.x) < e.w && Math.abs(e.y - ship.y) < e.h) { explode(ship.x, ship.y); lives--; document.getElementById('li').textContent = lives; ship.inv = 120; if (lives <= 0) over = true; }
                return true;
            });
            eBullets = eBullets.filter(b => { b.x += b.vx; b.y += b.vy; if (ship.inv === 0 && Math.abs(b.x - ship.x) < 16 && Math.abs(b.y - ship.y) < 16) { lives--; document.getElementById('li').textContent = lives; ship.inv = 120; if (lives <= 0) over = true; return false; } return b.y < H && b.x > 0 && b.x < W; });
            particles = particles.filter(p => { p.x += p.vx; p.y += p.vy; p.life--; return p.life > 0; });
            while (enemies.length < 5 + level) enemies.push(makeEnemy(level));
        }
        function draw() {
            ctx.fillStyle = '#000'; ctx.fillRect(0, 0, W, H);
            for (let i = 0; i < 80; i++) { ctx.fillStyle = `rgba(255,255,255,${0.05 + ((i * frame / 30) % 0.3)})`; ctx.fillRect((i * 137 + frame / 2) % W, (i * 53 + frame) % H, 1, 1); }
            enemies.forEach(e => { ctx.save(); ctx.translate(e.x, e.y); ctx.fillStyle = e.color; ctx.beginPath(); ctx.moveTo(0, -e.h / 2); ctx.lineTo(e.w / 2, e.h / 2); ctx.lineTo(-e.w / 2, e.h / 2); ctx.closePath(); ctx.fill(); ctx.fillStyle = 'rgba(0,0,0,0.3)'; ctx.beginPath(); ctx.arc(0, 0, 8, 0, Math.PI * 2); ctx.fill(); ctx.restore(); });
            bullets.forEach(b => { ctx.fillStyle = '#facc15'; ctx.fillRect(b.x - 3, b.y, 6, 16); });
            eBullets.forEach(b => { ctx.beginPath(); ctx.arc(b.x, b.y, 5, 0, Math.PI * 2); ctx.fillStyle = '#ef4444'; ctx.fill(); });
            particles.forEach(p => { ctx.fillStyle = p.color + 'bb'; ctx.fillRect(p.x, p.y, 3, 3); });
            if (!over && (ship.inv % 10 < 7)) {
                ctx.save(); ctx.translate(ship.x, ship.y); ctx.fillStyle = '#f97316'; ctx.beginPath(); ctx.moveTo(0, -ship.h / 2); ctx.lineTo(ship.w / 2, ship.h / 2); ctx.lineTo(0, ship.h / 4); ctx.lineTo(-ship.w / 2, ship.h / 2); ctx.closePath(); ctx.fill();
                ctx.fillStyle = 'rgba(251,146,60,0.6)'; ctx.fillRect(-6, ship.h / 4, 12, 12); ctx.restore();
            }
            if (over) { ctx.fillStyle = 'rgba(0,0,0,0.7)'; ctx.fillRect(0, 0, W, H); ctx.fillStyle = '#f97316'; ctx.font = 'bold 32px monospace'; ctx.textAlign = 'center'; ctx.fillText('GAME OVER', W / 2, H / 2 - 20); ctx.font = '20px monospace'; ctx.fillText(`Score: ${score} | Press R`, W / 2, H / 2 + 25); }
        }
        function loop() { update(); draw(); requestAnimationFrame(loop); }
        init(); loop();
    </script>
</body>

</html>
