<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Infinite Runner – The Pizza Edition</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        body {
            background: #0a0a0a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Courier New', monospace;
            color: #fff
        }

        h1 {
            color: #22d3ee;
            font-size: 2rem;
            margin-bottom: 8px;
            text-shadow: 0 0 20px #22d3ee
        }

        canvas {
            border: 2px solid #22d3ee;
            box-shadow: 0 0 30px rgba(34, 211, 238, 0.4)
        }

        #hud {
            margin-top: 10px;
            color: #22d3ee
        }

        #ctrl {
            margin-top: 6px;
            color: #555;
            font-size: .8rem
        }
    </style>
</head>

<body>
    <h1>🏃 Infinite Runner</h1>
    <canvas id="c" width="700" height="320"></canvas>
    <div id="hud">Score: <span id="sc">0</span> &nbsp; Best: <span id="bs">0</span> &nbsp; Speed: <span
            id="sp">1</span>x</div>
    <div id="ctrl">Space / Up Arrow / Click to jump | Double jump available! | R: restart</div>
    <script>
        const canvas = document.getElementById('c'), ctx = canvas.getContext('2d');
        const W = 700, H = 320, GROUND = 250;
        let player, obstacles, coins, clouds, score, best = 0, over, started, speed, frame = 0, jumpCount;
        function init() {
            player = { x: 80, y: GROUND - 50, w: 36, h: 50, vy: 0, onGround: true, trail: [] };
            jumpCount = 0; obstacles = []; coins = []; clouds = []; score = 0; over = false; started = false; speed = 3;
            for (let i = 0; i < 5; i++)clouds.push({ x: Math.random() * W, y: 30 + Math.random() * 80, w: 60 + Math.random() * 80, speed: 0.3 + Math.random() * 0.3 });
            document.getElementById('sc').textContent = 0; document.getElementById('sp').textContent = 1;
        }
        function jump() {
            if (!started) { started = true; return; }
            if (jumpCount < 2) { player.vy = -13; player.onGround = false; jumpCount++; }
        }
        document.addEventListener('keydown', e => { if (e.key === ' ' || e.key === 'ArrowUp' || e.key === 'w') { jump(); e.preventDefault(); } if (e.key === 'r' || e.key === 'R') init(); });
        canvas.addEventListener('click', jump);
        let spawnT = 0;
        function update() {
            if (!started || over) return;
            frame++; score++; speed = 3 + Math.floor(score / 400) * 0.5; document.getElementById('sc').textContent = Math.floor(score / 10); document.getElementById('sp').textContent = (speed / 3).toFixed(1);
            // player
            player.vy += 0.7; player.y += player.vy;
            if (player.y >= GROUND - player.h) { player.y = GROUND - player.h; player.vy = 0; player.onGround = true; jumpCount = 0; }
            player.trail.push({ x: player.x + player.w / 2, y: player.y + player.h / 2 }); if (player.trail.length > 8) player.trail.shift();
            // clouds
            clouds.forEach(c => { c.x -= c.speed; if (c.x + c.w < 0) c.x = W + 20; });
            // obstacles
            spawnT++; if (spawnT > Math.max(50, 110 - Math.floor(score / 200) * 5)) { spawnT = 0; const type = Math.random(); if (type < 0.6) obstacles.push({ x: W, y: GROUND - 50, w: 28, h: 50, type: 'cactus' }); else if (type < 0.85) obstacles.push({ x: W, y: GROUND - 80, w: 40, h: 30, type: 'bird' }); else { obstacles.push({ x: W, y: GROUND - 50, w: 28, h: 50, type: 'cactus' }); obstacles.push({ x: W + 60, y: GROUND - 50, w: 28, h: 50, type: 'cactus' }); } }
            if (Math.random() < 0.02) coins.push({ x: W, y: GROUND - 80 - Math.random() * 60, r: 12 });
            obstacles = obstacles.filter(o => { o.x -= speed; if (o.type === 'bird') o.y = GROUND - 80 + Math.sin(frame / 15) * 20; if (player.x + player.w - 8 > o.x && player.x + 8 < o.x + o.w && player.y + 8 < o.y + o.h && player.y + player.h - 8 > o.y) { over = true; if (Math.floor(score / 10) > best) { best = Math.floor(score / 10); document.getElementById('bs').textContent = best; } } return o.x > -60; });
            coins = coins.filter(c => { c.x -= speed; if (Math.hypot(player.x + player.w / 2 - c.x, player.y + player.h / 2 - c.y) < c.r + 18) { score += 50; return false; } return c.x > 0; });
        }
        function draw() {
            // sky gradient
            const sky = ctx.createLinearGradient(0, 0, 0, H); sky.addColorStop(0, '#0a0a1a'); sky.addColorStop(1, '#0f1f2e'); ctx.fillStyle = sky; ctx.fillRect(0, 0, W, H);
            // clouds
            clouds.forEach(c => { ctx.fillStyle = 'rgba(255,255,255,0.06)'; ctx.beginPath(); ctx.ellipse(c.x + c.w / 2, c.y, c.w / 2, 18, 0, 0, Math.PI * 2); ctx.fill(); });
            // ground
            ctx.fillStyle = '#1e3a5f'; ctx.fillRect(0, GROUND, W, H - GROUND);
            ctx.fillStyle = '#22d3ee'; ctx.fillRect(0, GROUND, W, 3);
            // trail
            player.trail.forEach((t, i) => { ctx.beginPath(); ctx.arc(t.x, t.y, 4 * (i / player.trail.length), 0, Math.PI * 2); ctx.fillStyle = `rgba(34,211,238,${i / player.trail.length * 0.4})`; ctx.fill(); });
            // obstacles
            obstacles.forEach(o => {
                if (o.type === 'cactus') { ctx.fillStyle = '#14532d'; ctx.fillRect(o.x + 8, o.y, o.w - 16, o.h); ctx.fillRect(o.x, o.y + 12, o.w, 8); ctx.fillStyle = '#166534'; ctx.fillRect(o.x + 10, o.y, o.w - 20, o.h - 4); }
                else { ctx.font = '26px monospace'; ctx.fillText('🦅', o.x, o.y + 26); }
            });
            // coins
            coins.forEach(c => { ctx.beginPath(); ctx.arc(c.x, c.y, c.r, 0, Math.PI * 2); ctx.fillStyle = '#fbbf24'; ctx.fill(); ctx.fillStyle = '#92400e'; ctx.font = 'bold 11px monospace'; ctx.textAlign = 'center'; ctx.fillText('$', c.x, c.y + 4); });
            // player
            ctx.font = '40px monospace'; ctx.textAlign = 'center'; ctx.fillText('🏃', player.x + player.w / 2, player.y + player.h + 4);
            if (over) { ctx.fillStyle = 'rgba(0,0,0,0.65)'; ctx.fillRect(0, 0, W, H); ctx.fillStyle = '#22d3ee'; ctx.font = 'bold 32px monospace'; ctx.textAlign = 'center'; ctx.fillText('GAME OVER', W / 2, H / 2 - 20); ctx.font = '20px monospace'; ctx.fillText(`Score: ${Math.floor(score / 10)} | Press R`, W / 2, H / 2 + 20); }
            if (!started) { ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.fillRect(0, 0, W, H); ctx.fillStyle = '#22d3ee'; ctx.font = 'bold 22px monospace'; ctx.textAlign = 'center'; ctx.fillText('Press Space or Click to Start!', W / 2, H / 2); }
        }
        function loop() { update(); draw(); requestAnimationFrame(loop); }
        init(); loop();
    </script>
</body>

</html>
