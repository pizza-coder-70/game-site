<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Missile Command – The Pizza Edition</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        body {
            background: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Courier New', monospace;
            color: #fff
        }

        h1 {
            color: #f97316;
            font-size: 2rem;
            margin-bottom: 8px;
            text-shadow: 0 0 20px #f97316
        }

        canvas {
            border: 2px solid #f97316;
            box-shadow: 0 0 30px rgba(249, 115, 22, 0.4)
        }

        #hud {
            margin-top: 10px;
            color: #f97316
        }

        #ctrl {
            margin-top: 6px;
            color: #555;
            font-size: .8rem
        }
    </style>
</head>

<body>
    <h1>Missile Command</h1>
    <canvas id="c" width="600" height="450"></canvas>
    <div id="hud">Score: <span id="sc">0</span> &nbsp; Ammo: <span id="ammo">30</span> &nbsp; Cities: <span
            id="cit">6</span></div>
    <div id="ctrl">Click to shoot intercept missiles | R: restart</div>
    <script>
        const canvas = document.getElementById('c'), ctx = canvas.getContext('2d');
        const W = 600, H = 450;
        let missiles, interceptors, explosions, cities, score, ammo, over, frame = 0, spawnRate;
        function init() {
            missiles = []; interceptors = []; explosions = [];
            cities = [80, 160, 240, 360, 440, 520].map(x => ({ x, alive: true }));
            score = 0; ammo = 30; over = false; spawnRate = 120;
            document.getElementById('sc').textContent = 0;
            document.getElementById('ammo').textContent = 30;
            document.getElementById('cit').textContent = 6;
        }
        function spawnMissile() {
            const tx = 60 + Math.random() * (W - 120);
            missiles.push({ x: Math.random() * W, y: 0, tx, ty: H - 30, vx: 0, vy: 0, init: false });
            const m = missiles[missiles.length - 1]; const len = Math.hypot(m.tx - m.x, m.ty - m.y);
            m.vx = (m.tx - m.x) / len * 1.5; m.vy = (m.ty - m.y) / len * 1.5; m.init = true;
        }
        function addExplosion(x, y, r, color) { explosions.push({ x, y, r: 5, maxR: r || 40, color: color || '#f97316', fade: 1 }); }
        canvas.addEventListener('click', e => {
            if (over) return;
            if (ammo <= 0) return;
            const rect = canvas.getBoundingClientRect(), cx = e.clientX - rect.left, cy = e.clientY - rect.top;
            interceptors.push({ x: W / 2, y: H - 20, tx: cx, ty: cy, vx: 0, vy: 0 });
            const it = interceptors[interceptors.length - 1]; const len = Math.hypot(it.tx - it.x, it.ty - it.y);
            it.vx = (it.tx - it.x) / len * 6; it.vy = (it.ty - it.y) / len * 6;
            ammo--; document.getElementById('ammo').textContent = ammo;
        });
        document.addEventListener('keydown', e => { if (e.key === 'r' || e.key === 'R') init(); });
        function update() {
            if (over) return;
            frame++;
            if (frame % Math.max(40, spawnRate) === 0) { spawnMissile(); spawnRate -= 0.5; }
            missiles = missiles.filter(m => {
                m.x += m.vx; m.y += m.vy;
                if (m.y >= H - 30) {
                    const city = cities.find(c => c.alive && Math.abs(c.x - m.x) < 30);
                    if (city) { city.alive = false; addExplosion(m.x, H - 30, 50, '#ef4444'); document.getElementById('cit').textContent = cities.filter(c => c.alive).length; }
                    else addExplosion(m.x, H - 30, 30, '#666');
                    return false;
                }
                return true;
            });
            interceptors = interceptors.filter(it => {
                it.x += it.vx; it.y += it.vy;
                const near = Math.hypot(it.x - it.tx, it.y - it.ty);
                if (near < 8) { addExplosion(it.x, it.y, 60, '#facc15'); return false; }
                return it.x > 0 && it.x < W && it.y > 0 && it.y < H;
            });
            // check missiles vs explosions
            missiles = missiles.filter(m => {
                for (const ex of explosions) {
                    if (Math.hypot(m.x - ex.x, m.y - ex.y) < ex.r) { addExplosion(m.x, m.y, 20, '#4ade80'); score += 50; document.getElementById('sc').textContent = score; return false; }
                }
                return true;
            });
            explosions = explosions.filter(ex => { ex.r += 2; ex.fade -= 0.04; return ex.fade > 0; });
            if (cities.every(c => !c.alive)) over = true;
        }
        function draw() {
            ctx.fillStyle = '#000'; ctx.fillRect(0, 0, W, H);
            // stars
            for (let i = 0; i < 80; i++) { ctx.fillStyle = 'rgba(255,255,255,' + ((i % 3 + 1) * 0.2) + ')'; ctx.fillRect((i * 137) % W, (i * 53) % 380, 1, 1); }
            // ground
            ctx.fillStyle = '#1a3300'; ctx.fillRect(0, H - 30, W, 30);
            // cities
            cities.forEach(c => { if (!c.alive) return; ctx.fillStyle = '#4ade80'; ctx.fillRect(c.x - 15, H - 55, 30, 25); ctx.fillRect(c.x - 22, H - 45, 10, 15); ctx.fillRect(c.x + 12, H - 42, 10, 12); });
            // missiles
            missiles.forEach(m => { ctx.strokeStyle = '#f97316'; ctx.lineWidth = 2; ctx.beginPath(); ctx.moveTo(m.x, m.y); ctx.lineTo(m.x - m.vx * 10, m.y - m.vy * 10); ctx.stroke(); ctx.beginPath(); ctx.arc(m.x, m.y, 4, 0, Math.PI * 2); ctx.fillStyle = '#ef4444'; ctx.fill(); });
            // interceptors
            interceptors.forEach(it => { ctx.strokeStyle = '#22d3ee'; ctx.lineWidth = 2; ctx.beginPath(); ctx.moveTo(it.x, it.y); ctx.lineTo(it.x - it.vx * 5, it.y - it.vy * 5); ctx.stroke(); });
            // explosions
            explosions.forEach(ex => { ctx.beginPath(); ctx.arc(ex.x, ex.y, ex.r, 0, Math.PI * 2); ctx.fillStyle = `${ex.color}${Math.floor(ex.fade * 80).toString(16).padStart(2, '0')}`; ctx.fill(); });
            // launcher base
            ctx.fillStyle = '#64748b'; ctx.fillRect(W / 2 - 20, H - 25, 40, 20);
            if (over) { ctx.fillStyle = 'rgba(0,0,0,0.65)'; ctx.fillRect(0, 0, W, H); ctx.fillStyle = '#f97316'; ctx.font = 'bold 36px monospace'; ctx.textAlign = 'center'; ctx.fillText('GAME OVER', W / 2, H / 2 - 20); ctx.font = '20px monospace'; ctx.fillText(`Score: ${score}`, W / 2, H / 2 + 20); ctx.font = '16px monospace'; ctx.fillStyle = '#aaa'; ctx.fillText('Press R to restart', W / 2, H / 2 + 55); }
        }
        function loop() { update(); draw(); requestAnimationFrame(loop); }
        init(); loop();
    </script>
</body>

</html>
