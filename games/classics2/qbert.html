<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Q*bert – The Pizza Edition</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a1a; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; font-family: 'Courier New', monospace; color: #fff; }
  h1 { color: #f97316; font-size: 2rem; margin-bottom: 8px; text-shadow: 0 0 20px #f97316; }
  #info { color: #aaa; margin-bottom: 16px; font-size: 0.9rem; }
  canvas { border: 2px solid #f97316; border-radius: 8px; box-shadow: 0 0 30px rgba(249,115,22,0.4); }
  #score-board { margin-top: 14px; font-size: 1.1rem; color: #f97316; }
  #controls { margin-top: 10px; color: #666; font-size: 0.8rem; }
</style>
</head>
<body>
<h1>Q*bert</h1>
<div id="info">Hop all cubes to win!</div>
<canvas id="c" width="500" height="480"></canvas>
<div id="score-board">Score: <span id="sc">0</span> &nbsp;|&nbsp; Level: <span id="lv">1</span></div>
<div id="controls">Arrow Keys / WASD to move | R to restart</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const ROWS = 7;
const CW = 40, CH = 25;
const OFFSETX = 250, OFFSETY = 30;
let score = 0, level = 1, playerPos, cubeStates, targetHits, totalCubes, gameOver = false, won = false;

function cubeCount(rows) { let c=0; for(let r=0;r<rows;r++) c+=(r+1); return c; }

function init() {
  score = 0; level = 1; gameOver = false; won = false;
  playerPos = {row:0, col:0};
  cubeStates = [];
  for(let r=0;r<ROWS;r++) { cubeStates[r]=[]; for(let c=0;c<=r;c++) cubeStates[r][c]=0; }
  cubeStates[0][0] = 1;
  totalCubes = cubeCount(ROWS);
  updateScore();
}

function cubeXY(row, col) {
  const x = OFFSETX + (col - row/2) * CW;
  const y = OFFSETY + row * (CH + 5);
  return {x, y};
}

function drawCube(row, col, state) {
  const {x, y} = cubeXY(row, col);
  const colors = state === 0 ? ['#7c3aed','#5b21b6','#4c1d95'] : ['#f97316','#c2410c','#ea580c'];
  // top face
  ctx.beginPath();
  ctx.moveTo(x, y);
  ctx.lineTo(x + CW/2, y - CH/2);
  ctx.lineTo(x + CW, y);
  ctx.lineTo(x + CW/2, y + CH/2);
  ctx.closePath();
  ctx.fillStyle = colors[0]; ctx.fill();
  ctx.strokeStyle = '#0a0a1a'; ctx.lineWidth = 1; ctx.stroke();
  // left face
  ctx.beginPath();
  ctx.moveTo(x, y); ctx.lineTo(x + CW/2, y + CH/2); ctx.lineTo(x + CW/2, y + CH/2 + CH); ctx.lineTo(x, y + CH); ctx.closePath();
  ctx.fillStyle = colors[1]; ctx.fill(); ctx.stroke();
  // right face
  ctx.beginPath();
  ctx.moveTo(x + CW, y); ctx.lineTo(x + CW/2, y + CH/2); ctx.lineTo(x + CW/2, y + CH/2 + CH); ctx.lineTo(x + CW, y + CH); ctx.closePath();
  ctx.fillStyle = colors[2]; ctx.fill(); ctx.stroke();
}

function drawPlayer() {
  const {x, y} = cubeXY(playerPos.row, playerPos.col);
  const px = x + CW/2, py = y - CH/2 - 18;
  ctx.beginPath(); ctx.arc(px, py, 12, 0, Math.PI*2);
  ctx.fillStyle = '#fbbf24'; ctx.fill();
  ctx.strokeStyle = '#f59e0b'; ctx.lineWidth=2; ctx.stroke();
  ctx.fillStyle = '#0a0a1a'; ctx.font='10px monospace';
  ctx.fillText('@', px-5, py+4);
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  for(let r=0;r<ROWS;r++) for(let c=0;c<=r;c++) drawCube(r, c, cubeStates[r][c]);
  if(!gameOver && !won) drawPlayer();
  if(won) { ctx.fillStyle='rgba(0,0,0,0.6)'; ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle='#f97316'; ctx.font='bold 36px monospace'; ctx.textAlign='center';
    ctx.fillText('YOU WIN!', 250, 220); ctx.font='18px monospace'; ctx.fillText('Press R to restart', 250, 260); }
  if(gameOver) { ctx.fillStyle='rgba(0,0,0,0.6)'; ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle='#ef4444'; ctx.font='bold 36px monospace'; ctx.textAlign='center';
    ctx.fillText('GAME OVER', 250, 220); ctx.font='18px monospace'; ctx.fillText('Press R to restart', 250, 260); }
}

function updateScore() { document.getElementById('sc').textContent = score; document.getElementById('lv').textContent = level; }

function countHit() { let h=0; for(let r=0;r<ROWS;r++) for(let c=0;c<=r;c++) if(cubeStates[r][c]===1) h++; return h; }

function move(dr, dc) {
  if(gameOver || won) return;
  const nr = playerPos.row + dr, nc = playerPos.col + dc;
  if(nr < 0 || nr >= ROWS || nc < 0 || nc > nr) { gameOver = true; draw(); return; }
  playerPos = {row: nr, col: nc};
  if(cubeStates[nr][nc] === 0) { cubeStates[nr][nc] = 1; score += 25; }
  updateScore();
  if(countHit() === totalCubes) { won = true; score += 500; updateScore(); }
  draw();
}

document.addEventListener('keydown', e => {
  if(e.key === 'r' || e.key === 'R') { init(); draw(); return; }
  if(e.key==='ArrowLeft'||e.key==='a'||e.key==='A') move(1, 0);
  else if(e.key==='ArrowRight'||e.key==='d'||e.key==='D') move(1, 1);
  else if(e.key==='ArrowUp'||e.key==='w'||e.key==='W') move(-1, 0);
  else if(e.key==='ArrowDown'||e.key==='s'||e.key==='S') move(-1, -1);
});

init(); draw();
</script>
</body>
</html>
