<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Neon Golf – The Pizza Edition</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        body {
            background: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Courier New', monospace;
            color: #fff
        }

        h1 {
            color: #4ade80;
            font-size: 2rem;
            margin-bottom: 8px;
            text-shadow: 0 0 20px #4ade80
        }

        canvas {
            border: 2px solid #4ade80;
            box-shadow: 0 0 30px rgba(74, 222, 128, 0.4)
        }

        #hud {
            margin-top: 10px;
            color: #4ade80
        }

        #ctrl {
            margin-top: 6px;
            color: #555;
            font-size: .8rem
        }
    </style>
</head>

<body>
    <h1>⛳ Neon Golf</h1>
    <canvas id="c" width="600" height="450"></canvas>
    <div id="hud">Hole: <span id="hl">1</span> / 6 &nbsp; Strokes: <span id="st">0</span> &nbsp; Par: <span
            id="par">3</span></div>
    <div id="ctrl">Hold & drag to aim, release to shoot | R: restart hole</div>
    <script>
        const canvas = document.getElementById('c'), ctx = canvas.getContext('2d');
        const W = 600, H = 450;
        const HOLES = [
            { ballX: 80, ballY: 350, holeX: 520, holeY: 100, walls: [{ x: 200, y: 200, w: 160, h: 20 }, { x: 350, y: 300, w: 20, h: 100 }], par: 3 },
            { ballX: 60, ballY: 400, holeX: 540, holeY: 50, walls: [{ x: 150, y: 100, w: 20, h: 200 }, { x: 400, y: 250, w: 160, h: 20 }], par: 4 },
            { ballX: 300, ballY: 400, holeX: 300, holeY: 50, walls: [{ x: 100, y: 200, w: 200, h: 20 }, { x: 300, y: 200, w: 200, h: 20 }], par: 3 },
            { ballX: 50, ballY: 225, holeX: 550, holeY: 225, walls: [{ x: 200, y: 50, w: 20, h: 175 }, { x: 380, y: 225, w: 20, h: 175 }], par: 4 },
            { ballX: 80, ballY: 80, holeX: 520, holeY: 370, walls: [{ x: 150, y: 200, w: 300, h: 20 }, { x: 200, y: 50, w: 20, h: 150 }, { x: 380, y: 220, w: 20, h: 150 }], par: 5 },
            { ballX: 300, ballY: 420, holeX: 300, holeY: 30, walls: [{ x: 100, y: 200, w: 100, h: 20 }, { x: 400, y: 200, w: 100, h: 20 }, { x: 250, y: 100, w: 100, h: 20 }], par: 4 },
        ];
        let ball, holeIdx, strokes, dragging, dragStart, trail, over;
        function initHole(i) {
            const h = HOLES[i]; ball = { x: h.ballX, y: h.ballY, vx: 0, vy: 0, r: 10 };
            strokes = 0; dragging = false; trail = []; over = false;
            document.getElementById('hl').textContent = i + 1; document.getElementById('st').textContent = 0; document.getElementById('par').textContent = h.par;
        }
        function init() { holeIdx = 0; initHole(0); }
        document.addEventListener('keydown', e => { if (e.key === 'r' || e.key === 'R') initHole(holeIdx); });
        canvas.addEventListener('mousedown', e => { if (over) return; const r = canvas.getBoundingClientRect(); dragStart = { x: e.clientX - r.left, y: e.clientY - r.top }; dragging = true; });
        canvas.addEventListener('mouseup', e => {
            if (!dragging || over) return; dragging = false; const r = canvas.getBoundingClientRect();
            const ex = e.clientX - r.left, ey = e.clientY - r.top;
            const dx = dragStart.x - ex, dy = dragStart.y - ey;
            const power = Math.min(Math.hypot(dx, dy) / 8, 12);
            ball.vx = dx / Math.hypot(dx, dy) * power; ball.vy = dy / Math.hypot(dx, dy) * power;
            strokes++; document.getElementById('st').textContent = strokes;
        });
        const WALLS = () => HOLES[holeIdx].walls;
        function checkWall(b) {
            for (const w of WALLS()) {
                if (b.x + b.r > w.x && b.x - b.r < w.x + w.w && b.y + b.r > w.y && b.y - b.r < w.y + w.h) {
                    // find which side
                    const fromL = Math.abs(b.x + b.r - w.x), fromR = Math.abs(b.x - b.r - w.x - w.w);
                    const fromT = Math.abs(b.y + b.r - w.y), fromB = Math.abs(b.y - b.r - w.y - w.h);
                    const min = Math.min(fromL, fromR, fromT, fromB);
                    if (min === fromL) { b.x = w.x - b.r; b.vx *= -0.7; }
                    else if (min === fromR) { b.x = w.x + w.w + b.r; b.vx *= -0.7; }
                    else if (min === fromT) { b.y = w.y - b.r; b.vy *= -0.7; }
                    else { b.y = w.y + w.h + b.r; b.vy *= -0.7; }
                }
            }
        }
        function update() {
            if (over) return;
            ball.vx *= 0.98; ball.vy *= 0.98; ball.x += ball.vx; ball.y += ball.vy;
            if (ball.x - ball.r < 0) { ball.x = ball.r; ball.vx *= -0.7; }
            if (ball.x + ball.r > W) { ball.x = W - ball.r; ball.vx *= -0.7; }
            if (ball.y - ball.r < 0) { ball.y = ball.r; ball.vy *= -0.7; }
            if (ball.y + ball.r > H) { ball.y = H - ball.r; ball.vy *= -0.7; }
            checkWall(ball);
            trail.push({ x: ball.x, y: ball.y }); if (trail.length > 20) trail.shift();
            const hole = HOLES[holeIdx];
            if (Math.hypot(ball.x - hole.holeX, ball.y - hole.holeY) < 16) {
                over = true; setTimeout(() => { holeIdx++; if (holeIdx >= HOLES.length) { alert(`All holes done! Total: ${strokes} strokes`); init(); } else initHole(holeIdx); }, 1200);
            }
        }
        function draw() {
            ctx.fillStyle = '#0a1a0a'; ctx.fillRect(0, 0, W, H);
            // fairway
            const grad = ctx.createLinearGradient(0, 0, W, H); grad.addColorStop(0, '#052e16'); grad.addColorStop(1, '#166534'); ctx.fillStyle = grad; ctx.fillRect(0, 0, W, H);
            WALLS().forEach(w => { ctx.fillStyle = '#374151'; ctx.fillRect(w.x, w.y, w.w, w.h); ctx.fillStyle = '#4b5563'; ctx.fillRect(w.x + 2, w.y + 2, w.w - 4, w.h - 4); });
            const hole = HOLES[holeIdx];
            ctx.beginPath(); ctx.arc(hole.holeX, hole.holeY, 14, 0, Math.PI * 2); ctx.fillStyle = '#000'; ctx.fill(); ctx.strokeStyle = '#4ade80'; ctx.lineWidth = 2; ctx.stroke();
            ctx.fillStyle = '#ef4444'; ctx.fillRect(hole.holeX - 1, hole.holeY - 30, 3, 30); ctx.font = '16px monospace'; ctx.fillText('🚩', hole.holeX - 8, hole.holeY - 30);
            trail.forEach((t, i) => { ctx.beginPath(); ctx.arc(t.x, t.y, ball.r * (i / trail.length) * 0.6, 0, Math.PI * 2); ctx.fillStyle = `rgba(74,222,128,${i / trail.length * 0.3})`; ctx.fill(); });
            const bg = ctx.createRadialGradient(ball.x, ball.y, 0, ball.x, ball.y, ball.r); bg.addColorStop(0, '#fff'); bg.addColorStop(1, '#4ade80'); ctx.beginPath(); ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2); ctx.fillStyle = bg; ctx.fill();
            if (dragging && dragStart) { const mx = dragStart.x, my = dragStart.y; ctx.strokeStyle = 'rgba(255,255,255,0.4)'; ctx.lineWidth = 2; ctx.setLineDash([4, 4]); ctx.beginPath(); ctx.moveTo(ball.x, ball.y); ctx.lineTo(ball.x + (ball.x - mx), ball.y + (ball.y - my)); ctx.stroke(); ctx.setLineDash([]); }
            if (over) { ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.fillRect(0, 0, W, H); ctx.fillStyle = '#4ade80'; ctx.font = 'bold 28px monospace'; ctx.textAlign = 'center'; ctx.fillText('🎉 Hole Complete!', W / 2, H / 2 - 20); ctx.font = '18px monospace'; ctx.fillText(`${strokes} strokes`, W / 2, H / 2 + 20); }
        }
        function loop() { update(); draw(); requestAnimationFrame(loop); }
        init(); loop();
    </script>
</body>

</html>
