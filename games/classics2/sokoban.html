<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Sokoban – The Pizza Edition</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        body {
            background: #0a0a1a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Courier New', monospace;
            color: #fff
        }

        h1 {
            color: #22d3ee;
            font-size: 2rem;
            margin-bottom: 8px;
            text-shadow: 0 0 20px #22d3ee
        }

        canvas {
            border: 2px solid #22d3ee;
            box-shadow: 0 0 30px rgba(34, 211, 238, 0.4)
        }

        #hud {
            margin-top: 10px;
            color: #22d3ee
        }

        #ctrl {
            margin-top: 6px;
            color: #555;
            font-size: .8rem
        }
    </style>
</head>

<body>
    <h1>Sokoban</h1>
    <canvas id="c" width="560" height="420"></canvas>
    <div id="hud">Moves: <span id="mv">0</span> &nbsp; Level: <span id="lv">1</span></div>
    <div id="ctrl">Arrow Keys / WASD to push boxes | R: restart | N: next level</div>
    <script>
        const canvas = document.getElementById('c'), ctx = canvas.getContext('2d');
        const CS = 56;
        // '#'=wall, '.'=goal, '@'=player, '$'=box, '+'=player on goal, '*'=box on goal, ' '=floor
        const LEVELS = [
            `########
#@ $ . #
#      #
# $ .  #
#      #
########`,
            `#######
#@    #
#  $  #
#. $. #
#  $  #
#.    #
#######`,
            `########
# .  $ #
# @    #
# $ .  #
#      #
########`,
        ];
        let level, playerPos, map, moves;
        function parse(str) {
            const rows = str.split('\n');
            const m = rows.map(r => r.split(''));
            let p = { x: 0, y: 0 };
            for (let y = 0; y < m.length; y++)for (let x = 0; x < m[y].length; x++)if (m[y][x] === '@' || m[y][x] === '+') { p = { x, y }; }
            return { m, p };
        }
        function init(lvl) {
            level = lvl % LEVELS.length;
            const r = parse(LEVELS[level]);
            map = r.m; playerPos = r.p; moves = 0;
            document.getElementById('lv').textContent = level + 1; document.getElementById('mv').textContent = 0;
        }
        document.addEventListener('keydown', e => {
            if (e.key === 'r' || e.key === 'R') { init(level); return; }
            if (e.key === 'n' || e.key === 'N') { init(level + 1); return; }
            let dx = 0, dy = 0;
            if (e.key === 'ArrowLeft' || e.key === 'a') dx = -1;
            else if (e.key === 'ArrowRight' || e.key === 'd') dx = 1;
            else if (e.key === 'ArrowUp' || e.key === 'w') dy = -1;
            else if (e.key === 'ArrowDown' || e.key === 's') dy = 1;
            else return;
            e.preventDefault();
            const px = playerPos.x + dx, py = playerPos.y + dy;
            if (!map[py] || !map[py][px]) return;
            const dest = map[py][px];
            if (dest === '#') return;
            const isBox = dest === '$' || dest === '*';
            if (isBox) {
                const bx = px + dx, by = py + dy;
                if (!map[by] || !map[by][bx]) return;
                const bd = map[by][bx];
                if (bd === '#' || bd === '$' || bd === '*') return;
                map[by][bx] = bd === '.' ? '*' : '$';
                map[py][px] = map[py][px] === '*' ? '.' : ' ';
            }
            // move player
            const cur = map[playerPos.y][playerPos.x];
            map[playerPos.y][playerPos.x] = cur === '+' ? '.' : ' ';
            map[py][px] = (map[py][px] === '.' || map[py][px] === '*') ? '+' : '@';
            if (isBox) map[py][px] = map[py][px] === '.' ? '+' : '@';
            playerPos = { x: px, y: py }; moves++; document.getElementById('mv').textContent = moves;
            // check win
            if (map.every(row => !row.includes('$'))) { setTimeout(() => { alert(`Level ${level + 1} Complete! Press N for next level.`); }, 100); }
        });
        const COLORS = { '#': '#1e3a5f', '.': '#064e3b', '@': '#facc15', '+': '#facc15', '$': '#f97316', '*': '#4ade80', ' ': '#0f172a' };
        function draw() {
            ctx.fillStyle = '#0a0a1a'; ctx.fillRect(0, 0, canvas.width, canvas.height);
            if (!map) return;
            const offsetX = (canvas.width - map[0].length * CS) / 2, offsetY = (canvas.height - map.length * CS) / 2;
            for (let y = 0; y < map.length; y++) {
                for (let x = 0; x < map[y].length; x++) {
                    const c = map[y][x] || ' ';
                    const cx = offsetX + x * CS, cy = offsetY + y * CS;
                    ctx.fillStyle = COLORS[c] || '#0f172a'; ctx.fillRect(cx, cy, CS, CS);
                    if (c === '#') { ctx.fillStyle = '#1e40af'; ctx.fillRect(cx + 2, cy + 2, CS - 4, CS - 4); }
                    if (c === '.') { ctx.strokeStyle = '#22d3ee'; ctx.lineWidth = 3; ctx.strokeRect(cx + 8, cy + 8, CS - 16, CS - 16); }
                    if (c === '$' || c === '*') { const sc = c === '*' ? '#4ade80' : '#f97316'; ctx.fillStyle = sc; ctx.beginPath(); ctx.roundRect(cx + 6, cy + 6, CS - 12, CS - 12, 6); ctx.fill(); }
                    if (c === '@' || c === '+') { ctx.font = `${CS - 8}px monospace`; ctx.textAlign = 'center'; ctx.fillText('😊', cx + CS / 2, cy + CS - 4); }
                }
            }
        }
        function loop() { draw(); requestAnimationFrame(loop); }
        init(0); loop();
    </script>
</body>

</html>
