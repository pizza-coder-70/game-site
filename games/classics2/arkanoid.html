<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Arkanoid – The Pizza Edition</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        body {
            background: #0a0010;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Courier New', monospace;
            color: #fff
        }

        h1 {
            color: #e879f9;
            font-size: 2rem;
            margin-bottom: 8px;
            text-shadow: 0 0 20px #e879f9
        }

        canvas {
            border: 2px solid #e879f9;
            box-shadow: 0 0 30px rgba(232, 121, 249, 0.4)
        }

        #hud {
            margin-top: 10px;
            color: #e879f9
        }

        #ctrl {
            margin-top: 6px;
            color: #555;
            font-size: .8rem
        }
    </style>
</head>

<body>
    <h1>Arkanoid</h1>
    <canvas id="c" width="480" height="520"></canvas>
    <div id="hud">Score: <span id="sc">0</span> &nbsp; Lives: <span id="li">3</span></div>
    <div id="ctrl">Mouse / Arrow Keys to move paddle | Click or Space to launch | R: restart</div>
    <script>
        const canvas = document.getElementById('c'), ctx = canvas.getContext('2d');
        const W = 480, H = 520, ROWS = 6, COLS = 9, BW = 48, BH = 18, GAP = 2;
        const COLORS = ['#ef4444', '#f97316', '#eab308', '#22c55e', '#3b82f6', '#a855f7'];
        let paddle, ball, bricks, score, lives, over, won, launched;
        function makeBricks() { return Array.from({ length: ROWS }, (_, r) => Array.from({ length: COLS }, (_, c) => ({ x: c * (BW + GAP) + 8, y: r * (BH + GAP) + 50, alive: true, color: COLORS[r] }))); }
        function init() {
            paddle = { x: W / 2 - 40, y: H - 30, w: 80, h: 12 };
            ball = { x: W / 2, y: H - 50, vx: 3, vy: -3, r: 7 };
            bricks = makeBricks(); score = 0; lives = 3; over = false; won = false; launched = false;
            document.getElementById('sc').textContent = 0; document.getElementById('li').textContent = 3;
        }
        canvas.addEventListener('mousemove', e => { const rect = canvas.getBoundingClientRect(); paddle.x = e.clientX - rect.left - paddle.w / 2; });
        document.addEventListener('keydown', e => {
            if (e.key === 'r' || e.key === 'R') init();
            if ((e.key === ' ' || e.key === 'Space') && !launched) launched = true;
            if (e.key === 'ArrowLeft') paddle.x -= 20;
            if (e.key === 'ArrowRight') paddle.x += 20;
            e.preventDefault();
        });
        canvas.addEventListener('click', () => { if (!launched) launched = true; });
        function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
        function update() {
            if (over || won) return;
            paddle.x = clamp(paddle.x, 0, W - paddle.w);
            if (!launched) { ball.x = paddle.x + paddle.w / 2; ball.y = paddle.y - ball.r - 2; return; }
            ball.x += ball.vx; ball.y += ball.vy;
            if (ball.x - ball.r < 0 || ball.x + ball.r > W) ball.vx *= -1;
            if (ball.y - ball.r < 0) ball.vy *= -1;
            if (ball.y + ball.r > H) { lives--; document.getElementById('li').textContent = lives; launched = false; if (lives <= 0) over = true; return; }
            // paddle
            if (ball.y + ball.r >= paddle.y && ball.y + ball.r <= paddle.y + paddle.h && ball.x >= paddle.x && ball.x <= paddle.x + paddle.w) {
                ball.vy = -Math.abs(ball.vy); ball.vx += (ball.x - (paddle.x + paddle.w / 2)) * 0.08;
            }
            // bricks
            for (const row of bricks) {
                for (const b of row) {
                    if (!b.alive) continue;
                    if (ball.x + ball.r > b.x && ball.x - ball.r < b.x + BW && ball.y + ball.r > b.y && ball.y - ball.r < b.y + BH) {
                        b.alive = false; ball.vy *= -1; score += 10; document.getElementById('sc').textContent = score;
                    }
                }
            }
            if (bricks.every(r => r.every(b => !b.alive))) won = true;
            ball.vx = clamp(ball.vx, -6, 6); ball.vy = clamp(ball.vy, -7, -2);
        }
        function draw() {
            ctx.fillStyle = '#0a0010'; ctx.fillRect(0, 0, W, H);
            bricks.forEach(row => row.forEach(b => { if (!b.alive) return; ctx.fillStyle = b.color; ctx.fillRect(b.x, b.y, BW, BH); ctx.strokeStyle = 'rgba(0,0,0,0.3)'; ctx.strokeRect(b.x, b.y, BW, BH); }));
            ctx.fillStyle = '#e879f9'; ctx.beginPath(); ctx.roundRect(paddle.x, paddle.y, paddle.w, paddle.h, 6); ctx.fill();
            ctx.beginPath(); ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2); ctx.fillStyle = '#fff'; ctx.fill();
            if (won) { ctx.fillStyle = 'rgba(0,0,0,0.6)'; ctx.fillRect(0, 0, W, H); ctx.fillStyle = '#e879f9'; ctx.font = 'bold 36px monospace'; ctx.textAlign = 'center'; ctx.fillText('YOU WIN!', W / 2, H / 2 - 20); ctx.font = '18px monospace'; ctx.fillText('Press R to restart', W / 2, H / 2 + 20); }
            if (over) { ctx.fillStyle = 'rgba(0,0,0,0.6)'; ctx.fillRect(0, 0, W, H); ctx.fillStyle = '#ef4444'; ctx.font = 'bold 36px monospace'; ctx.textAlign = 'center'; ctx.fillText('GAME OVER', W / 2, H / 2 - 20); ctx.font = '18px monospace'; ctx.fillStyle = '#fff'; ctx.fillText('Press R to restart', W / 2, H / 2 + 20); }
        }
        function loop() { update(); draw(); requestAnimationFrame(loop); }
        init(); loop();
    </script>
</body>

</html>
