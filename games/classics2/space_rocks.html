<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Space Rocks – The Pizza Edition</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        body {
            background: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Courier New', monospace;
            color: #fff
        }

        h1 {
            color: #38bdf8;
            font-size: 2rem;
            margin-bottom: 8px;
            text-shadow: 0 0 20px #38bdf8
        }

        canvas {
            border: 2px solid #38bdf8;
            box-shadow: 0 0 30px rgba(56, 189, 248, 0.4)
        }

        #hud {
            margin-top: 10px;
            color: #38bdf8;
            font-size: 1rem
        }

        #ctrl {
            margin-top: 6px;
            color: #555;
            font-size: .8rem
        }
    </style>
</head>

<body>
    <h1>Space Rocks</h1>
    <canvas id="c" width="600" height="500"></canvas>
    <div id="hud">Score: <span id="sc">0</span> &nbsp; Lives: <span id="li">3</span></div>
    <div id="ctrl">Arrow Keys: steer | Up: thrust | Space: shoot | R: restart</div>
    <script>
        const canvas = document.getElementById('c'), ctx = canvas.getContext('2d');
        const W = 600, H = 500;
        let ship, bullets, rocks, score, lives, keys, frame, over, started;

        function vec(x, y) { return { x, y }; }
        function rand(a, b) { return a + Math.random() * (b - a); }
        function wrap(obj) { if (obj.x < 0) obj.x = W; if (obj.x > W) obj.x = 0; if (obj.y < 0) obj.y = H; if (obj.y > H) obj.y = 0; }

        function makeRock(x, y, r) { return { x: x || rand(0, W), y: y || rand(0, H), vx: rand(-1.5, 1.5), vy: rand(-1.5, 1.5), r: r || rand(30, 50), a: rand(0, Math.PI * 2), va: rand(-.02, .02), pts: Array.from({ length: 10 }, () => rand(0.7, 1.3)) }; }

        function init() {
            ship = { x: 300, y: 250, a: -Math.PI / 2, vx: 0, vy: 0, inv: 180 };
            bullets = []; score = 0; lives = 3; over = false; started = true;
            rocks = Array.from({ length: 5 }, () => makeRock());
            keys = {};
            document.getElementById('sc').textContent = 0;
            document.getElementById('li').textContent = 3;
        }

        document.addEventListener('keydown', e => { keys[e.key] = true; if (e.key === 'r' || e.key === 'R') init(); e.preventDefault(); });
        document.addEventListener('keyup', e => { keys[e.key] = false; });

        let shotCool = 0;
        function update() {
            if (over || !started) return;
            if (keys['ArrowLeft']) ship.a -= 0.05;
            if (keys['ArrowRight']) ship.a += 0.05;
            if (keys['ArrowUp']) { ship.vx += Math.cos(ship.a) * 0.2; ship.vy += Math.sin(ship.a) * 0.2; }
            ship.vx *= 0.99; ship.vy *= 0.99;
            ship.x += ship.vx; ship.y += ship.vy; wrap(ship);
            if (ship.inv > 0) ship.inv--;
            shotCool--;
            if ((keys[' '] || keys['Space']) && shotCool <= 0) {
                bullets.push({ x: ship.x + Math.cos(ship.a) * 18, y: ship.y + Math.sin(ship.a) * 18, vx: Math.cos(ship.a) * 8 + ship.vx, vy: Math.sin(ship.a) * 8 + ship.vy, life: 60 });
                shotCool = 12;
            }
            bullets = bullets.filter(b => { b.x += b.vx; b.y += b.vy; b.life--; wrap(b); return b.life > 0; });
            rocks.forEach(rock => { rock.x += rock.vx; rock.y += rock.vy; rock.a += rock.va; wrap(rock); });
            // collision bullets vs rocks
            for (let bi = bullets.length - 1; bi >= 0; bi--) {
                for (let ri = rocks.length - 1; ri >= 0; ri--) {
                    const b = bullets[bi], r = rocks[ri];
                    if (Math.hypot(b.x - r.x, b.y - r.y) < r.r) {
                        bullets.splice(bi, 1);
                        if (r.r > 20) { rocks.push(makeRock(r.x, r.y, r.r / 2)); rocks.push(makeRock(r.x, r.y, r.r / 2)); }
                        rocks.splice(ri, 1); score += 10;
                        document.getElementById('sc').textContent = score;
                        break;
                    }
                }
            }
            // collision ship vs rocks
            if (ship.inv === 0) {
                for (const r of rocks) {
                    if (Math.hypot(ship.x - r.x, ship.y - r.y) < r.r - 5) {
                        lives--; document.getElementById('li').textContent = lives;
                        ship.vx = 0; ship.vy = 0; ship.x = 300; ship.y = 250; ship.inv = 180;
                        if (lives <= 0) { over = true; }
                        break;
                    }
                }
            }
            if (rocks.length === 0) rocks = Array.from({ length: 5 + Math.floor(score / 100) }, () => makeRock());
        }

        function draw() {
            ctx.fillStyle = '#000'; ctx.fillRect(0, 0, W, H);
            // rocks
            rocks.forEach(r => {
                ctx.save(); ctx.translate(r.x, r.y); ctx.rotate(r.a);
                ctx.beginPath();
                r.pts.forEach((p, i) => { const ang = i / r.pts.length * Math.PI * 2; const px = Math.cos(ang) * r.r * p, py = Math.sin(ang) * r.r * p; i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py); });
                ctx.closePath(); ctx.strokeStyle = '#38bdf8'; ctx.lineWidth = 2; ctx.stroke(); ctx.restore();
            });
            // bullets
            bullets.forEach(b => { ctx.beginPath(); ctx.arc(b.x, b.y, 3, 0, Math.PI * 2); ctx.fillStyle = '#facc15'; ctx.fill(); });
            // ship
            if (!over && (ship.inv % 10 < 7)) {
                ctx.save(); ctx.translate(ship.x, ship.y); ctx.rotate(ship.a);
                ctx.beginPath(); ctx.moveTo(18, 0); ctx.lineTo(-12, 10); ctx.lineTo(-8, 0); ctx.lineTo(-12, -10); ctx.closePath();
                ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.stroke();
                if (keys['ArrowUp']) { ctx.beginPath(); ctx.moveTo(-8, 0); ctx.lineTo(-20, 0); ctx.strokeStyle = '#f97316'; ctx.lineWidth = 3; ctx.stroke(); }
                ctx.restore();
            }
            if (over) { ctx.fillStyle = 'rgba(0,0,0,0.6)'; ctx.fillRect(0, 0, W, H); ctx.fillStyle = '#38bdf8'; ctx.font = 'bold 36px monospace'; ctx.textAlign = 'center'; ctx.fillText('GAME OVER', W / 2, H / 2 - 20); ctx.font = '18px monospace'; ctx.fillText('Press R to restart', W / 2, H / 2 + 20); }
            if (!started) { ctx.fillStyle = '#38bdf8'; ctx.font = 'bold 28px monospace'; ctx.textAlign = 'center'; ctx.fillText('Press R to Start', W / 2, H / 2); }
        }

        function loop() { update(); draw(); requestAnimationFrame(loop); }
        loop();
    </script>
</body>

</html>
