<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Tron Light Cycle – The Pizza Edition</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        body {
            background: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Courier New', monospace;
            color: #0ff
        }

        h1 {
            color: #0ff;
            font-size: 2rem;
            margin-bottom: 8px;
            text-shadow: 0 0 20px #0ff
        }

        #info {
            color: #aaa;
            margin-bottom: 12px;
            font-size: .9rem
        }

        canvas {
            border: 2px solid #0ff;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.5)
        }

        #hud {
            margin-top: 10px;
            font-size: 1rem;
            color: #0ff
        }

        #ctrl {
            margin-top: 6px;
            color: #555;
            font-size: .8rem
        }
    </style>
</head>

<body>
    <h1>TRON Light Cycle</h1>
    <div id="info">Don't hit walls or trails!</div>
    <canvas id="c" width="600" height="400"></canvas>
    <div id="hud">Score: <span id="sc">0</span></div>
    <div id="ctrl">WASD = You (Cyan) &nbsp;|&nbsp; Arrow Keys = Enemy (Red) &nbsp;|&nbsp; R = Restart</div>
    <script>
        const canvas = document.getElementById('c'), ctx = canvas.getContext('2d');
        const CELL = 10, COLS = 60, ROWS = 40;
        let p1, p2, trail1, trail2, score, gOver, interval, winner;

        function init() {
            p1 = { x: 15, y: 20, dx: 1, dy: 0 };
            p2 = { x: 45, y: 20, dx: -1, dy: 0 };
            trail1 = new Set(); trail2 = new Set();
            score = 0; gOver = false;
            trail1.add(`15,20`); trail2.add(`45,20`);
            clearInterval(interval);
            interval = setInterval(tick, 80);
        }

        function key(k) { return `${k.x},${k.y}`; }

        function move(p) { p.x += p.dx; p.y += p.dy; }

        function checkHit(p, own, opp) {
            if (p.x < 0 || p.x >= COLS || p.y < 0 || p.y >= ROWS) return true;
            if (own.has(key(p))) return true;
            if (opp.has(key(p))) return true;
            return false;
        }

        function ai() {
            const dirs = [{ dx: 1, dy: 0 }, { dx: -1, dy: 0 }, { dx: 0, dy: 1 }, { dx: 0, dy: -1 }];
            const valid = dirs.filter(d => {
                if (d.dx === -p2.dx && d.dy === -p2.dy) return false;
                const nx = p2.x + d.dx, ny = p2.y + d.dy;
                if (nx < 0 || nx >= COLS || ny < 0 || ny >= ROWS) return false;
                const nk = `${nx},${ny}`;
                return !trail1.has(nk) && !trail2.has(nk);
            });
            if (valid.length > 0) {
                // chase p1
                const best = valid.reduce((a, d) => {
                    const dist = Math.abs((p2.x + d.dx) - p1.x) + Math.abs((p2.y + d.dy) - p1.y);
                    return dist < a.dist ? { d, dist } : { ...a };
                }, { d: valid[0], dist: 9999 });
                p2.dx = best.d.dx; p2.dy = best.d.dy;
            }
        }

        function tick() {
            ai();
            move(p1); move(p2);
            const h1 = checkHit(p1, trail1, trail2);
            const h2 = checkHit(p2, trail2, trail1);
            if (h1 || h2) { gOver = true; winner = h1 && h2 ? 0 : h2 ? 1 : 2; clearInterval(interval); draw(); return; }
            trail1.add(key(p1)); trail2.add(key(p2));
            score++;
            document.getElementById('sc').textContent = score;
            draw();
        }

        document.addEventListener('keydown', e => {
            if (e.key === 'r' || e.key === 'R') { init(); return; }
            if (e.key === 'w' && p1.dy !== 1) { p1.dx = 0; p1.dy = -1; }
            else if (e.key === 's' && p1.dy !== -1) { p1.dx = 0; p1.dy = 1; }
            else if (e.key === 'a' && p1.dx !== 1) { p1.dx = -1; p1.dy = 0; }
            else if (e.key === 'd' && p1.dx !== -1) { p1.dx = 1; p1.dy = 0; }
            if (e.key === 'ArrowUp' && p2.dy !== 1) { p2.dx = 0; p2.dy = -1; }
            else if (e.key === 'ArrowDown' && p2.dy !== -1) { p2.dx = 0; p2.dy = 1; }
            else if (e.key === 'ArrowLeft' && p2.dx !== 1) { p2.dx = -1; p2.dy = 0; }
            else if (e.key === 'ArrowRight' && p2.dx !== -1) { p2.dx = 1; p2.dy = 0; }
            e.preventDefault();
        });

        function draw() {
            ctx.fillStyle = '#000'; ctx.fillRect(0, 0, canvas.width, canvas.height);
            trail1.forEach(k => { const [x, y] = k.split(','); ctx.fillStyle = 'rgba(0,255,255,0.7)'; ctx.fillRect(+x * CELL, +y * CELL, CELL - 1, CELL - 1); });
            trail2.forEach(k => { const [x, y] = k.split(','); ctx.fillStyle = 'rgba(255,50,50,0.7)'; ctx.fillRect(+x * CELL, +y * CELL, CELL - 1, CELL - 1); });
            if (!gOver) {
                ctx.fillStyle = '#0ff'; ctx.fillRect(p1.x * CELL, p1.y * CELL, CELL - 1, CELL - 1);
                ctx.fillStyle = '#f55'; ctx.fillRect(p2.x * CELL, p2.y * CELL, CELL - 1, CELL - 1);
            }
            if (gOver) {
                ctx.fillStyle = 'rgba(0,0,0,0.6)'; ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.font = 'bold 36px monospace'; ctx.textAlign = 'center';
                if (winner === 1) { ctx.fillStyle = '#0ff'; ctx.fillText('YOU WIN!', 300, 170); ctx.font = '20px monospace'; ctx.fillText('Player 1 (Cyan) Wins!', 300, 210); }
                else if (winner === 2) { ctx.fillStyle = '#f55'; ctx.fillText('GAME OVER', 300, 170); ctx.font = '20px monospace'; ctx.fillStyle = '#aaa'; ctx.fillText('Player 2 (Red) Wins', 300, 210); }
                else { ctx.fillStyle = '#facc15'; ctx.fillText('DRAW!', 300, 170); }
                ctx.font = '16px monospace'; ctx.fillStyle = '#666'; ctx.fillText('Press R to restart', 300, 250);
            }
        }

        init();
    </script>
</body>

</html>
