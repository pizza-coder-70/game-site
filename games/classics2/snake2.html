<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Snake 2 – The Pizza Edition</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        body {
            background: #0a1a0a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Courier New', monospace;
            color: #4ade80
        }

        h1 {
            color: #4ade80;
            font-size: 2rem;
            margin-bottom: 8px;
            text-shadow: 0 0 20px #4ade80
        }

        canvas {
            border: 2px solid #4ade80;
            box-shadow: 0 0 30px rgba(74, 222, 128, 0.4)
        }

        #hud {
            margin-top: 10px
        }

        #ctrl {
            margin-top: 6px;
            color: #555;
            font-size: .8rem
        }
    </style>
</head>

<body>
    <h1>Snake Extreme</h1>
    <canvas id="c" width="500" height="500"></canvas>
    <div id="hud">Score: <span id="sc">0</span> &nbsp; High Score: <span id="hs">0</span></div>
    <div id="ctrl">Arrow Keys / WASD | R: restart | Game speeds up over time!</div>
    <script>
        const canvas = document.getElementById('c'), ctx = canvas.getContext('2d');
        const CS = 20, COLS = 25, ROWS = 25;
        let snake, dir, food, bonus, score, hs = 0, over, interval, speed;
        function rand(n) { return Math.floor(Math.random() * n); }
        function placeFood() { return { x: rand(COLS), y: rand(ROWS), bonus: Math.random() < 0.15 }; }
        function init() {
            snake = [{ x: 12, y: 12 }, { x: 11, y: 12 }, { x: 10, y: 12 }];
            dir = { x: 1, y: 0 }; food = placeFood(); bonus = null; score = 0; over = false; speed = 200;
            clearInterval(interval); interval = setInterval(tick, speed);
            document.getElementById('sc').textContent = 0;
        }
        document.addEventListener('keydown', e => {
            if (e.key === 'r' || e.key === 'R') { init(); return; }
            if ((e.key === 'ArrowLeft' || e.key === 'a') && dir.x !== 1) dir = { x: -1, y: 0 };
            else if ((e.key === 'ArrowRight' || e.key === 'd') && dir.x !== -1) dir = { x: 1, y: 0 };
            else if ((e.key === 'ArrowUp' || e.key === 'w') && dir.y !== 1) dir = { x: 0, y: -1 };
            else if ((e.key === 'ArrowDown' || e.key === 's') && dir.y !== -1) dir = { x: 0, y: 1 };
            e.preventDefault();
        });
        function tick() {
            if (over) return;
            const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };
            if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) { endGame(); return; }
            if (snake.some(s => s.x === head.x && s.y === head.y)) { endGame(); return; }
            snake.unshift(head);
            let ate = false;
            if (head.x === food.x && head.y === food.y) { score += food.bonus ? 50 : 10; food = placeFood(); ate = true; bonusSpawn(); }
            if (bonus && head.x === bonus.x && head.y === bonus.y) { score += 100; bonus = null; ate = true; }
            if (!ate) snake.pop();
            document.getElementById('sc').textContent = score;
            if (score > hs) { hs = score; document.getElementById('hs').textContent = hs; }
            // speed up
            if (snake.length % 5 === 0 && speed > 80) { speed = Math.max(80, speed - 10); clearInterval(interval); interval = setInterval(tick, speed); }
            draw();
        }
        function bonusSpawn() { if (!bonus && Math.random() < 0.3) { bonus = { x: rand(COLS), y: rand(ROWS) }; setTimeout(() => bonus = null, 5000); } }
        function endGame() { over = true; clearInterval(interval); draw(); }
        function draw() {
            ctx.fillStyle = '#0a1a0a'; ctx.fillRect(0, 0, canvas.width, canvas.height);
            // grid
            ctx.strokeStyle = 'rgba(74,222,128,0.05)'; ctx.lineWidth = 0.5;
            for (let i = 0; i <= COLS; i++) { ctx.beginPath(); ctx.moveTo(i * CS, 0); ctx.lineTo(i * CS, canvas.height); ctx.stroke(); }
            for (let i = 0; i <= ROWS; i++) { ctx.beginPath(); ctx.moveTo(0, i * CS); ctx.lineTo(canvas.width, i * CS); ctx.stroke(); }
            // food
            ctx.fillStyle = food.bonus ? '#facc15' : '#4ade80';
            ctx.beginPath(); ctx.arc(food.x * CS + CS / 2, food.y * CS + CS / 2, CS / 2 - 2, 0, Math.PI * 2); ctx.fill();
            if (bonus) { ctx.fillStyle = '#f97316'; ctx.beginPath(); ctx.arc(bonus.x * CS + CS / 2, bonus.y * CS + CS / 2, CS / 2 - 1, 0, Math.PI * 2); ctx.fill(); ctx.fillStyle = '#fff'; ctx.font = 'bold 10px monospace'; ctx.textAlign = 'center'; ctx.fillText('★', bonus.x * CS + CS / 2, bonus.y * CS + CS / 2 + 4); }
            // snake
            snake.forEach((s, i) => {
                const g = i === 0 ? '#4ade80' : `hsl(${140 - i * 2},80%,${60 - i}%)`;
                ctx.fillStyle = g; ctx.beginPath(); ctx.roundRect(s.x * CS + 1, s.y * CS + 1, CS - 2, CS - 2, 4); ctx.fill();
                if (i === 0) { ctx.fillStyle = '#000'; const ex = s.x * CS + 5 + (dir.x * 4), ey = s.y * CS + 5 + (dir.y * 4); ctx.beginPath(); ctx.arc(ex, ey, 2, 0, Math.PI * 2); ctx.fill(); ctx.beginPath(); ctx.arc(s.x * CS + CS - 5 + (dir.x * 4), ey, 2, 0, Math.PI * 2); ctx.fill(); }
            });
            if (over) { ctx.fillStyle = 'rgba(0,0,0,0.7)'; ctx.fillRect(0, 0, canvas.width, canvas.height); ctx.fillStyle = '#4ade80'; ctx.font = 'bold 32px monospace'; ctx.textAlign = 'center'; ctx.fillText('GAME OVER', 250, 220); ctx.font = '20px monospace'; ctx.fillText(`Score: ${score}`, 250, 260); ctx.font = '16px monospace'; ctx.fillStyle = '#aaa'; ctx.fillText('Press R to restart', 250, 300); }
        }
        init();
    </script>
</body>

</html>
