<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Tank Battle – The Pizza Edition</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        body {
            background: #0a0a0a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Courier New', monospace;
            color: #fff
        }

        h1 {
            color: #84cc16;
            font-size: 2rem;
            margin-bottom: 8px;
            text-shadow: 0 0 20px #84cc16
        }

        canvas {
            border: 2px solid #84cc16;
            box-shadow: 0 0 30px rgba(132, 204, 22, 0.4)
        }

        #hud {
            margin-top: 10px;
            color: #84cc16
        }

        #ctrl {
            margin-top: 6px;
            color: #555;
            font-size: .8rem
        }
    </style>
</head>

<body>
    <h1>Tank Battle</h1>
    <canvas id="c" width="600" height="500"></canvas>
    <div id="hud">P1 Score: <span id="s1">0</span> &nbsp;|&nbsp; P2 Score: <span id="s2">0</span></div>
    <div id="ctrl">P1: WASD move, F shoot | P2: Arrows move, Enter shoot | R: restart</div>
    <script>
        const canvas = document.getElementById('c'), ctx = canvas.getContext('2d');
        const W = 600, H = 500, TS = 30;
        const WALLS = [
            { x: 100, y: 100, w: 80, h: 20 }, { x: 280, y: 60, w: 20, h: 120 }, { x: 420, y: 100, w: 80, h: 20 },
            { x: 100, y: 300, w: 80, h: 20 }, { x: 280, y: 320, w: 20, h: 120 }, { x: 420, y: 300, w: 80, h: 20 },
            { x: 180, y: 200, w: 120, h: 20 }, { x: 300, y: 200, w: 120, h: 20 },
        ];
        let tanks, bullets, score, keys;
        function makeTank(x, y, color, angle) { return { x, y, a: angle, color, vx: 0, vy: 0, cooldown: 0 }; }
        function init() {
            tanks = [makeTank(50, H / 2, '#84cc16', 0), makeTank(W - 70, H / 2, '#f97316', Math.PI)];
            bullets = []; score = [0, 0]; keys = {};
            document.getElementById('s1').textContent = 0; document.getElementById('s2').textContent = 0;
        }
        document.addEventListener('keydown', e => { keys[e.key] = true; if (e.key === 'r' || e.key === 'R') init(); e.preventDefault(); });
        document.addEventListener('keyup', e => { keys[e.key] = false; });
        function wallHit(x, y) { return WALLS.some(w => x > w.x && x < w.x + w.w && y > w.y && y < w.y + w.h); }
        function moveTank(t, rot, fwd) {
            if (rot) t.a += rot * 0.06;
            if (fwd) { const nx = t.x + Math.cos(t.a) * fwd, ny = t.y + Math.sin(t.a) * fwd; if (!wallHit(nx, ny) && nx > 15 && nx < W - 15 && ny > 15 && ny < H - 15) { t.x = nx; t.y = ny; } }
        }
        function shoot(t, owner) {
            if (t.cooldown > 0) return;
            bullets.push({ x: t.x + Math.cos(t.a) * 22, y: t.y + Math.sin(t.a) * 22, vx: Math.cos(t.a) * 7, vy: Math.sin(t.a) * 7, owner, bounces: 3 });
            t.cooldown = 30;
        }
        function update() {
            if (keys['a']) moveTank(tanks[0], -1, 0); if (keys['d']) moveTank(tanks[0], 1, 0);
            if (keys['w']) moveTank(tanks[0], 0, 3); if (keys['s']) moveTank(tanks[0], 0, -3);
            if (keys['f'] || keys['F']) { shoot(tanks[0], 0); }
            if (keys['ArrowLeft']) moveTank(tanks[1], -1, 0); if (keys['ArrowRight']) moveTank(tanks[1], 1, 0);
            if (keys['ArrowUp']) moveTank(tanks[1], 0, 3); if (keys['ArrowDown']) moveTank(tanks[1], 0, -3);
            if (keys['Enter']) { shoot(tanks[1], 1); }
            tanks.forEach(t => { if (t.cooldown > 0) t.cooldown--; });
            bullets = bullets.filter(b => {
                b.x += b.vx; b.y += b.vy;
                if (b.x < 4 || b.x > W - 4) { b.vx *= -1; b.bounces--; }
                if (b.y < 4 || b.y > H - 4) { b.vy *= -1; b.bounces--; }
                for (const w of WALLS) { if (b.x > w.x && b.x < w.x + w.w && b.y > w.y && b.y < w.y + w.h) { b.vx *= -1; b.vy *= -1; b.bounces--; break; } }
                for (let i = 0; i < 2; i++) {
                    if (i === b.owner) continue;
                    if (Math.hypot(b.x - tanks[i].x, b.y - tanks[i].y) < 18) { score[b.owner]++; document.getElementById('s' + (b.owner + 1)).textContent = score[b.owner]; tanks[i].x = i === 0 ? 50 : W - 70; tanks[i].y = H / 2; return false; }
                }
                return b.bounces >= 0;
            });
        }
        function draw() {
            ctx.fillStyle = '#111'; ctx.fillRect(0, 0, W, H);
            // grid
            ctx.strokeStyle = 'rgba(255,255,255,0.03)'; for (let i = 0; i < W; i += 30) { ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, H); ctx.stroke(); }
            for (let i = 0; i < H; i += 30) { ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(W, i); ctx.stroke(); }
            WALLS.forEach(w => { ctx.fillStyle = '#374151'; ctx.fillRect(w.x, w.y, w.w, w.h); ctx.strokeStyle = '#4b5563'; ctx.strokeRect(w.x, w.y, w.w, w.h); });
            tanks.forEach((t, i) => {
                ctx.save(); ctx.translate(t.x, t.y); ctx.rotate(t.a);
                ctx.fillStyle = t.color; ctx.fillRect(-14, -10, 28, 20);
                ctx.fillStyle = 'rgba(0,0,0,0.3)'; ctx.fillRect(-12, -8, 24, 8); ctx.fillRect(-12, 0, 24, 8);
                ctx.fillStyle = t.color; ctx.fillRect(6, -3, 16, 6);
                ctx.restore();
                ctx.fillStyle = '#fff'; ctx.font = 'bold 11px monospace'; ctx.textAlign = 'center'; ctx.fillText(i === 0 ? 'P1' : 'P2', t.x, t.y - 18);
            });
            bullets.forEach(b => { ctx.beginPath(); ctx.arc(b.x, b.y, 5, 0, Math.PI * 2); ctx.fillStyle = '#facc15'; ctx.fill(); });
            if (score[0] >= 5 || score[1] >= 5) {
                const w = score[0] >= 5 ? 1 : 2;
                ctx.fillStyle = 'rgba(0,0,0,0.75)'; ctx.fillRect(0, 0, W, H);
                ctx.fillStyle = w === 1 ? '#84cc16' : '#f97316'; ctx.font = 'bold 56px monospace'; ctx.textAlign = 'center';
                ctx.fillText('YOU WIN!', W / 2, H / 2 - 30);
                ctx.font = 'bold 24px monospace'; ctx.fillStyle = '#fff'; ctx.fillText(`Player ${w} wins with ${score[w - 1]} kills!`, W / 2, H / 2 + 20);
                ctx.font = '16px monospace'; ctx.fillStyle = '#aaa'; ctx.fillText('Press R to play again', W / 2, H / 2 + 60);
            }
        }
        function loop() { update(); draw(); requestAnimationFrame(loop); }
        init(); loop();
    </script>
</body>

</html>
