<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Flappy Dragon – The Pizza Edition</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        body {
            background: #0a0018;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Courier New', monospace;
            color: #fff
        }

        h1 {
            color: #a855f7;
            font-size: 2rem;
            margin-bottom: 8px;
            text-shadow: 0 0 20px #a855f7
        }

        canvas {
            border: 2px solid #a855f7;
            box-shadow: 0 0 30px rgba(168, 85, 247, 0.4)
        }

        #hud {
            margin-top: 10px;
            color: #a855f7
        }

        #ctrl {
            margin-top: 6px;
            color: #555;
            font-size: .8rem
        }
    </style>
</head>

<body>
    <h1>🐉 Flappy Dragon</h1>
    <canvas id="c" width="480" height="600"></canvas>
    <div id="hud">Score: <span id="sc">0</span> &nbsp; Best: <span id="bs">0</span></div>
    <div id="ctrl">Space / Click to flap | Don't hit the pillars!</div>
    <script>
        const canvas = document.getElementById('c'), ctx = canvas.getContext('2d');
        const W = 480, H = 600; const GAP = 150, PIPE_W = 55, PIPE_SPEED = 2.5;
        let dragon, pipes, score, best = 0, over, started, frame = 0;
        function init() { dragon = { x: 100, y: H / 2, vy: 0, w: 40, h: 30 }; pipes = []; score = 0; over = false; started = false; frame = 0; document.getElementById('sc').textContent = 0; }
        function addPipe() { const gapY = 100 + Math.random() * (H - GAP - 200); pipes.push({ x: W + 20, top: gapY, bot: gapY + GAP, scored: false }); }
        function flap() { if (!started) { started = true; addPipe(); } dragon.vy = -8; }
        document.addEventListener('keydown', e => { if (e.key === ' ') { flap(); e.preventDefault(); } if (e.key === 'r' || e.key === 'R') init(); });
        canvas.addEventListener('click', flap);
        function update() {
            if (!started || over) return;
            frame++; dragon.vy += 0.35; dragon.y += dragon.vy; dragon.y = Math.max(0, dragon.y);
            if (dragon.y + dragon.h > H) { over = true; return; }
            if (frame % 90 === 0) addPipe();
            pipes = pipes.filter(p => {
                p.x -= PIPE_SPEED;
                if (!p.scored && p.x + PIPE_W < dragon.x) { p.scored = true; score++; document.getElementById('sc').textContent = score; if (score > best) { best = score; document.getElementById('bs').textContent = best; } }
                if (dragon.x + dragon.w - 8 > p.x && dragon.x < p.x + PIPE_W) { if (dragon.y < p.top || dragon.y + dragon.h > p.bot) over = true; }
                return p.x > -PIPE_W;
            });
        }
        const STARS = Array.from({ length: 60 }, () => ({ x: Math.random() * W, y: Math.random() * H, r: Math.random() * 1.5, speed: Math.random() * 0.5 + 0.1 }));
        function draw() {
            ctx.fillStyle = '#0a0018'; ctx.fillRect(0, 0, W, H);
            STARS.forEach(s => { s.x -= s.speed; if (s.x < 0) s.x = W; ctx.fillStyle = `rgba(255,255,255,${0.2 + s.r / 3})`; ctx.fillRect(s.x, s.y, s.r, s.r); });
            // pipes
            pipes.forEach(p => {
                const grad = ctx.createLinearGradient(p.x, 0, p.x + PIPE_W, 0); grad.addColorStop(0, '#4c1d95'); grad.addColorStop(1, '#7c3aed');
                ctx.fillStyle = grad; ctx.fillRect(p.x, 0, PIPE_W, p.top); ctx.fillRect(p.x, p.bot, PIPE_W, H - p.bot);
                // pipe caps
                ctx.fillStyle = '#6d28d9'; ctx.fillRect(p.x - 5, p.top - 20, PIPE_W + 10, 20); ctx.fillRect(p.x - 5, p.bot, PIPE_W + 10, 20);
            });
            // dragon
            if (!over || (frame % 10 < 6)) {
                const dy = dragon.y; const wing = Math.sin(frame * 0.3) * 8;
                ctx.font = '36px sans-serif'; ctx.fillText('🐉', dragon.x - 5, dy + dragon.h + 4);
            }
            // score
            ctx.fillStyle = 'rgba(167,139,250,0.8)'; ctx.font = 'bold 28px monospace'; ctx.textAlign = 'center'; ctx.fillText(score, W / 2, 50);
            if (!started) { ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.fillRect(0, 0, W, H); ctx.fillStyle = '#a855f7'; ctx.font = 'bold 24px monospace'; ctx.textAlign = 'center'; ctx.fillText('Tap or Space to Start!', W / 2, H / 2); }
            if (over) { ctx.fillStyle = 'rgba(0,0,0,0.65)'; ctx.fillRect(0, 0, W, H); ctx.fillStyle = '#ef4444'; ctx.font = 'bold 32px monospace'; ctx.textAlign = 'center'; ctx.fillText('GAME OVER', W / 2, H / 2 - 30); ctx.font = '22px monospace'; ctx.fillStyle = '#fbbf24'; ctx.fillText(`Score: ${score}`, W / 2, H / 2 + 15); ctx.font = '16px monospace'; ctx.fillStyle = '#aaa'; ctx.fillText('Press R to restart', W / 2, H / 2 + 50); }
        }
        function loop() { update(); draw(); requestAnimationFrame(loop); }
        init(); loop();
    </script>
</body>

</html>
