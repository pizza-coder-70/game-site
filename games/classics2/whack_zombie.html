<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Whack-a-Zombie – The Pizza Edition</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        body {
            background: #0a1a0a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Courier New', monospace;
            color: #fff
        }

        h1 {
            color: #4ade80;
            font-size: 2rem;
            margin-bottom: 8px;
            text-shadow: 0 0 20px #4ade80
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(4, 120px);
            gap: 12px;
            margin: 16px 0
        }

        .hole {
            width: 120px;
            height: 100px;
            background: #14532d;
            border-radius: 50%/60%;
            border: 3px solid #166534;
            position: relative;
            overflow: hidden;
            cursor: pointer;
            transition: transform .1s;
            display: flex;
            align-items: flex-end;
            justify-content: center
        }

        .hole:active {
            transform: scale(0.97)
        }

        .zombie {
            font-size: 3rem;
            position: absolute;
            bottom: -60px;
            transition: bottom .15s;
            line-height: 1
        }

        .zombie.up {
            bottom: 4px
        }

        .zombie.hit {
            bottom: -60px;
            filter: brightness(0.3)
        }

        .hole .splat {
            position: absolute;
            font-size: 2rem;
            opacity: 0;
            transition: opacity .2s
        }

        .hole .splat.show {
            opacity: 1
        }

        #hud {
            color: #4ade80;
            font-size: 1.1rem;
            margin-bottom: 8px
        }

        #timer-bar {
            width: 400px;
            height: 8px;
            background: #1e3a5f;
            border-radius: 4px;
            margin-bottom: 8px
        }

        .timer-fill {
            height: 100%;
            background: linear-gradient(90deg, #22c55e, #ef4444);
            border-radius: 4px;
            transition: width .1s linear
        }

        button {
            padding: 10px 24px;
            background: linear-gradient(135deg, #166534, #15803d);
            border: none;
            color: #fff;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1rem;
            margin-top: 8px
        }
    </style>
</head>

<body>
    <h1>🧟 Whack-a-Zombie</h1>
    <div id="hud">Score: <span id="sc">0</span> &nbsp; Time: <span id="tm">30</span>s &nbsp; Combo: <span
            id="co">0</span>x</div>
    <div class="timer-bar">
        <div class="timer-fill" id="tf" style="width:100%"></div>
    </div>
    <div class="grid" id="grid"></div>
    <button onclick="startGame()">▶ Start Game</button>
    <script>
        const ZOMBIES = ['🧟', '🧟‍♀️', '💀', '👻'];
        const SPECIALS = ['🌸', '⭐'];
        let score = 0, combo = 0, timeLeft = 30, timer, gameActive = false, holes = [];
        function createGrid() {
            const g = document.getElementById('grid'); g.innerHTML = ''; holes = [];
            for (let i = 0; i < 12; i++) {
                const h = document.createElement('div'); h.className = 'hole';
                const z = document.createElement('div'); z.className = 'zombie'; z.textContent = '🧟';
                const sp = document.createElement('div'); sp.className = 'splat'; sp.textContent = '💥';
                h.appendChild(z); h.appendChild(sp);
                h.addEventListener('click', () => whack(i));
                g.appendChild(h); holes.push({ el: h, zombie: z, splat: sp, active: false, timer: null, special: false });
            }
        }
        function startGame() {
            score = 0; combo = 0; timeLeft = 30; gameActive = true;
            document.getElementById('sc').textContent = 0; document.getElementById('co').textContent = 0;
            createGrid(); clearInterval(timer); spawnLoop();
            timer = setInterval(() => { timeLeft -= 0.1; document.getElementById('tf').style.width = (timeLeft / 30 * 100) + '%'; document.getElementById('tm').textContent = Math.ceil(timeLeft); if (timeLeft <= 0) { endGame(); } }, 100);
        }
        function endGame() { clearInterval(timer); gameActive = false; holes.forEach(h => { h.active = false; h.zombie.classList.remove('up'); if (h.timer) clearTimeout(h.timer); }); document.getElementById('tm').textContent = 0; document.getElementById('tf').style.width = '0%'; }
        function spawnLoop() { if (!gameActive) return; const speed = Math.max(500, 1200 - score * 20); setTimeout(() => { if (gameActive) { spawnRandom(); spawnLoop(); } }, speed); }
        function spawnRandom() { const avail = holes.filter(h => !h.active); if (avail.length === 0) return; const h = avail[Math.floor(Math.random() * avail.length)]; const special = Math.random() < 0.1; h.active = true; h.special = special; h.zombie.textContent = special ? SPECIALS[Math.floor(Math.random() * SPECIALS.length)] : ZOMBIES[Math.floor(Math.random() * ZOMBIES.length)]; h.zombie.classList.add('up'); const dur = Math.max(600, 1500 - score * 15); h.timer = setTimeout(() => { if (h.active) { h.zombie.classList.remove('up'); h.active = false; if (!special) combo = 0; document.getElementById('co').textContent = combo; } }, dur); }
        function whack(i) { if (!gameActive || !holes[i].active) return; const h = holes[i]; clearTimeout(h.timer); h.active = false; h.zombie.classList.remove('up'); h.splat.classList.add('show'); setTimeout(() => h.splat.classList.remove('show'), 300); if (h.special) { score += 50; combo = 0; } else { combo++; score += 10 * Math.max(1, combo); } document.getElementById('sc').textContent = score; document.getElementById('co').textContent = combo; }
        createGrid();
    </script>
</body>

</html>
