<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Rock Paper Scissors – The Pizza Edition</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        body {
            background: linear-gradient(135deg, #0f172a, #1e1b4b);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Outfit', sans-serif;
            color: #fff
        }

        h1 {
            color: #818cf8;
            font-size: 2.5rem;
            margin-bottom: 6px;
            text-shadow: 0 0 20px rgba(129, 140, 248, 0.5)
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(129, 140, 248, 0.3);
            border-radius: 24px;
            padding: 36px;
            width: min(500px, 95vw);
            text-align: center
        }

        .arena {
            display: flex;
            align-items: center;
            justify-content: space-around;
            margin: 24px 0;
            font-size: 5rem;
            gap: 20px
        }

        .vs {
            font-size: 1.5rem;
            color: #64748b;
            font-weight: bold
        }

        .choices {
            display: flex;
            gap: 14px;
            justify-content: center;
            margin: 20px 0
        }

        .choice-btn {
            font-size: 3.5rem;
            background: rgba(255, 255, 255, 0.05);
            border: 3px solid rgba(129, 140, 248, 0.3);
            border-radius: 18px;
            width: 90px;
            height: 90px;
            cursor: pointer;
            transition: all .2s
        }

        .choice-btn:hover {
            transform: scale(1.15);
            border-color: #818cf8;
            box-shadow: 0 0 20px rgba(129, 140, 248, 0.4)
        }

        .choice-btn:active {
            transform: scale(0.95)
        }

        .scoreboard {
            display: flex;
            gap: 30px;
            justify-content: center;
            margin-bottom: 16px;
            font-size: 1.1rem
        }

        .score-item {
            text-align: center
        }

        .score-num {
            font-size: 2.2rem;
            font-weight: 800;
            color: #818cf8
        }

        .result-msg {
            font-size: 1.5rem;
            font-weight: 600;
            min-height: 40px;
            margin: 12px 0;
            transition: all .3s
        }

        .history {
            max-height: 100px;
            overflow-y: auto;
            margin-top: 12px
        }

        .hist-item {
            padding: 3px 0;
            color: #64748b;
            font-size: .8rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05)
        }

        button.reset {
            padding: 8px 20px;
            background: rgba(129, 140, 248, 0.2);
            border: 1px solid rgba(129, 140, 248, 0.4);
            color: #818cf8;
            border-radius: 8px;
            cursor: pointer;
            font-family: inherit;
            margin-top: 8px;
            transition: all .2s
        }

        button.reset:hover {
            background: rgba(129, 140, 248, 0.35)
        }
    </style>
</head>

<body>
    <h1>✊ Rock Paper Scissors</h1>
    <div class="card">
        <div class="scoreboard">
            <div class="score-item">
                <div class="score-num" id="pw">0</div>
                <div style="color:#4ade80">You Win</div>
            </div>
            <div class="score-item">
                <div class="score-num" id="pd">0</div>
                <div style="color:#94a3b8">Draw</div>
            </div>
            <div class="score-item">
                <div class="score-num" id="pl">0</div>
                <div style="color:#ef4444">CPU Wins</div>
            </div>
        </div>
        <div class="arena">
            <span id="player-pick">🤔</span>
            <span class="vs">VS</span>
            <span id="cpu-pick">🤖</span>
        </div>
        <div class="result-msg" id="result">Choose your weapon!</div>
        <div class="choices">
            <button class="choice-btn" onclick="play('rock')" title="Rock">✊</button>
            <button class="choice-btn" onclick="play('paper')" title="Paper">✋</button>
            <button class="choice-btn" onclick="play('scissors')" title="Scissors">✌️</button>
            <button class="choice-btn" onclick="play('lizard')" title="Lizard">🦎</button>
            <button class="choice-btn" onclick="play('spock')" title="Spock">🖖</button>
        </div>
        <div style="color:#64748b;font-size:.8rem;margin-bottom:8px">Rock-Paper-Scissors-Lizard-Spock!</div>
        <button class="reset" onclick="reset()">Reset Score</button>
        <div class="history" id="history"></div>
    </div>
    <script>
        const CHOICES = ['rock', 'paper', 'scissors', 'lizard', 'spock'];
        const EMOJI = { rock: '✊', paper: '✋', scissors: '✌️', lizard: '🦎', spock: '🖖' };
        // beats[a] = array of things a beats
        const BEATS = { rock: ['scissors', 'lizard'], paper: ['rock', 'spock'], scissors: ['paper', 'lizard'], lizard: ['paper', 'spock'], spock: ['rock', 'scissors'] };
        let wins = 0, draws = 0, losses = 0;
        function play(choice) {
            const cpu = CHOICES[Math.floor(Math.random() * CHOICES.length)];
            document.getElementById('player-pick').textContent = EMOJI[choice];
            document.getElementById('cpu-pick').textContent = EMOJI[cpu];
            let result, color;
            if (choice === cpu) { draws++; result = '🤝 Draw!'; color = '#94a3b8'; }
            else if (BEATS[choice].includes(cpu)) { wins++; result = '🎉 You Win!'; color = '#4ade80'; }
            else { losses++; result = '😔 CPU Wins!'; color = '#ef4444'; }
            document.getElementById('pw').textContent = wins;
            document.getElementById('pd').textContent = draws;
            document.getElementById('pl').textContent = losses;
            document.getElementById('result').textContent = result;
            document.getElementById('result').style.color = color;
            const li = document.createElement('div'); li.className = 'hist-item';
            li.textContent = `${EMOJI[choice]} vs ${EMOJI[cpu]} – ${result}`;
            document.getElementById('history').prepend(li);
        }
        function reset() { wins = 0; draws = 0; losses = 0; document.getElementById('pw').textContent = 0; document.getElementById('pd').textContent = 0; document.getElementById('pl').textContent = 0; document.getElementById('result').textContent = 'Choose your weapon!'; document.getElementById('result').style.color = '#fff'; document.getElementById('player-pick').textContent = '🤔'; document.getElementById('cpu-pick').textContent = '🤖'; document.getElementById('history').innerHTML = ''; }
    </script>
</body>

</html>
