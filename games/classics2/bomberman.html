<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Bomberman – The Pizza Edition</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        body {
            background: #0a0010;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Courier New', monospace;
            color: #fff
        }

        h1 {
            color: #f97316;
            font-size: 2rem;
            margin-bottom: 8px;
            text-shadow: 0 0 20px #f97316
        }

        canvas {
            border: 2px solid #f97316;
            box-shadow: 0 0 30px rgba(249, 115, 22, 0.4)
        }

        #hud {
            margin-top: 10px;
            color: #f97316
        }

        #ctrl {
            margin-top: 6px;
            color: #555;
            font-size: .8rem
        }
    </style>
</head>

<body>
    <h1>Bomberman</h1>
    <canvas id="c" width="510" height="510"></canvas>
    <div id="hud">Score: <span id="sc">0</span> &nbsp; Lives: <span id="li">3</span></div>
    <div id="ctrl">Arrow Keys / WASD to move | Space to place bomb | R: restart</div>
    <script>
        const canvas = document.getElementById('c'), ctx = canvas.getContext('2d');
        const CS = 34, COLS = 15, ROWS = 15;
        // 0=empty, 1=wall, 2=destructible, 3=bomb, 4=fire
        let grid, player, enemies, bombs, flames, score, lives, over, won, keys;
        function makeGrid() {
            const g = [];
            for (let r = 0; r < ROWS; r++) {
                g[r] = []; for (let c = 0; c < COLS; c++) {
                    if (r === 0 || r === ROWS - 1 || c === 0 || c === COLS - 1) g[r][c] = 1;
                    else if (r % 2 === 0 && c % 2 === 0) g[r][c] = 1;
                    else if (r <= 2 && c <= 2) g[r][c] = 0;
                    else g[r][c] = Math.random() < 0.3 ? 2 : 0;
                }
            }
            return g;
        }
        function makeEnemies() {
            return [{ row: ROWS - 2, col: COLS - 2, dir: 0, timer: 0 }, { row: ROWS - 2, col: 1, dir: 1, timer: 15 }, { row: 1, col: COLS - 2, dir: 2, timer: 30 }];
        }
        function init() {
            grid = makeGrid(); player = { row: 1, col: 1, bombCooldown: 0 };
            enemies = makeEnemies(); bombs = []; flames = []; score = 0; lives = 3; over = false; won = false; keys = {};
            document.getElementById('sc').textContent = 0; document.getElementById('li').textContent = 3;
        }
        document.addEventListener('keydown', e => { keys[e.key] = true; if (e.key === 'r' || e.key === 'R') init(); e.preventDefault(); });
        document.addEventListener('keyup', e => { keys[e.key] = false; });
        let moveTimer = 0, enemyTimer = 0;
        function tryMove(row, col) { if (grid[row] && grid[row][col] === 0) return true; return false; }
        function update() {
            if (over) return;
            moveTimer++;
            if (moveTimer >= 6) {
                moveTimer = 0;
                let nr = player.row, nc = player.col;
                if (keys['ArrowLeft'] || keys['a']) nc--;
                else if (keys['ArrowRight'] || keys['d']) nc++;
                else if (keys['ArrowUp'] || keys['w']) nr--;
                else if (keys['ArrowDown'] || keys['s']) nr++;
                if (tryMove(nr, nc) && !(bombs.some(b => b.row === nr && b.col === nc))) { player.row = nr; player.col = nc; }
            }
            if ((keys[' '] || keys['Space']) && player.bombCooldown <= 0 && bombs.length < 2) {
                bombs.push({ row: player.row, col: player.col, timer: 100, range: 2 }); player.bombCooldown = 120;
                grid[player.row][player.col] = 3;
            }
            if (player.bombCooldown > 0) player.bombCooldown--;
            // update bombs
            bombs = bombs.filter(b => { b.timer--; if (b.timer <= 0) { explode(b); grid[b.row][b.col] = 0; return false; } return true; });
            // update flames
            flames = flames.filter(f => { f.timer--; return f.timer > 0; });
            // enemies
            enemyTimer++;
            if (enemyTimer >= 20) {
                enemyTimer = 0;
                const DIRS = [[-1, 0], [1, 0], [0, -1], [0, 1]];
                enemies = enemies.filter(e => {
                    const d = DIRS[e.dir % 4]; const nr = e.row + d[0], nc = e.col + d[1];
                    if (tryMove(nr, nc)) { e.row = nr; e.col = nc; } else { e.dir = (e.dir + 1 + Math.floor(Math.random() * 3)) % 4; }
                    if (e.row === player.row && e.col === player.col) { loseLife(); return true; }
                    if (flames.some(f => f.row === e.row && f.col === e.col)) { score += 100; document.getElementById('sc').textContent = score; return false; }
                    return true;
                });
            }
            // player in flame
            if (flames.some(f => f.row === player.row && f.col === player.col)) loseLife();
            if (enemies.length === 0 && !over && !won) won = true;
        }
        function explode(b) {
            const DIRS = [[0, 0], [-1, 0], [1, 0], [0, -1], [0, 1]];
            for (const [dr, dc] of DIRS) {
                for (let i = 0; i <= b.range; i++) {
                    const r = b.row + dr * i, c = b.col + dc * i;
                    if (!grid[r] || grid[r][c] === 1) break;
                    if (grid[r][c] === 2) { grid[r][c] = 0; score += 10; document.getElementById('sc').textContent = score; flames.push({ row: r, col: c, timer: 30 }); break; }
                    flames.push({ row: r, col: c, timer: 30 });
                }
            }
        }
        function loseLife() { lives--; document.getElementById('li').textContent = lives; player.row = 1; player.col = 1; if (lives <= 0) over = true; }
        function draw() {
            ctx.fillStyle = '#0a0010'; ctx.fillRect(0, 0, canvas.width, canvas.height);
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    const x = c * CS, y = r * CS, v = grid[r][c];
                    if (v === 1) { ctx.fillStyle = '#374151'; ctx.fillRect(x, y, CS, CS); ctx.fillStyle = '#4b5563'; ctx.fillRect(x + 2, y + 2, CS - 4, CS - 4); }
                    else if (v === 2) { ctx.fillStyle = '#92400e'; ctx.fillRect(x, y, CS, CS); ctx.fillStyle = '#b45309'; ctx.fillRect(x + 3, y + 3, CS - 6, CS - 6); }
                    else { ctx.fillStyle = '#1a0a2e'; ctx.fillRect(x, y, CS, CS); }
                    if (v === 3) { ctx.font = `${CS - 4}px monospace`; ctx.textAlign = 'center'; ctx.fillText('💣', x + CS / 2, y + CS - 2); }
                }
            }
            flames.forEach(f => { ctx.fillStyle = `rgba(251,146,60,${0.7 + 0.3 * Math.sin(Date.now() / 50)})`; ctx.fillRect(f.col * CS + 2, f.row * CS + 2, CS - 4, CS - 4); });
            enemies.forEach(e => { ctx.font = `${CS - 4}px monospace`; ctx.textAlign = 'center'; ctx.fillText('👾', e.col * CS + CS / 2, e.row * CS + CS - 2); });
            ctx.font = `${CS - 2}px monospace`; ctx.textAlign = 'center'; ctx.fillText('😤', player.col * CS + CS / 2, player.row * CS + CS - 2);
            if (over) { ctx.fillStyle = 'rgba(0,0,0,0.7)'; ctx.fillRect(0, 0, canvas.width, canvas.height); ctx.fillStyle = '#f97316'; ctx.font = 'bold 32px monospace'; ctx.textAlign = 'center'; ctx.fillText('GAME OVER', canvas.width / 2, canvas.height / 2 - 20); ctx.font = '18px monospace'; ctx.fillStyle = '#fff'; ctx.fillText(`Score: ${score} | Press R`, canvas.width / 2, canvas.height / 2 + 20); }
            if (won) { ctx.fillStyle = 'rgba(0,0,0,0.75)'; ctx.fillRect(0, 0, canvas.width, canvas.height); ctx.fillStyle = '#f97316'; ctx.font = 'bold 48px monospace'; ctx.textAlign = 'center'; ctx.fillText('YOU WIN!', canvas.width / 2, canvas.height / 2 - 30); ctx.font = 'bold 22px monospace'; ctx.fillStyle = '#facc15'; ctx.fillText(`🏆 Score: ${score}`, canvas.width / 2, canvas.height / 2 + 20); ctx.font = '16px monospace'; ctx.fillStyle = '#aaa'; ctx.fillText('Press R to play again', canvas.width / 2, canvas.height / 2 + 55); }
        }
        function loop() { update(); draw(); requestAnimationFrame(loop); }
        init(); loop();
    </script>
</body>

</html>
