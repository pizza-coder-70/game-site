<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Paint Pixels – The Pizza Edition</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        body {
            background: #0f172a;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            font-family: 'Courier New', monospace;
            color: #fff;
            padding: 10px
        }

        h1 {
            color: #f472b6;
            font-size: 2rem;
            margin-bottom: 8px;
            text-shadow: 0 0 20px #f472b6
        }

        #toolbar {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 10px;
            align-items: center
        }

        canvas {
            border: 2px solid #f472b6;
            box-shadow: 0 0 30px rgba(244, 114, 182, 0.4);
            cursor: crosshair
        }

        .tool-btn {
            padding: 6px 12px;
            border: 1px solid #334155;
            background: #1e293b;
            color: #fff;
            border-radius: 6px;
            cursor: pointer;
            font-size: .8rem;
            transition: all .2s
        }

        .tool-btn:hover,
        .tool-btn.active {
            background: #f472b6;
            border-color: #f472b6;
            color: #fff
        }

        .color-pick {
            width: 36px;
            height: 28px;
            border-radius: 4px;
            cursor: pointer;
            border: 2px solid #334155
        }

        .size-slider {
            accent-color: #f472b6;
            width: 80px
        }
    </style>
</head>

<body>
    <h1>🎨 Paint Pixels</h1>
    <div id="toolbar">
        <button class="tool-btn active" id="tb-pen" onclick="setTool('pen')">✏️ Pen</button>
        <button class="tool-btn" id="tb-line" onclick="setTool('line')">📏 Line</button>
        <button class="tool-btn" id="tb-rect" onclick="setTool('rect')">⬜ Rect</button>
        <button class="tool-btn" id="tb-circle" onclick="setTool('circle')">⭕ Circle</button>
        <button class="tool-btn" id="tb-fill" onclick="setTool('fill')">🪣 Fill</button>
        <button class="tool-btn" id="tb-erase" onclick="setTool('erase')">🧹 Erase</button>
        <input class="color-pick" type="color" id="color" value="#f472b6">
        <label style="font-size:.8rem">Size: <input class="size-slider" type="range" id="size" min="1" max="30"
                value="5"></label>
        <button class="tool-btn" onclick="clearCanvas()">🗑️ Clear</button>
        <button class="tool-btn" onclick="saveImg()">💾 Save</button>
    </div>
    <canvas id="c" width="700" height="500"></canvas>
    <script>
        const canvas = document.getElementById('c'), ctx = canvas.getContext('2d');
        ctx.fillStyle = '#fff'; ctx.fillRect(0, 0, 700, 500);
        let tool = 'pen', drawing = false, sx, sy, snapshot;
        function setTool(t) { tool = t; document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active')); document.getElementById('tb-' + t)?.classList.add('active'); }
        function getPos(e) { const r = canvas.getBoundingClientRect(); return { x: e.clientX - r.left, y: e.clientY - r.top }; }
        canvas.addEventListener('mousedown', e => { drawing = true; const p = getPos(e); sx = p.x; sy = p.y; snapshot = ctx.getImageData(0, 0, 700, 500); if (tool === 'pen' || tool === 'erase') { ctx.beginPath(); ctx.moveTo(p.x, p.y); } if (tool === 'fill') { fill(Math.round(p.x), Math.round(p.y), document.getElementById('color').value); } });
        canvas.addEventListener('mousemove', e => { if (!drawing) return; const p = getPos(e); const sz = +document.getElementById('size').value; const col = document.getElementById('color').value; if (tool === 'pen') { ctx.strokeStyle = col; ctx.lineWidth = sz; ctx.lineCap = 'round'; ctx.lineTo(p.x, p.y); ctx.stroke(); } else if (tool === 'erase') { ctx.strokeStyle = '#fff'; ctx.lineWidth = sz * 2; ctx.lineCap = 'round'; ctx.lineTo(p.x, p.y); ctx.stroke(); } else if (tool === 'line') { ctx.putImageData(snapshot, 0, 0); ctx.beginPath(); ctx.moveTo(sx, sy); ctx.lineTo(p.x, p.y); ctx.strokeStyle = col; ctx.lineWidth = sz; ctx.stroke(); } else if (tool === 'rect') { ctx.putImageData(snapshot, 0, 0); ctx.beginPath(); ctx.rect(sx, sy, p.x - sx, p.y - sy); ctx.strokeStyle = col; ctx.lineWidth = sz; ctx.stroke(); } else if (tool === 'circle') { ctx.putImageData(snapshot, 0, 0); const r = Math.hypot(p.x - sx, p.y - sy); ctx.beginPath(); ctx.arc(sx, sy, r, 0, Math.PI * 2); ctx.strokeStyle = col; ctx.lineWidth = sz; ctx.stroke(); } });
        canvas.addEventListener('mouseup', () => drawing = false); canvas.addEventListener('mouseleave', () => drawing = false);
        function hexToRgb(hex) { const r = parseInt(hex.slice(1, 3), 16), g = parseInt(hex.slice(3, 5), 16), b = parseInt(hex.slice(5, 7), 16); return [r, g, b]; }
        function fill(x, y, col) { const img = ctx.getImageData(0, 0, 700, 500); const d = img.data; const idx = (y * 700 + x) * 4; const tr = d[idx], tg = d[idx + 1], tb = d[idx + 2]; const [nr, ng, nb] = hexToRgb(col); if (tr === nr && tg === ng && tb === nb) return; const stack = [[x, y]]; while (stack.length) { const [cx, cy] = stack.pop(); const i = (cy * 700 + cx) * 4; if (cx < 0 || cx >= 700 || cy < 0 || cy >= 500) continue; if (d[i] !== tr || d[i + 1] !== tg || d[i + 2] !== tb) continue; d[i] = nr; d[i + 1] = ng; d[i + 2] = nb; d[i + 3] = 255; stack.push([cx + 1, cy], [cx - 1, cy], [cx, cy + 1], [cx, cy - 1]); } ctx.putImageData(img, 0, 0); }
        function clearCanvas() { ctx.fillStyle = '#fff'; ctx.fillRect(0, 0, 700, 500); }
        function saveImg() { const a = document.createElement('a'); a.href = canvas.toDataURL(); a.download = 'painting.png'; a.click(); }
    </script>
</body>

</html>
