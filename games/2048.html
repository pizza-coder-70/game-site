<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2048 | The Pizza Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0d0d0d;
            --primary-color: #E67E22;
            --text-color: #fff;
            --grid-bg: rgba(255, 255, 255, 0.1);
            --cell-bg: rgba(255, 255, 255, 0.05);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 2rem;
            user-select: none;
        }

        h1 {
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            font-weight: 800;
            background: linear-gradient(45deg, var(--primary-color), #F39C12);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .score-board {
            margin-bottom: 2rem;
            font-size: 1.5rem;
            font-weight: 600;
            min-height: 2rem;
            display: flex;
            gap: 2rem;
        }

        .board {
            display: grid;
            grid-template-columns: repeat(4, 90px);
            grid-template-rows: repeat(4, 90px);
            gap: 10px;
            background: var(--grid-bg);
            padding: 10px;
            border-radius: 8px;
            position: relative;
        }

        .cell {
            width: 90px;
            height: 90px;
            background: var(--cell-bg);
            border-radius: 6px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: 800;
            font-size: 2rem;
            color: #1a1a1a;
            transition: all 0.1s ease-in-out;
        }

        /* Tile Colors */
        .tile- {
            background: var(--cell-bg);
        }

        .tile-2 {
            background: #eee4da;
            color: #776e65;
        }

        .tile-4 {
            background: #ede0c8;
            color: #776e65;
        }

        .tile-8 {
            background: #f2b179;
            color: #f9f6f2;
        }

        .tile-16 {
            background: #f59563;
            color: #f9f6f2;
        }

        .tile-32 {
            background: #f67c5f;
            color: #f9f6f2;
        }

        .tile-64 {
            background: #f65e3b;
            color: #f9f6f2;
        }

        .tile-128 {
            background: #edcf72;
            color: #f9f6f2;
            font-size: 1.5rem;
        }

        .tile-256 {
            background: #edcc61;
            color: #f9f6f2;
            font-size: 1.5rem;
        }

        .tile-512 {
            background: #edc850;
            color: #f9f6f2;
            font-size: 1.5rem;
        }

        .tile-1024 {
            background: #edc53f;
            color: #f9f6f2;
            font-size: 1.2rem;
        }

        .tile-2048 {
            background: #edc22e;
            color: #f9f6f2;
            font-size: 1.2rem;
            box-shadow: 0 0 10px rgba(243, 215, 116, 0.5), inset 0 0 0 1px rgba(255, 255, 255, 0.2);
        }

        .tile-super {
            background: #3c3a32;
            color: #f9f6f2;
            font-size: 1.2rem;
        }

        .btn {
            background: linear-gradient(45deg, var(--primary-color), #F39C12);
            border: none;
            color: white;
            padding: 0.8rem 2rem;
            border-radius: 2rem;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
            font-family: inherit;
            margin-top: 2rem;
        }

        .btn:hover {
            transform: scale(1.05);
        }

        .back-btn {
            position: absolute;
            top: 2rem;
            left: 2rem;
            color: var(--text-color);
            text-decoration: none;
            font-weight: 600;
            opacity: 0.7;
            transition: opacity 0.2s;
        }

        .back-btn:hover {
            opacity: 1;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .modal-content {
            background: #1a1a1a;
            padding: 3rem;
            border-radius: 1rem;
            text-align: center;
            border: 1px solid var(--primary-color);
        }

        .modal h2 {
            margin-bottom: 1rem;
            font-size: 2rem;
        }
    </style>
</head>

<body>
    <a href="../games.html" class="back-btn">← Back to Games</a>
    <h1>2048</h1>

    <div class="score-board">
        <div>Score: <span id="score">0</span></div>
        <div>Best: <span id="best">0</span></div>
    </div>

    <div class="board" id="board">
        <!-- 16 cells -->
    </div>

    <button class="btn" onclick="initGame()">New Game</button>

    <div class="modal" id="gameOverModal">
        <div class="modal-content">
            <h2>Game Over!</h2>
            <p>Score: <span id="finalScore" style="color:var(--primary-color);font-weight:bold;">0</span></p>
            <button class="btn"
                onclick="initGame(); document.getElementById('gameOverModal').style.display='none';">Play Again</button>
        </div>
    </div>

    <script src="../scripts/scores.js"></script>
    <script>
        const BOARD_SIZE = 4;
        let board = [];
        let score = 0;
        let bestScore = localStorage.getItem('2048BestScore') || 0;

        const boardEl = document.getElementById('board');
        const scoreEl = document.getElementById('score');
        const bestEl = document.getElementById('best');
        const finalScoreEl = document.getElementById('finalScore');
        const modal = document.getElementById('gameOverModal');
        if (typeof PizzaScores === 'undefined') { }

        bestEl.innerText = bestScore;

        function initGame() {
            board = Array(BOARD_SIZE).fill().map(() => Array(BOARD_SIZE).fill(0));
            score = 0;
            updateScore();
            modal.style.display = 'none';
            drawBoard();
            addRandomTile();
            addRandomTile();
            updateBoard();
        }

        function drawBoard() {
            boardEl.innerHTML = '';
            for (let r = 0; r < BOARD_SIZE; r++) {
                for (let c = 0; c < BOARD_SIZE; c++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell tile-';
                    cell.id = `cell-${r}-${c}`;
                    boardEl.appendChild(cell);
                }
            }
        }

        function updateBoard() {
            for (let r = 0; r < BOARD_SIZE; r++) {
                for (let c = 0; c < BOARD_SIZE; c++) {
                    const cell = document.getElementById(`cell-${r}-${c}`);
                    const val = board[r][c];
                    cell.innerText = val === 0 ? '' : val;
                    cell.className = `cell tile-${val > 2048 ? 'super' : val}`;
                }
            }
            if (isGameOver()) {
                finalScoreEl.innerText = score;
                PizzaScores.save('2048', score);
                modal.style.display = 'flex';
            }
        }

        function addRandomTile() {
            const emptyCells = [];
            for (let r = 0; r < BOARD_SIZE; r++) {
                for (let c = 0; c < BOARD_SIZE; c++) {
                    if (board[r][c] === 0) emptyCells.push({ r, c });
                }
            }
            if (emptyCells.length > 0) {
                const randomCell = emptyCells[Math.floor(Math.random() * emptyCells.length)];
                board[randomCell.r][randomCell.c] = Math.random() < 0.9 ? 2 : 4;
            }
        }

        function slideLine(row) {
            // Remove zeros
            let arr = row.filter(val => val !== 0);
            // Merge
            for (let i = 0; i < arr.length - 1; i++) {
                if (arr[i] === arr[i + 1]) {
                    arr[i] *= 2;
                    score += arr[i];
                    arr.splice(i + 1, 1);
                }
            }
            // Add trailing zeros
            while (arr.length < BOARD_SIZE) arr.push(0);
            return arr;
        }

        function move(dir) {
            let moved = false;

            if (dir === 'left' || dir === 'right') {
                for (let r = 0; r < BOARD_SIZE; r++) {
                    let row = board[r];
                    if (dir === 'right') row.reverse();
                    let newRow = slideLine(row);
                    if (dir === 'right') newRow.reverse();

                    if (board[r].join(',') !== newRow.join(',')) moved = true;
                    board[r] = newRow;
                }
            } else if (dir === 'up' || dir === 'down') {
                for (let c = 0; c < BOARD_SIZE; c++) {
                    let column = [board[0][c], board[1][c], board[2][c], board[3][c]];
                    if (dir === 'down') column.reverse();
                    let newColumn = slideLine(column);
                    if (dir === 'down') newColumn.reverse();

                    for (let r = 0; r < BOARD_SIZE; r++) {
                        if (board[r][c] !== newColumn[r]) moved = true;
                        board[r][c] = newColumn[r];
                    }
                }
            }

            if (moved) {
                addRandomTile();
                updateScore();
                updateBoard();
            }
        }

        function updateScore() {
            scoreEl.innerText = score;
            if (score > bestScore) {
                bestScore = score;
                localStorage.setItem('2048BestScore', bestScore);
                bestEl.innerText = bestScore;
            }
        }

        function isGameOver() {
            // Check empty cells
            for (let r = 0; r < BOARD_SIZE; r++) {
                for (let c = 0; c < BOARD_SIZE; c++) {
                    if (board[r][c] === 0) return false;
                }
            }
            // Check possible merges
            for (let r = 0; r < BOARD_SIZE; r++) {
                for (let c = 0; c < BOARD_SIZE; c++) {
                    if (c < BOARD_SIZE - 1 && board[r][c] === board[r][c + 1]) return false;
                    if (r < BOARD_SIZE - 1 && board[r][c] === board[r + 1][c]) return false;
                }
            }
            return true;
        }

        window.addEventListener('keydown', e => {
            if (modal.style.display === 'flex') return;
            switch (e.key) {
                case 'ArrowLeft': move('left'); break;
                case 'ArrowRight': move('right'); break;
                case 'ArrowUp': move('up'); break;
                case 'ArrowDown': move('down'); break;
            }
        });

        initGame();
    </script>
</body>

</html>
