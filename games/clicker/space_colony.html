<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Space Colony – The Pizza Edition</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        body {
            background: #000510;
            min-height: 100vh;
            font-family: 'Outfit', sans-serif;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px
        }

        h1 {
            color: #22d3ee;
            font-size: 2rem;
            text-shadow: 0 0 20px #22d3ee;
            margin-bottom: 4px
        }

        #counter {
            font-size: 1.2rem;
            color: #67e8f9;
            margin-bottom: 4px
        }

        #cps {
            font-size: .85rem;
            color: #475569;
            margin-bottom: 8px
        }

        #status-bar {
            display: flex;
            gap: 14px;
            margin-bottom: 12px;
            flex-wrap: wrap;
            justify-content: center
        }

        .stat-pill {
            background: rgba(34, 211, 238, .08);
            border: 1px solid rgba(34, 211, 238, .25);
            border-radius: 10px;
            padding: 6px 12px;
            font-size: .82rem;
            text-align: center;
            min-width: 80px
        }

        .stat-pill span {
            display: block;
            font-weight: 700;
            color: #22d3ee;
            font-size: 1rem
        }

        .stat-pill.danger {
            border-color: #ef4444;
            background: rgba(239, 68, 68, .1)
        }

        .stat-pill.danger span {
            color: #ef4444
        }

        /* Crisis */
        #crisis-wrap {
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 8px
        }

        #crisis-box {
            display: none;
            background: rgba(239, 68, 68, .15);
            border: 2px solid #ef4444;
            border-radius: 14px;
            padding: 10px 20px;
            text-align: center;
            animation: blink 1s ease-in-out infinite
        }

        @keyframes blink {

            0%,
            100% {
                border-color: #ef4444
            }

            50% {
                border-color: #f97316
            }
        }

        #crisis-btn {
            margin-top: 6px;
            padding: 6px 18px;
            background: #ef4444;
            border: none;
            color: #fff;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 700;
            font-family: inherit
        }

        .layout {
            display: flex;
            gap: 24px;
            flex-wrap: wrap;
            justify-content: center;
            width: 100%;
            max-width: 900px
        }

        #click-zone {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px
        }

        #planet {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #22d3ee, #0e4f5f, #000510);
            border: 3px solid #22d3ee;
            cursor: pointer;
            font-size: 72px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 40px rgba(34, 211, 238, .5);
            user-select: none;
            transition: transform .1s
        }

        #planet:active {
            transform: scale(.92)
        }

        #shop {
            flex: 1;
            min-width: 260px;
            background: rgba(255, 255, 255, .04);
            border: 1px solid rgba(34, 211, 238, .2);
            border-radius: 20px;
            padding: 20px;
            max-height: 70vh;
            overflow-y: auto
        }

        #shop h2 {
            color: #22d3ee;
            font-size: 1.1rem;
            margin-bottom: 14px
        }

        .upg {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px;
            background: rgba(34, 211, 238, .06);
            border: 1px solid rgba(34, 211, 238, .18);
            border-radius: 12px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: background .15s
        }

        .upg:hover {
            background: rgba(34, 211, 238, .16)
        }

        .upg.locked {
            opacity: .4;
            cursor: not-allowed
        }

        .ui {
            font-size: 1.6rem;
            flex-shrink: 0
        }

        .inf {
            flex: 1
        }

        .un {
            font-weight: 700;
            font-size: .9rem
        }

        .ud {
            font-size: .72rem;
            color: #94a3b8
        }

        .uc {
            font-size: .78rem;
            color: #67e8f9;
            margin-top: 2px
        }

        .uo {
            font-size: .72rem;
            color: #4ade80
        }

        #toast {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(34, 211, 238, .9);
            color: #fff;
            padding: 10px 18px;
            border-radius: 10px;
            font-weight: 700;
            opacity: 0;
            transition: opacity .3s;
            pointer-events: none;
            z-index: 99
        }
    </style>
</head>

<body>
    <h1>🚀 Space Colony</h1>
    <div id="counter">0 energy</div>
    <div id="cps">0/sec</div>
    <div id="status-bar">
        <div class="stat-pill" id="pill-o2">O₂<span id="o2">100%</span></div>
        <div class="stat-pill" id="pill-food">Food<span id="food">100%</span></div>
        <div class="stat-pill">Pop<span id="pop">10</span></div>
        <div class="stat-pill">Credits<span id="creds">0</span></div>
    </div>
    <div id="crisis-wrap">
        <div id="crisis-box">
            <div id="crisis-msg">⚠️ O₂ Level Critical!</div>
            <button id="crisis-btn" onclick="fixCrisis()">🔧 Fix Now!</button>
        </div>
    </div>
    <div class="layout">
        <div id="click-zone">
            <div id="planet" onclick="clickPlanet()">🌍</div>
            <div style="font-size:.8rem;color:#475569;text-align:center">Click to generate energy</div>
        </div>
        <div id="shop">
            <h2>🏗️ Build</h2>
            <div id="upgrades"></div>
        </div>
    </div>
    <div id="toast"></div>
    <script>
        let energy = 0, cps = 0, cp = 1, pop = 10, credits = 0, o2 = 100, food = 100, crisisActive = false, crisisCost = 0;
        const UPS = [
            { n: 'Solar Panel', i: '☀️', d: '+0.5/s energy', base: 10, own: 0, rate: .5, type: 'e' },
            { n: 'Wind Turbine', i: '🌪️', d: '+2/s energy', base: 60, own: 0, rate: 2, type: 'e' },
            { n: 'O₂ Generator', i: '🌬️', d: 'Stabilizes oxygen', base: 80, own: 0, rate: 0, type: 'o2' },
            { n: 'Greenhouse', i: '�', d: 'Grows food, +pop', base: 120, own: 0, rate: 0, type: 'food' },
            { n: 'Nuclear Plant', i: '⚛️', d: '+10/s energy', base: 400, own: 0, rate: 10, type: 'e' },
            { n: 'Hab Dome', i: '🏠', d: '+20 population', base: 200, own: 0, rate: 0, type: 'pop' },
            { n: 'Mining Rig', i: '⛏️', d: '+25/s energy', base: 2000, own: 0, rate: 25, type: 'e' },
            { n: 'Space Station', i: '�', d: '+80/s energy', base: 12000, own: 0, rate: 80, type: 'e' },
        ];
        let o2Stab = false, foodStab = false;
        function fmt(n) { if (n >= 1e9) return (n / 1e9).toFixed(1) + 'B'; if (n >= 1e6) return (n / 1e6).toFixed(1) + 'M'; if (n >= 1e3) return (n / 1e3).toFixed(1) + 'K'; return Math.floor(n) + '' }
        function cost(u) { return Math.floor(u.base * Math.pow(1.15, u.own)) }
        function clickPlanet() {
            energy += cp; credits += Math.floor(cp * .01 * pop);
            const el = document.createElement('div');
            el.textContent = '⚡+' + cp; el.style.cssText = 'position:fixed;color:#22d3ee;font-weight:700;pointer-events:none;z-index:50';
            const r = document.getElementById('planet').getBoundingClientRect();
            el.style.left = (r.left + r.width / 2 + (Math.random() - .5) * 50) + 'px'; el.style.top = r.top + 'px';
            el.animate([{ opacity: 1, transform: 'translateY(0)' }, { opacity: 0, transform: 'translateY(-55px)' }], { duration: 700, fill: 'forwards' });
            document.body.appendChild(el); setTimeout(() => el.remove(), 700);
        }
        function fixCrisis() {
            if (energy < crisisCost) return toast('❌ Not enough energy! Need ' + fmt(crisisCost));
            energy -= crisisCost; crisisActive = false; o2 = 70; food = 70;
            document.getElementById('crisis-box').style.display = 'none';
            toast('✅ Crisis averted!');
        }
        function buy(u) {
            const co = cost(u); if (energy < co) return;
            energy -= co; u.own++;
            if (u.type === 'e') cps += u.rate;
            if (u.type === 'o2') { o2Stab = true; o2 = Math.min(100, o2 + 20); }
            if (u.type === 'food') { foodStab = true; food = Math.min(100, food + 20); pop += 5; }
            if (u.type === 'pop') pop += 20;
            renderUpgrades(); toast('✅ ' + u.n + ' built!');
        }
        function toast(msg) {
            const t = document.getElementById('toast'); t.textContent = msg; t.style.opacity = 1;
            clearTimeout(t._t); t._t = setTimeout(() => t.style.opacity = 0, 2200);
        }
        function renderUpgrades() {
            const d = document.getElementById('upgrades'); d.innerHTML = '';
            UPS.forEach(u => {
                const co = cost(u), div = document.createElement('div');
                div.className = 'upg' + (energy < co ? ' locked' : '');
                div.innerHTML = `<div class="ui">${u.i}</div><div class="inf"><div class="un">${u.n}</div><div class="ud">${u.d}</div><div class="uc">⚡ ${fmt(co)}</div><div class="uo">Built: ${u.own}</div></div>`;
                div.addEventListener('click', () => buy(u));
                d.appendChild(div);
            });
        }
        // Crisis system — O2/Food drain every 5s
        let crisisTimer = 0;
        setInterval(() => {
            if (!o2Stab) o2 = Math.max(0, o2 - 3);
            if (!foodStab) food = Math.max(0, food - 2);
            crisisTimer++;
            // Random crisis
            if (crisisTimer % 20 === 0 && !crisisActive && Math.random() < .4) {
                crisisActive = true; crisisCost = Math.max(20, Math.floor(cps * 15 + 50));
                const msgs = ['⚠️ O₂ Level Critical!', '⚠️ Food Supply Failing!', '⚠️ Power Grid Overload!', '⚠️ Meteor Strike Damage!'];
                document.getElementById('crisis-msg').textContent = msgs[Math.floor(Math.random() * msgs.length)];
                document.getElementById('crisis-btn').textContent = '🔧 Fix (' + fmt(crisisCost) + ' ⚡)';
                document.getElementById('crisis-box').style.display = 'block';
            }
            const p1 = document.getElementById('pill-o2'), p2 = document.getElementById('pill-food');
            p1.className = 'stat-pill' + (o2 < 30 ? ' danger' : '');
            p2.className = 'stat-pill' + (food < 30 ? ' danger' : '');
        }, 5000);

        let last = 0, lastR = 0;
        function loop(ts) {
            if (last) energy += cps * (ts - last) / 1000;
            last = ts;
            credits += cps * (ts - last || 0) * 0.001 * pop;
            document.getElementById('counter').textContent = fmt(energy) + ' energy';
            document.getElementById('cps').textContent = cps.toFixed(1) + '/sec';
            document.getElementById('o2').textContent = Math.floor(o2) + '%';
            document.getElementById('food').textContent = Math.floor(food) + '%';
            document.getElementById('pop').textContent = pop;
            document.getElementById('creds').textContent = fmt(Math.floor(credits));
            if (ts - lastR > 500) { lastR = ts; renderUpgrades(); }
            requestAnimationFrame(loop);
        }
        renderUpgrades(); requestAnimationFrame(loop);
    </script>
</body>

</html>
