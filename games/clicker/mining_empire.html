<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Mining Empire – The Pizza Edition</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        body {
            background: #0c0a08;
            min-height: 100vh;
            font-family: 'Outfit', sans-serif;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px
        }

        h1 {
            color: #a78bfa;
            font-size: 2rem;
            text-shadow: 0 0 20px #a78bfa;
            margin-bottom: 4px
        }

        #counter {
            font-size: 1.2rem;
            color: #c4b5fd;
            margin-bottom: 4px
        }

        #cps {
            font-size: .85rem;
            color: #4b5563;
            margin-bottom: 8px
        }

        /* Gem Vein minigame */
        #vein-wrap {
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 6px;
            margin-bottom: 8px
        }

        #vein-msg {
            font-size: .82rem;
            color: #94a3b8
        }

        #vein-spots {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center
        }

        .vein {
            font-size: 2rem;
            cursor: pointer;
            user-select: none;
            transition: transform .1s;
            filter: drop-shadow(0 0 8px #a78bfa);
            animation: bob .8s ease-in-out infinite alternate
        }

        .vein:hover {
            transform: scale(1.3)
        }

        @keyframes bob {
            from {
                transform: scale(1)
            }

            to {
                transform: scale(1.15)
            }
        }

        #vein-timer {
            font-size: .75rem;
            color: #a78bfa
        }

        .gems-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 8px
        }

        .gem-badge {
            background: rgba(167, 139, 250, .08);
            border: 1px solid rgba(167, 139, 250, .2);
            border-radius: 8px;
            padding: 4px 10px;
            font-size: .8rem;
            text-align: center
        }

        .gem-badge span {
            font-weight: 700;
            color: #a78bfa
        }

        .layout {
            display: flex;
            gap: 24px;
            flex-wrap: wrap;
            justify-content: center;
            width: 100%;
            max-width: 900px
        }

        #click-zone {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px
        }

        #rock {
            width: 150px;
            height: 150px;
            border-radius: 20px;
            background: radial-gradient(circle at 30% 30%, #6d28d9, #2e1065, #0c0a08);
            border: 3px solid #a78bfa;
            cursor: pointer;
            font-size: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 30px rgba(167, 139, 250, .4);
            user-select: none;
            transition: transform .1s
        }

        #rock:active {
            transform: scale(.92)
        }

        #shop {
            flex: 1;
            min-width: 260px;
            background: rgba(255, 255, 255, .03);
            border: 1px solid rgba(167, 139, 250, .2);
            border-radius: 20px;
            padding: 20px;
            max-height: 70vh;
            overflow-y: auto
        }

        #shop h2 {
            color: #a78bfa;
            font-size: 1.1rem;
            margin-bottom: 14px
        }

        .upg {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px;
            background: rgba(167, 139, 250, .06);
            border: 1px solid rgba(167, 139, 250, .18);
            border-radius: 12px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: background .15s
        }

        .upg:hover {
            background: rgba(167, 139, 250, .18)
        }

        .upg.locked {
            opacity: .4;
            cursor: not-allowed
        }

        .ui {
            font-size: 1.6rem;
            flex-shrink: 0
        }

        .inf {
            flex: 1
        }

        .un {
            font-weight: 700;
            font-size: .9rem
        }

        .ud {
            font-size: .72rem;
            color: #6b7280
        }

        .uc {
            font-size: .78rem;
            color: #c4b5fd;
            margin-top: 2px
        }

        .uo {
            font-size: .72rem;
            color: #4ade80
        }

        #toast {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(167, 139, 250, .9);
            color: #fff;
            padding: 10px 18px;
            border-radius: 10px;
            font-weight: 700;
            opacity: 0;
            transition: opacity .3s;
            pointer-events: none;
            z-index: 99
        }
    </style>
</head>

<body>
    <h1>⛏️ Mining Empire</h1>
    <div id="counter">0 gems</div>
    <div id="cps">0/sec</div>
    <div class="gems-row">
        <div class="gem-badge">💎<span id="d">0</span></div>
        <div class="gem-badge">🔴<span id="r">0</span></div>
        <div class="gem-badge">💚<span id="e">0</span></div>
        <div class="gem-badge">💛<span id="y">0</span></div>
    </div>
    <div id="vein-wrap">
        <div id="vein-msg">⛏️ Mine rocks — gem veins will appear!</div>
        <div id="vein-spots"></div>
        <div id="vein-timer"></div>
    </div>
    <div class="layout">
        <div id="click-zone">
            <div id="rock" onclick="mine()">💎</div>
            <div style="font-size:.8rem;color:#6b7280;text-align:center">Swing the pickaxe!</div>
        </div>
        <div id="shop">
            <h2>🏗️ Expand</h2>
            <div id="upgrades"></div>
        </div>
    </div>
    <div id="toast"></div>
    <script>
        let gems = 0, gps = 0, cp = 1, hits = 0, diamonds = 0, rubies = 0, emeralds = 0, yellows = 0;
        let veins = [], veinActive = false;
        const UPS = [
            { n: 'Pickaxe Upgrade', i: '⛏️', d: '+2/swing', base: 40, own: 0, rate: 0, cp: 2 },
            { n: 'Canary', i: '🐦', d: '+0.5/s gems', base: 60, own: 0, rate: .5 },
            { n: 'Mine Cart', i: '🛤️', d: '+2/s gems', base: 250, own: 0, rate: 2 },
            { n: 'Drill Rig', i: '🔩', d: '+8/s gems', base: 1200, own: 0, rate: 8 },
            { n: 'Mining Robot', i: '🤖', d: '+30/s gems', base: 6000, own: 0, rate: 30 },
            { n: 'Gem Detector', i: '📡', d: '+100/s gems', base: 30000, own: 0, rate: 100 },
        ];
        const VEIN_GEMS = ['💎', '🔴', '💚', '💛', '🔷', '🟣', '❤️‍🔥'];
        function fmt(n) { if (n >= 1e9) return (n / 1e9).toFixed(1) + 'B'; if (n >= 1e6) return (n / 1e6).toFixed(1) + 'M'; if (n >= 1e3) return (n / 1e3).toFixed(1) + 'K'; return Math.floor(n) + '' }
        function cost(u) { return Math.floor(u.base * Math.pow(1.15, u.own)) }
        function mine() {
            gems += cp; hits++;
            if (hits % 8 === 0) diamonds++;
            if (hits % 20 === 0) rubies++;
            if (hits % 40 === 0) emeralds++;
            if (hits % 15 === 0) yellows++;
            const el = document.createElement('div');
            el.textContent = '💎+' + cp; el.style.cssText = 'position:fixed;color:#c4b5fd;font-weight:700;pointer-events:none;z-index:50';
            const r = document.getElementById('rock').getBoundingClientRect();
            el.style.left = (r.left + r.width / 2 + (Math.random() - .5) * 50) + 'px'; el.style.top = r.top + 'px';
            el.animate([{ opacity: 1, transform: 'translateY(0)rotate(0)' }, { opacity: 0, transform: 'translateY(-65px)rotate(15deg)' }], { duration: 800, fill: 'forwards' });
            document.body.appendChild(el); setTimeout(() => el.remove(), 800);
            if (hits % 25 === 0 && !veinActive) spawnVein();
        }
        function spawnVein() {
            if (veinActive) return; veinActive = true;
            const count = 2 + Math.floor(Math.random() * 4);
            veins = [];
            for (let i = 0; i < count; i++) {
                const g = VEIN_GEMS[Math.floor(Math.random() * VEIN_GEMS.length)];
                const reward = Math.max(5, Math.floor(cp * 8 + gps * 3));
                const id = Date.now() + i;
                veins.push({ g, reward, id });
            }
            renderVeins();
            document.getElementById('vein-msg').textContent = '💥 Gem vein discovered! Quick, mine it!';
            let t = 12;
            document.getElementById('vein-timer').textContent = '⏱ ' + t + 's';
            const iv = setInterval(() => {
                t--; document.getElementById('vein-timer').textContent = t > 0 ? '⏱ ' + t + 's' : 'Vein exhausted';
                if (t <= 0) { clearInterval(iv); veins = []; veinActive = false; renderVeins(); document.getElementById('vein-msg').textContent = '⛏️ Mine rocks — more veins will appear!'; }
            }, 1000);
        }
        function mineVein(id) {
            const idx = veins.findIndex(v => v.id === id); if (idx < 0) return;
            const v = veins[idx];
            gems += v.reward; veins.splice(idx, 1);
            toast('💎 +' + fmt(v.reward) + ' gems from vein!');
            renderVeins();
            if (veins.length === 0) { veinActive = false; document.getElementById('vein-msg').textContent = '⛏️ Mine rocks — more veins will appear!'; document.getElementById('vein-timer').textContent = ''; }
        }
        function renderVeins() {
            const s = document.getElementById('vein-spots'); s.innerHTML = '';
            veins.forEach(v => {
                const div = document.createElement('div'); div.className = 'vein';
                div.textContent = v.g; div.title = '+' + fmt(v.reward);
                div.addEventListener('click', () => mineVein(v.id));
                s.appendChild(div);
            });
        }
        function buy(u) {
            const co = cost(u); if (gems < co) return;
            gems -= co; u.own++;
            if (u.rate) gps += u.rate; if (u.cp) cp += u.cp;
            renderUpgrades(); toast('✅ ' + u.n + '!');
        }
        function toast(msg) {
            const t = document.getElementById('toast'); t.textContent = msg; t.style.opacity = 1;
            clearTimeout(t._t); t._t = setTimeout(() => t.style.opacity = 0, 2200);
        }
        function renderUpgrades() {
            const d = document.getElementById('upgrades'); d.innerHTML = '';
            UPS.forEach(u => {
                const co = cost(u), div = document.createElement('div');
                div.className = 'upg' + (gems < co ? ' locked' : '');
                div.innerHTML = `<div class="ui">${u.i}</div><div class="inf"><div class="un">${u.n}</div><div class="ud">${u.d}</div><div class="uc">💎 ${fmt(co)}</div><div class="uo">Owned: ${u.own}</div></div>`;
                div.addEventListener('click', () => buy(u));
                d.appendChild(div);
            });
        }
        let last = 0, lastR = 0;
        function loop(ts) {
            if (last) gems += gps * (ts - last) / 1000;
            last = ts;
            document.getElementById('counter').textContent = fmt(gems) + ' gems';
            document.getElementById('cps').textContent = gps.toFixed(1) + '/sec | ' + hits + ' hits';
            document.getElementById('d').textContent = diamonds;
            document.getElementById('r').textContent = rubies;
            document.getElementById('e').textContent = emeralds;
            document.getElementById('y').textContent = yellows;
            if (ts - lastR > 500) { lastR = ts; renderUpgrades(); }
            requestAnimationFrame(loop);
        }
        renderUpgrades(); requestAnimationFrame(loop);
    </script>
</body>

</html>
