<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Checkers | The Pizza Edition</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: radial-gradient(ellipse at center, #1a0a00, #000);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Courier New', monospace;
            color: #fff;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 8px;
            letter-spacing: 3px;
            text-shadow: 0 0 20px #f59e0b;
        }

        #status {
            font-size: 1.1rem;
            margin-bottom: 10px;
            min-height: 1.5em;
            color: #fcd34d;
        }

        canvas {
            border: 4px solid #92400e;
            box-shadow: 0 0 30px #92400e66;
            cursor: pointer;
        }

        #score {
            display: flex;
            gap: 40px;
            margin-top: 12px;
            font-size: 1rem;
            color: #fcd34d;
        }

        button {
            margin-top: 12px;
            padding: 10px 32px;
            background: linear-gradient(135deg, #f59e0b, #d97706);
            color: #000;
            font-size: 1rem;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            letter-spacing: 2px;
        }

        button:hover {
            transform: scale(1.07);
        }

        #menuBtn {
            background: linear-gradient(135deg, #334155, #1e293b);
            color: #fff;
            display: none;
        }

        #homeBtn {
            position: fixed;
            top: 14px;
            left: 14px;
            padding: 8px 18px;
            background: rgba(30, 41, 59, 0.9);
            color: #fff;
            font-size: .9rem;
            font-weight: bold;
            border: 1px solid #475569;
            border-radius: 8px;
            cursor: pointer;
            text-decoration: none;
            z-index: 999;
        }

        #homeBtn:hover {
            background: #1e40af;
        }
    </style>
</head>

<body>
    <a id="homeBtn" href="../index.html">🏠 Menu</a>
    <h1>♟ CHECKERS</h1>
    <div id="status">🔴 Red's Turn</div>
    <canvas id="c" width="480" height="480"></canvas>
    <div id="score"><span>🔴 Red: <b id="s1">12</b></span><span>⚫ Black: <b id="s2">12</b></span></div>
    <button onclick="resetGame()">NEW GAME</button>
    <button id="menuBtn" onclick="window.close()">🏠 Return to Menu</button>
    <script src="../scripts/scores.js"></script>
    <script>
        const C = document.getElementById('c'), ctx = C.getContext('2d');
        const SIZE = 8, CELL = 60;
        let board, current, selected, validMoves, scores;

        function resetGame() {
            board = [];
            for (let r = 0; r < SIZE; r++) {
                board[r] = [];
                for (let c = 0; c < SIZE; c++) {
                    if ((r + c) % 2 === 1) {
                        if (r < 3) board[r][c] = { color: 2, king: false };
                        else if (r > 4) board[r][c] = { color: 1, king: false };
                        else board[r][c] = null;
                    } else board[r][c] = null;
                }
            }
            current = 1; selected = null; validMoves = [];
            scores = [12, 12];
            document.getElementById('s1').textContent = 12;
            document.getElementById('s2').textContent = 12;
            document.getElementById('status').textContent = "🔴 Red's Turn";
            draw();
        }

        function getMoves(r, c, board) {
            const piece = board[r][c]; if (!piece) return [];
            const moves = [], jumps = [];
            const dirs = piece.color === 1 ? [[-1, -1], [-1, 1]] : [[1, -1], [1, 1]];
            if (piece.king) { dirs.push(...(piece.color === 1 ? [[1, -1], [1, 1]] : [[-1, -1], [-1, 1]])); }
            dirs.forEach(([dr, dc]) => {
                const nr = r + dr, nc = c + dc;
                if (nr >= 0 && nr < SIZE && nc >= 0 && nc < SIZE) {
                    if (!board[nr][nc]) moves.push({ r: nr, c: nc, jump: false });
                    else if (board[nr][nc].color !== piece.color) {
                        const jr = nr + dr, jc = nc + dc;
                        if (jr >= 0 && jr < SIZE && jc >= 0 && jc < SIZE && !board[jr][jc]) jumps.push({ r: jr, c: jc, jump: true, capR: nr, capC: nc });
                    }
                }
            });
            return jumps.length ? jumps : moves;
        }

        function allMoves(color) {
            const all = [];
            for (let r = 0; r < SIZE; r++) for (let c = 0; c < SIZE; c++) if (board[r][c] && board[r][c].color === color) all.push(...getMoves(r, c, board).map(m => ({ ...m, fromR: r, fromC: c })));
            const hasJumps = all.some(m => m.jump);
            return hasJumps ? all.filter(m => m.jump) : all;
        }

        C.addEventListener('click', e => {
            const rect = C.getBoundingClientRect();
            const c = Math.floor((e.clientX - rect.left) / CELL);
            const r = Math.floor((e.clientY - rect.top) / CELL);
            if (selected) {
                const mv = validMoves.find(m => m.r === r && m.c === c);
                if (mv) {
                    board[mv.r][mv.c] = { ...board[selected.r][selected.c] };
                    board[selected.r][selected.c] = null;
                    if (mv.jump) {
                        board[mv.capR][mv.capC] = null;
                        scores[current === 1 ? 1 : 0]--;
                        document.getElementById(`s${current === 1 ? 2 : 1}`).textContent = scores[current === 1 ? 1 : 0];
                    }
                    // King
                    if (current === 1 && mv.r === 0) board[mv.r][mv.c].king = true;
                    if (current === 2 && mv.r === SIZE - 1) board[mv.r][mv.c].king = true;
                    // Multi-jump
                    let nextJumps = mv.jump ? getMoves(mv.r, mv.c, board).filter(m => m.jump) : [];
                    if (nextJumps.length && mv.jump) { selected = { r: mv.r, c: mv.c }; validMoves = nextJumps; draw(); return; }
                    selected = null; validMoves = [];
                    current = current === 1 ? 2 : 1;
                    const ops = allMoves(current);
                    if (ops.length === 0) {
                        const win = current === 1 ? '⚫ Black' : '🔴 Red';
                        document.getElementById('status').textContent = `${win} Wins! 🎉`;
                        document.getElementById('menuBtn').style.display = '';
                        PizzaScores.save('Checkers', 1, `${current === 1 ? 'Black' : 'Red'} wins`);
                    } else {
                        document.getElementById('status').textContent = current === 1 ? '🔴 Red\'s Turn' : '⚫ Black\'s Turn';
                    }
                    draw(); return;
                }
                selected = null; validMoves = [];
            }
            if (board[r][c] && board[r][c].color === current) {
                const mvs = getMoves(r, c, board);
                const mandatory = allMoves(current).filter(m => m.fromR === r && m.fromC === c);
                validMoves = mandatory.length ? mandatory : mvs;
                if (validMoves.length) { selected = { r, c }; }
            }
            draw();
        });

        function draw() {
            for (let r = 0; r < SIZE; r++) {
                for (let c = 0; c < SIZE; c++) {
                    ctx.fillStyle = (r + c) % 2 === 0 ? '#f5deb3' : '#8b4513';
                    ctx.fillRect(c * CELL, r * CELL, CELL, CELL);
                    if (selected && selected.r === r && selected.c === c) { ctx.fillStyle = 'rgba(255,255,0,0.3)'; ctx.fillRect(c * CELL, r * CELL, CELL, CELL); }
                    const mv = validMoves.find(m => m.r === r && m.c === c);
                    if (mv) { ctx.fillStyle = 'rgba(0,255,0,0.4)'; ctx.fillRect(c * CELL, r * CELL, CELL, CELL); }
                    const p = board[r][c];
                    if (p) {
                        const cx = c * CELL + CELL / 2, cy = r * CELL + CELL / 2;
                        ctx.fillStyle = p.color === 1 ? '#ef4444' : '#1a1a1a';
                        ctx.shadowColor = p.color === 1 ? '#f87171' : '#9ca3af'; ctx.shadowBlur = 8;
                        ctx.beginPath(); ctx.arc(cx, cy, CELL / 2 - 6, 0, Math.PI * 2); ctx.fill();
                        ctx.shadowBlur = 0;
                        // Shine
                        ctx.fillStyle = p.color === 1 ? 'rgba(255,200,200,0.4)' : 'rgba(100,100,100,0.4)';
                        ctx.beginPath(); ctx.ellipse(cx - 5, cy - 5, 8, 6, Math.PI / 4, 0, Math.PI * 2); ctx.fill();
                        if (p.king) { ctx.fillStyle = '#ffd700'; ctx.font = 'bold 20px serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillText('♛', cx, cy + 1); }
                    }
                }
            }
        }
        resetGame();
    </script>
</body>

</html>
