<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Color Match | The Pizza Edition</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: radial-gradient(ellipse at center, #0f0a1e, #000);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Courier New', monospace;
            color: #fff;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 8px;
            letter-spacing: 4px;
            text-shadow: 0 0 20px #f472b6;
        }

        #hud {
            display: flex;
            gap: 40px;
            margin-bottom: 14px;
            font-size: 1rem;
            color: #f9a8d4;
        }

        #question {
            font-size: 3.5rem;
            font-weight: bold;
            letter-spacing: 4px;
            margin: 10px 0 20px;
            min-height: 70px;
            text-align: center;
        }

        #instruction {
            font-size: 1rem;
            color: #94a3b8;
            margin-bottom: 16px;
            text-align: center;
            line-height: 1.6;
        }

        #options {
            display: grid;
            grid-template-columns: repeat(2, 180px);
            gap: 14px;
        }

        .opt {
            width: 180px;
            height: 70px;
            border: none;
            border-radius: 12px;
            font-size: 1.3rem;
            font-weight: bold;
            cursor: pointer;
            transition: transform .15s, box-shadow .15s;
            letter-spacing: 2px;
        }

        .opt:hover {
            transform: scale(1.08);
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
        }

        #feedback {
            height: 40px;
            font-size: 1.4rem;
            margin-top: 16px;
            font-weight: bold;
        }

        #timer-bar {
            width: 360px;
            height: 10px;
            background: #1e1040;
            border-radius: 5px;
            margin-bottom: 14px;
        }

        #timer-fill {
            height: 100%;
            background: linear-gradient(90deg, #f472b6, #8b5cf6);
            border-radius: 5px;
            transition: width .3s;
        }

        button.new-btn {
            margin-top: 14px;
            padding: 10px 32px;
            background: linear-gradient(135deg, #f472b6, #be185d);
            color: #fff;
            font-size: 1rem;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            letter-spacing: 2px;
        }

        button.new-btn:hover {
            transform: scale(1.07);
        }

        #menuBtn {
            margin-top: 10px;
            padding: 10px 32px;
            background: linear-gradient(135deg, #334155, #1e293b);
            color: #fff;
            font-size: 1rem;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            letter-spacing: 2px;
            display: none;
        }

        #menuBtn:hover {
            transform: scale(1.07);
        }

        #homeBtn {
            position: fixed;
            top: 14px;
            left: 14px;
            padding: 8px 18px;
            background: rgba(30, 41, 59, 0.9);
            color: #fff;
            font-size: .9rem;
            font-weight: bold;
            border: 1px solid #475569;
            border-radius: 8px;
            cursor: pointer;
            text-decoration: none;
            z-index: 999;
        }

        #homeBtn:hover {
            background: #1e40af;
        }

        #streak-bar {
            display: flex;
            gap: 8px;
            margin-bottom: 10px;
        }

        .streak-dot {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #334155;
            transition: background .2s;
        }

        .streak-dot.active {
            background: #f472b6;
        }
    </style>
</head>

<body>
    <a id="homeBtn" href="../index.html">🏠 Menu</a>
    <h1>🎨 COLOR MATCH</h1>
    <div id="hud"><span>SCORE: <b id="score">0</b></span><span>STREAK: <b id="streak">0</b></span><span>ROUND: <b
                id="round">1</b></span></div>
    <div id="timer-bar">
        <div id="timer-fill" style="width:100%"></div>
    </div>
    <div id="streak-bar"></div>
    <div id="instruction">Click the button whose <b>COLOR</b> matches the <b>TEXT</b> written!</div>
    <div id="question">RED</div>
    <div id="options"></div>
    <div id="feedback"></div>
    <button class="new-btn" onclick="startGame()">NEW GAME</button>
    <button id="menuBtn" onclick="window.close()">🏠 Return to Menu</button>
    <script src="../scripts/scores.js"></script>
    <script>
        const COLORS = ['RED', 'BLUE', 'GREEN', 'YELLOW', 'PINK', 'ORANGE', 'PURPLE', 'CYAN'];
        const CSS = { 'RED': '#ef4444', 'BLUE': '#3b82f6', 'GREEN': '#22c55e', 'YELLOW': '#facc15', 'PINK': '#f472b6', 'ORANGE': '#f97316', 'PURPLE': '#a855f7', 'CYAN': '#22d3ee' };
        let score, streak, round, timeLeft, timerInt, correct, running, maxStreak = 0;

        function startGame() {
            score = 0; streak = 0; round = 0; running = true;
            document.getElementById('score').textContent = 0;
            document.getElementById('streak').textContent = 0;
            document.getElementById('round').textContent = 1;
            document.getElementById('feedback').textContent = '';
            renderStreakBar();
            nextRound();
        }

        function renderStreakBar() {
            const el = document.getElementById('streak-bar'); el.innerHTML = '';
            for (let i = 0; i < 10; i++) {
                const d = document.createElement('div'); d.className = 'streak-dot' + (i < streak ? ' active' : ''); el.appendChild(d);
            }
        }

        function nextRound() {
            round++; document.getElementById('round').textContent = round;
            clearInterval(timerInt); timeLeft = 4 - Math.min(round * 0.05, 2);
            document.getElementById('timer-fill').style.width = '100%';
            // Stroop: word says one color, button color may differ
            const wordColor = COLORS[Math.floor(Math.random() * COLORS.length)];
            const displayColor = Math.random() > 0.5 ? wordColor : COLORS[Math.floor(Math.random() * COLORS.length)];
            // Word displayed in displayColor, text says wordColor. Correct = match button whose color = displayColor
            correct = displayColor;
            document.getElementById('question').textContent = wordColor;
            document.getElementById('question').style.color = CSS[displayColor];
            document.getElementById('instruction').innerHTML = `Click the button whose <b>BACKGROUND COLOR</b> matches the <b>color of the text above</b>!`;
            // Options: 4 shuffled colors including correct
            const opts = [displayColor, ...COLORS.filter(c => c !== displayColor).sort(() => Math.random() - 0.5).slice(0, 3)].sort(() => Math.random() - 0.5);
            const container = document.getElementById('options'); container.innerHTML = '';
            opts.forEach(c => {
                const btn = document.createElement('button'); btn.className = 'opt';
                btn.style.background = CSS[c]; btn.style.color = getLuma(CSS[c]) > 150 ? '#000' : '#fff';
                btn.textContent = c; btn.onclick = () => answer(c);
                container.appendChild(btn);
            });
            // Timer
            const start = Date.now();
            timerInt = setInterval(() => {
                const elapsed = (Date.now() - start) / 1000;
                const pct = Math.max(0, 1 - elapsed / timeLeft);
                document.getElementById('timer-fill').style.width = (pct * 100) + '%';
                if (pct <= 0) { clearInterval(timerInt); answer(null); }
            }, 50);
        }

        function getLuma(hex) { const r = parseInt(hex.slice(1, 3), 16), g = parseInt(hex.slice(3, 5), 16), b = parseInt(hex.slice(5, 7), 16); return 0.299 * r + 0.587 * g + 0.114 * b; }

        function answer(c) {
            clearInterval(timerInt);
            if (c === correct) {
                streak++; score += 10 + streak * 2;
                document.getElementById('feedback').textContent = '✅ Correct! +' + (10 + streak * 2);
                document.getElementById('feedback').style.color = '#4ade80';
            } else {
                streak = 0;
                document.getElementById('feedback').textContent = c === null ? '⏰ Too slow!' : `❌ Wrong! Was: ${correct}`;
                document.getElementById('feedback').style.color = '#f87171';
            }
            document.getElementById('score').textContent = score;
            document.getElementById('streak').textContent = streak;
            renderStreakBar();
            if (round >= 15) { clearInterval(timerInt); running = false; document.getElementById('feedback').textContent += `  🏆 FINAL: ${score}pts!`; document.getElementById('menuBtn').style.display = ''; PizzaScores.save('Color Match', score); return; }
            setTimeout(() => { document.getElementById('feedback').textContent = ''; nextRound(); }, 700);
        }

        startGame();
    </script>
</body>

</html>
