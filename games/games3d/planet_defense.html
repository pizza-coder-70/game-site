<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Planet Defense 3D</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        body {
            background: #000;
            overflow: hidden;
            font-family: 'Courier New', monospace
        }

        #hud {
            position: fixed;
            top: 12px;
            left: 12px;
            color: #f472b6;
            font-size: .85rem;
            text-shadow: 0 0 8px #f472b6
        }

        #hud b {
            color: #fda4af
        }

        #msg {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, .85);
            border: 2px solid #f472b6;
            border-radius: 16px;
            padding: 24px 40px;
            color: #facc15;
            font-size: 1.8rem;
            font-weight: 700;
            text-align: center;
            display: none
        }

        #info {
            position: fixed;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            color: #475569;
            font-size: .78rem
        }
    </style>
</head>

<body>
    <div id="hud">🌍 Planet HP: <b id="hp">100</b> &nbsp;|&nbsp; ⭐ Score: <b id="sc">0</b> &nbsp;|&nbsp; 🌊 Wave: <b
            id="wv">1</b></div>
    <div id="msg"></div>
    <div id="info">Mouse = aim | Click = shoot | Destroy asteroids before they hit the planet!</div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(innerWidth, innerHeight); document.body.appendChild(renderer.domElement);
        const scene = new THREE.Scene(); scene.background = new THREE.Color(0x000208);
        const camera = new THREE.PerspectiveCamera(60, innerWidth / innerHeight, .1, 300);
        camera.position.set(0, 35, 55); camera.lookAt(0, 0, 0);
        scene.add(new THREE.AmbientLight(0x1a0a2a, .5));
        const sunLight = new THREE.PointLight(0xffffff, 2, 200); sunLight.position.set(50, 30, 50); scene.add(sunLight);

        // Stars
        const sg = new THREE.BufferGeometry(); const sp = []; for (let i = 0; i < 2000; i++)sp.push((Math.random() - .5) * 400, (Math.random() - .5) * 400, (Math.random() - .5) * 400);
        sg.setAttribute('position', new THREE.Float32BufferAttribute(sp, 3)); scene.add(new THREE.Points(sg, new THREE.PointsMaterial({ color: 0xffffff, size: .4 })));

        // Planet
        const planet = new THREE.Mesh(new THREE.SphereGeometry(7, 32, 32), new THREE.MeshPhongMaterial({ color: 0x1a6bba, emissive: 0x041030, shininess: 50 }));
        scene.add(planet); planet.add(new THREE.PointLight(0x1a6bba, .3, 20));
        // Planet ring
        const ring = new THREE.Mesh(new THREE.TorusGeometry(10, .4, 8, 64), new THREE.MeshBasicMaterial({ color: 0x2a4a6a, transparent: true, opacity: .5 })); ring.rotation.x = Math.PI / 3; scene.add(ring);
        // Atmosphere glow
        const atm = new THREE.Mesh(new THREE.SphereGeometry(7.8, 32, 32), new THREE.MeshBasicMaterial({ color: 0x214080, transparent: true, opacity: .25, side: THREE.BackSide })); scene.add(atm);

        // Defense cannon (orbiting with mouse)
        const cannonGroup = new THREE.Group(); scene.add(cannonGroup);
        const cannonBase = new THREE.Mesh(new THREE.CylinderGeometry(.3, .5, .8, 8), new THREE.MeshPhongMaterial({ color: 0xf472b6, shininess: 120 }));
        cannonBase.position.set(0, 8.5, 0); cannonGroup.add(cannonBase);
        const barrel = new THREE.Mesh(new THREE.CylinderGeometry(.15, .15, 1.5, 8), new THREE.MeshPhongMaterial({ color: 0xfda4af })); barrel.position.set(0, 9.5, 0); cannonGroup.add(barrel);
        cannonGroup.add(new THREE.PointLight(0xf472b6, .8, 5));

        // Mouse to spherical coords
        let mouseAngle = { x: 0, y: 0 }, shooting = false, shootCD = 0;
        let cannonPhi = 0, cannonTheta = Math.PI / 4;
        document.addEventListener('mousemove', e => {
            cannonTheta = ((e.clientX / innerWidth) - .5) * Math.PI * 2;
            cannonPhi = Math.PI / 6 + ((e.clientY / innerHeight)) * Math.PI * .4;
        });
        const bullets = [], asteroids = [];
        document.addEventListener('click', () => {
            if (over || won) return;
            // Shoot from cannon tip in outward direction
            const dir = new THREE.Vector3(Math.sin(cannonTheta) * Math.sin(cannonPhi), Math.cos(cannonPhi), Math.cos(cannonTheta) * Math.sin(cannonPhi)).normalize();
            const start = new THREE.Vector3().copy(dir).multiplyScalar(10);
            const b = new THREE.Mesh(new THREE.SphereGeometry(.25, 8, 8), new THREE.MeshBasicMaterial({ color: 0xf472b6 }));
            b.position.copy(start); b.add(new THREE.PointLight(0xf472b6, 1, 3));
            scene.add(b); bullets.push({ mesh: b, vel: dir.multiplyScalar(.5), life: 120 });
        });

        let hp = 100, score = 0, wave = 1, over = false, won = false, waveCount = 6, kills = 0;
        function spawnAsteroid() {
            const r = 1 + Math.random() * 1.5;
            const geo = new THREE.DodecahedronGeometry(r, 0);
            const cols = [0xf97316, 0xef4444, 0xa78bfa, 0xfacc15];
            const mat = new THREE.MeshPhongMaterial({ color: cols[Math.floor(Math.random() * cols.length)], shininess: 20 });
            const m = new THREE.Mesh(geo, mat);
            const phi = Math.random() * Math.PI, theta = Math.random() * Math.PI * 2;
            const dist = 50 + Math.random() * 30;
            m.position.set(Math.sin(phi) * Math.cos(theta) * dist, Math.cos(phi) * dist * .5, Math.sin(phi) * Math.sin(theta) * dist);
            const toCenter = new THREE.Vector3().copy(m.position).negate().normalize().multiplyScalar(.05 + wave * .01);
            scene.add(m); asteroids.push({ mesh: m, vel: toCenter, r, rx: Math.random() * .03, ry: Math.random() * .03 });
        }
        function spawnWave(w) { asteroids.forEach(a => scene.remove(a.mesh)); asteroids.length = 0; kills = 0; waveCount = 6 + w * 2; for (let i = 0; i < waveCount / 2; i++)setTimeout(() => spawnAsteroid(), i * 800); }
        spawnWave(1);
        const msgEl = document.getElementById('msg');
        const clock = new THREE.Clock();
        function update() {
            const dt = clock.getDelta();
            if (over || won) return;
            planet.rotation.y += .003; ring.rotation.z += .001;
            // Cannon position
            const R = 9; cannonGroup.rotation.y = cannonTheta; cannonGroup.rotation.x = -cannonPhi + Math.PI / 2;
            // Bullets
            bullets.forEach(b => { b.mesh.position.addScaledVector(b.vel, 60 * dt); b.life--; });
            const deadBullets = bullets.filter(b => b.life <= 0); deadBullets.forEach(b => scene.remove(b.mesh)); bullets.splice(0, bullets.length, ...bullets.filter(b => b.life > 0));
            // Asteroids
            asteroids.forEach(a => {
                a.mesh.position.addScaledVector(a.vel, 60 * dt); a.mesh.rotation.x += a.rx; a.mesh.rotation.y += a.ry;
                // Hit planet
                if (a.mesh.position.length() < 7 + a.r) { hp -= 15; document.getElementById('hp').textContent = Math.max(0, hp); a.vel.negate(); a.mesh.position.addScaledVector(a.vel.clone().normalize(), 2); if (hp <= 0) { over = true; msgEl.innerHTML = '💥 PLANET DESTROYED!<br>Score: ' + score + '<br><small>R restart</small>'; msgEl.style.display = 'block'; } }
                // Hit bullets
                bullets.forEach(b => { if (b.mesh.position.distanceTo(a.mesh.position) < a.r + .5) { scene.remove(a.mesh); scene.remove(b.mesh); kills++; score += Math.floor(10 + a.r * 5 + wave * 2); document.getElementById('sc').textContent = score; bullets.splice(bullets.indexOf(b), 1); asteroids.splice(asteroids.indexOf(a), 1); } });
            });
            // Spawn more in wave
            if (asteroids.length < 3 && kills < waveCount) spawnAsteroid();
            if (kills >= waveCount && asteroids.length === 0) { wave++; document.getElementById('wv').textContent = wave; if (wave > 6) { won = true; msgEl.innerHTML = '🏆 PLANET SAVED!<br>Score: ' + score; msgEl.style.display = 'block'; return; } spawnWave(wave); }
        }
        document.addEventListener('keydown', e => { if (e.code === 'KeyR' && (over || won)) { hp = 100; score = 0; wave = 1; kills = 0; over = false; won = false; msgEl.style.display = 'none'; bullets.forEach(b => scene.remove(b.mesh)); bullets.length = 0; asteroids.forEach(a => scene.remove(a.mesh)); asteroids.length = 0; document.getElementById('hp').textContent = 100; document.getElementById('sc').textContent = 0; document.getElementById('wv').textContent = 1; spawnWave(1); } });
        function animate() { requestAnimationFrame(animate); update(); renderer.render(scene, camera); } animate();
        window.addEventListener('resize', () => { camera.aspect = innerWidth / innerHeight; camera.updateProjectionMatrix(); renderer.setSize(innerWidth, innerHeight); });
    </script>

    <script src="../mobile_controls.js"></script>
</body>

</html>
