<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Asteroid Belt 3D</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        body {
            background: #000;
            overflow: hidden;
            font-family: 'Courier New', monospace
        }

        #hud {
            position: fixed;
            top: 12px;
            left: 12px;
            color: #facc15;
            font-size: .85rem;
            text-shadow: 0 0 8px #facc15
        }

        #hud b {
            color: #fde68a
        }

        #shieldBar {
            position: fixed;
            bottom: 20px;
            left: 20px;
            width: 120px;
            height: 12px;
            background: rgba(56, 189, 248, .2);
            border-radius: 6px;
            border: 1px solid #38bdf8
        }

        #shieldFill {
            height: 100%;
            background: #38bdf8;
            border-radius: 6px;
            width: 100%
        }

        #msg {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, .88);
            border: 2px solid #facc15;
            border-radius: 16px;
            padding: 24px 40px;
            color: #facc15;
            font-size: 1.8rem;
            text-align: center;
            display: none
        }

        #info {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            color: #475569;
            font-size: .78rem
        }
    </style>
</head>

<body>
    <div id="hud">⭐ Score: <b id="sc">0</b> &nbsp;|&nbsp; ❤️ HP: <b id="hp">100</b> &nbsp;|&nbsp; ⏱ <b id="tm">0</b>s
        &nbsp;|&nbsp; 🛡 Shield</div>
    <div id="shieldBar">
        <div id="shieldFill"></div>
    </div>
    <div id="msg"></div>
    <div id="info">WASD / Arrows + QE = fly | Mouse = aim | Click = shoot | Survive 90s!</div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(innerWidth, innerHeight); document.body.appendChild(renderer.domElement);
        const scene = new THREE.Scene(); scene.background = new THREE.Color(0x000106); scene.fog = new THREE.FogExp2(0x000106, .012);
        const camera = new THREE.PerspectiveCamera(75, innerWidth / innerHeight, .1, 300);
        scene.add(new THREE.AmbientLight(0x101020, .6));
        scene.add(new THREE.DirectionalLight(0xfacc15, .8).position.set(30, 20, 30));
        // Stars
        const sg = new THREE.BufferGeometry(); const sp = []; for (let i = 0; i < 3000; i++)sp.push((Math.random() - .5) * 500, (Math.random() - .5) * 500, (Math.random() - .5) * 500); sg.setAttribute('position', new THREE.Float32BufferAttribute(sp, 3)); scene.add(new THREE.Points(sg, new THREE.PointsMaterial({ color: 0xffffff, size: .4 })));
        // Nebula
        const nb = new THREE.Mesh(new THREE.SphereGeometry(120, 16, 16), new THREE.MeshBasicMaterial({ color: 0x0a0030, side: THREE.BackSide, transparent: true, opacity: .5 })); scene.add(nb);

        // Ship
        const shipGroup = new THREE.Group(); scene.add(shipGroup);
        const shipBody = new THREE.Mesh(new THREE.ConeGeometry(.6, 3, 8), new THREE.MeshPhongMaterial({ color: 0xfacc15, shininess: 150 }));
        shipBody.rotation.x = Math.PI / 2; shipGroup.add(shipBody);
        const wing = new THREE.Mesh(new THREE.BoxGeometry(3.5, .15, .8), new THREE.MeshPhongMaterial({ color: 0xd97706, shininess: 80 }));
        wing.position.set(0, 0, .2); shipGroup.add(wing);
        shipGroup.add(new THREE.PointLight(0xfacc15, .8, 5));

        // Thruster glow
        const thrusterGeo = new THREE.CylinderGeometry(.3, .1, .8, 8);
        const thrusterMat = new THREE.MeshBasicMaterial({ color: 0xf97316 });
        const thruster = new THREE.Mesh(thrusterGeo, thrusterMat); thruster.position.z = 1.6; thruster.rotation.x = Math.PI / 2; shipGroup.add(thruster);

        // Asteroids
        const asteroids = [];
        function spawnAsteroid() {
            const r = 1.5 + Math.random() * 2, d = 60 + Math.random() * 40;
            const phi = Math.random() * Math.PI * 2, theta = Math.random() * Math.PI;
            const pos = new THREE.Vector3(Math.sin(theta) * Math.cos(phi) * d, Math.cos(theta) * d * .4, Math.sin(theta) * Math.sin(phi) * d);
            const geo = new THREE.DodecahedronGeometry(r, 0);
            const mat = new THREE.MeshLambertMaterial({ color: new THREE.Color().setHSL(Math.random() * .15 + .05, .4, .3) });
            const m = new THREE.Mesh(geo, mat); m.position.copy(pos);
            scene.add(m);
            const toCenter = pos.clone().negate().normalize().multiplyScalar(.06 + Math.random() * .04);
            asteroids.push({ mesh: m, vel: toCenter, r, rx: Math.random() * .03, ry: Math.random() * .02 });
        }
        for (let i = 0; i < 20; i++)spawnAsteroid();
        setInterval(() => { if (asteroids.length < 30 && !over && !won) spawnAsteroid(); }, 2000);

        // Variables
        let yaw = 0, pitch = 0, locked = false;
        let bullets = [], hp = 100, shield = 100, score = 0, time = 0, over = false, won = false, invuln = 0;
        let vel = new THREE.Vector3(); let keys = {};
        renderer.domElement.addEventListener('click', () => { if (!locked) renderer.domElement.requestPointerLock(); else shoot(); });
        document.addEventListener('pointerlockchange', () => locked = !!document.pointerLockElement);
        document.addEventListener('mousemove', e => { if (!locked) return; yaw -= e.movementX * .002; pitch = Math.max(-1, Math.min(1, pitch - e.movementY * .002)); });
        document.addEventListener('keydown', e => keys[e.code] = true); document.addEventListener('keyup', e => keys[e.code] = false);
        let shootCD = 0;
        function shoot() {
            if (shootCD > 0 || over || won) return;
            const dir = new THREE.Vector3(0, 0, -1).applyEuler(camera.rotation);
            const b = new THREE.Mesh(new THREE.SphereGeometry(.2, 6, 6), new THREE.MeshBasicMaterial({ color: 0xfacc15 }));
            b.position.copy(camera.position); b.add(new THREE.PointLight(0xfacc15, 1, 4)); scene.add(b);
            bullets.push({ mesh: b, vel: dir.multiplyScalar(2.5), life: 60 }); shootCD = 10;
        }
        // Timer
        let sec = 0; const tmIv = setInterval(() => { if (over || won) return; sec++; document.getElementById('tm').textContent = sec; if (sec >= 90) { won = true; document.getElementById('msg').innerHTML = '🏆 SURVIVED!<br>Score: ' + score + '<br>R restart'; document.getElementById('msg').style.display = 'block'; clearInterval(tmIv); } }, 1000);
        // Shield regen
        setInterval(() => { if (!over) shield = Math.min(100, shield + 5); document.getElementById('shieldFill').style.width = Math.max(0, shield) + '%'; }, 500);
        const clock = new THREE.Clock();
        function update() {
            const dt = clock.getDelta(); if (over || won) return;
            shootCD--; if (invuln > 0) invuln--;
            camera.rotation.order = 'YXZ'; camera.rotation.y = yaw; camera.rotation.x = pitch;
            const spd = 8; const fwd = new THREE.Vector3(0, 0, -1).applyEuler(camera.rotation), right = new THREE.Vector3(1, 0, 0).applyEuler(camera.rotation), up = new THREE.Vector3(0, 1, 0);
            if (keys['KeyW'] || keys['ArrowUp']) vel.addScaledVector(fwd, spd * dt);
            if (keys['KeyS'] || keys['ArrowDown']) vel.addScaledVector(fwd, -spd * dt);
            if (keys['KeyA'] || keys['ArrowLeft']) vel.addScaledVector(right, -spd * dt);
            if (keys['KeyD'] || keys['ArrowRight']) vel.addScaledVector(right, spd * dt);
            if (keys['KeyQ']) vel.addScaledVector(up, spd * dt); if (keys['KeyE']) vel.addScaledVector(up, -spd * dt);
            vel.multiplyScalar(.9); camera.position.addScaledVector(vel, 1);
            // Ship follows camera
            shipGroup.position.copy(camera.position); shipGroup.rotation.copy(camera.rotation);
            shipGroup.translateZ(-2); shipGroup.translateY(-.5);
            const thrusting = keys['KeyW'] || keys['ArrowUp']; thruster.material.color.setHex(thrusting ? 0xf97316 : 0x333333);
            // Bullets
            bullets = bullets.filter(b => {
                b.mesh.position.addScaledVector(b.vel, 60 * dt); b.life--;
                if (b.life <= 0) { scene.remove(b.mesh); return false; }
                for (const a of [...asteroids]) { if (b.mesh.position.distanceTo(a.mesh.position) < a.r + .4) { score += Math.floor(a.r * 15); document.getElementById('sc').textContent = score; scene.remove(a.mesh); asteroids.splice(asteroids.indexOf(a), 1); spawnAsteroid(); scene.remove(b.mesh); return false; } }
                return true;
            });
            // Asteroids
            asteroids.forEach(a => {
                a.mesh.position.addScaledVector(a.vel, 60 * dt); a.mesh.rotation.x += a.rx; a.mesh.rotation.y += a.ry;
                // Past center, reverse
                if (a.mesh.position.length() < 3) { a.vel.negate(); }
                if (invuln <= 0 && camera.position.distanceTo(a.mesh.position) < a.r + 1.5) {
                    if (shield > 0) { shield = Math.max(0, shield - 25); document.getElementById('shieldFill').style.width = shield + '%'; }
                    else { hp -= 20; document.getElementById('hp').textContent = Math.max(0, hp); if (hp <= 0) { over = true; clearInterval(tmIv); document.getElementById('msg').innerHTML = '💥 DESTROYED!<br>Score: ' + score + '<br>R restart'; document.getElementById('msg').style.display = 'block'; } }
                    invuln = 60;
                }
            });
        }
        document.addEventListener('keydown', e => { if (e.code === 'KeyR' && (over || won)) location.reload(); });
        function animate() { requestAnimationFrame(animate); update(); renderer.render(scene, camera); } animate();
        window.addEventListener('resize', () => { camera.aspect = innerWidth / innerHeight; camera.updateProjectionMatrix(); renderer.setSize(innerWidth, innerHeight); });
    </script>

    <script src="../mobile_controls.js"></script>
</body>

</html>
