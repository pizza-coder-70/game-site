<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Crystal Collect 3D</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        body {
            background: #000;
            overflow: hidden;
            font-family: 'Courier New', monospace
        }

        #hud {
            position: fixed;
            top: 12px;
            left: 12px;
            color: #a78bfa;
            font-size: .85rem;
            text-shadow: 0 0 8px #a78bfa
        }

        #hud b {
            color: #c4b5fd
        }

        #msg {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, .88);
            border: 2px solid #a78bfa;
            border-radius: 16px;
            padding: 24px 40px;
            color: #facc15;
            font-size: 1.8rem;
            text-align: center;
            display: none
        }

        #info {
            position: fixed;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            color: #475569;
            font-size: .78rem
        }
    </style>
</head>

<body>
    <div id="hud">💜 Crystals: <b id="cr">0</b>/<b id="cn">20</b> &nbsp;|&nbsp; ⏱ <b id="tm">60</b>s &nbsp;|&nbsp; ⭐
        Score: <b id="sc">0</b></div>
    <div id="msg"></div>
    <div id="info">WASD / Arrows = fly | Mouse = look | Click to lock mouse | Collect all crystals!</div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(innerWidth, innerHeight); document.body.appendChild(renderer.domElement);
        const scene = new THREE.Scene(); scene.background = new THREE.Color(0x04000e); scene.fog = new THREE.FogExp2(0x04000e, .025);
        const camera = new THREE.PerspectiveCamera(70, innerWidth / innerHeight, .1, 200); camera.position.set(0, 5, 0);
        scene.add(new THREE.AmbientLight(0x1a0a2a, .6));
        scene.add(new THREE.PointLight(0xa78bfa, 1.5, 60));

        // Stars
        const sg = new THREE.BufferGeometry(); const sp = []; for (let i = 0; i < 1500; i++)sp.push((Math.random() - .5) * 200, (Math.random() - .5) * 200, (Math.random() - .5) * 200); sg.setAttribute('position', new THREE.Float32BufferAttribute(sp, 3));
        scene.add(new THREE.Points(sg, new THREE.PointsMaterial({ color: 0xffffff, size: .3 })));

        // Floating islands / obstacles
        const islands = [];
        for (let i = 0; i < 12; i++) {
            const IS = new THREE.Mesh(new THREE.BoxGeometry(4 + Math.random() * 4, 1 + Math.random() * 2, 4 + Math.random() * 4), new THREE.MeshLambertMaterial({ color: new THREE.Color().setHSL(.75 + Math.random() * .2, .4, .15) }));
            IS.position.set((Math.random() - .5) * 60, (Math.random() - .5) * 30, (Math.random() - .5) * 60); scene.add(IS); islands.push(IS);
        }

        // Crystals
        const CRYSTAL_COLS = [0xa78bfa, 0x38bdf8, 0xf472b6, 0xfacc15, 0x4ade80, 0xf97316];
        const crystals = []; const TOTAL = 20;
        for (let i = 0; i < TOTAL; i++) {
            const col = CRYSTAL_COLS[i % CRYSTAL_COLS.length];
            const c = new THREE.Mesh(new THREE.OctahedronGeometry(.5 + Math.random() * .4, 0), new THREE.MeshPhongMaterial({ color: col, emissive: new THREE.Color(col).multiplyScalar(.3), shininess: 200, transparent: true, opacity: .9 }));
            c.position.set((Math.random() - .5) * 60, (Math.random() - .5) * 25, (Math.random() - .5) * 60);
            c.add(new THREE.PointLight(col, .8, 4)); scene.add(c); crystals.push(c);
        }
        document.getElementById('cn').textContent = TOTAL;

        // Enemies (patrol)
        const enemies = [];
        for (let i = 0; i < 5; i++) {
            const e = new THREE.Mesh(new THREE.TetrahedronGeometry(1, 0), new THREE.MeshPhongMaterial({ color: 0xef4444, emissive: 0x3a0000, shininess: 50 }));
            e.position.set((Math.random() - .5) * 50, (Math.random() - .5) * 20, (Math.random() - .5) * 50);
            e.add(new THREE.PointLight(0xef4444, .6, 5)); scene.add(e);
            enemies.push({ mesh: e, dir: new THREE.Vector3(Math.random() - .5, Math.random() * .2 - .1, Math.random() - .5).normalize(), spd: .08 + Math.random() * .06 });
        }

        let yaw = 0, pitch = 0, locked = false, score = 0, collected = 0, timeLeft = 60, over = false, won = false, invuln = 0;
        let keys = {};
        renderer.domElement.addEventListener('click', () => renderer.domElement.requestPointerLock());
        document.addEventListener('pointerlockchange', () => locked = !!document.pointerLockElement);
        document.addEventListener('mousemove', e => { if (!locked) return; yaw -= e.movementX * .002; pitch = Math.max(-1.2, Math.min(1.2, pitch - e.movementY * .002)); });
        document.addEventListener('keydown', e => keys[e.code] = true); document.addEventListener('keyup', e => keys[e.code] = false);
        // Timer
        const timerIv = setInterval(() => { if (over || won) return; timeLeft--; document.getElementById('tm').textContent = timeLeft; if (timeLeft <= 0 && !won) { over = true; document.getElementById('msg').innerHTML = '⏱ TIME UP!<br>Crystals: ' + collected + '/' + TOTAL + '<br><small>R restart</small>'; document.getElementById('msg').style.display = 'block'; } }, 1000);
        const msgEl = document.getElementById('msg');
        const clock = new THREE.Clock();
        function update() {
            const dt = clock.getDelta(); if (over || won) return;
            camera.rotation.order = 'YXZ'; camera.rotation.y = yaw; camera.rotation.x = pitch;
            const sp = 5 * dt; const fwd = new THREE.Vector3(0, 0, -1).applyEuler(camera.rotation); const right = new THREE.Vector3(1, 0, 0).applyEuler(camera.rotation);
            if (keys['KeyW'] || keys['ArrowUp']) camera.position.addScaledVector(fwd, sp);
            if (keys['KeyS'] || keys['ArrowDown']) camera.position.addScaledVector(fwd, -sp);
            if (keys['KeyA'] || keys['ArrowLeft']) camera.position.addScaledVector(right, -sp);
            if (keys['KeyD'] || keys['ArrowRight']) camera.position.addScaledVector(right, sp);
            if (keys['Space']) camera.position.y += sp; if (keys['ShiftLeft']) camera.position.y -= sp;
            // Crystal collection
            crystals.forEach(c => { if (!c.visible) return; if (camera.position.distanceTo(c.position) < 2) { c.visible = false; collected++; score += 50 + Math.floor(timeLeft * 2); document.getElementById('cr').textContent = collected; document.getElementById('sc').textContent = score; if (collected >= TOTAL) { won = true; clearInterval(timerIv); msgEl.innerHTML = '🏆 YOU WIN!<br>Score: ' + score + '<br>Time left: ' + timeLeft + 's'; msgEl.style.display = 'block'; } } c.rotation.y += 1.2 * dt; c.rotation.x += .6 * dt; });
            // Enemies
            if (invuln > 0) invuln--;
            enemies.forEach(e => {
                e.mesh.position.addScaledVector(e.dir, .06); e.mesh.rotation.y += .04;
                // Bounce off bounds
                if (Math.abs(e.mesh.position.x) > 40) e.dir.x *= -1; if (Math.abs(e.mesh.position.y) > 28) e.dir.y *= -1; if (Math.abs(e.mesh.position.z) > 40) e.dir.z *= -1;
                // Chase player slowly
                const toP = new THREE.Vector3().copy(camera.position).sub(e.mesh.position).normalize(); e.dir.lerp(toP, .01).normalize();
                // Hit
                if (invuln <= 0 && camera.position.distanceTo(e.mesh.position) < 2) { score = Math.max(0, score - 100); invuln = 90; document.getElementById('sc').textContent = score; }
            });
        }
        document.addEventListener('keydown', e => { if (e.code === 'KeyR' && (over || won)) { location.reload(); } });
        function animate() { requestAnimationFrame(animate); update(); renderer.render(scene, camera); } animate();
        window.addEventListener('resize', () => { camera.aspect = innerWidth / innerHeight; camera.updateProjectionMatrix(); renderer.setSize(innerWidth, innerHeight); });
    </script>

    <script src="../mobile_controls.js"></script>
</body>

</html>
