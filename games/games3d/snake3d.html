<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Snake 3D</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        body {
            background: #000;
            overflow: hidden;
            font-family: 'Courier New', monospace
        }

        #hud {
            position: fixed;
            top: 12px;
            left: 12px;
            color: #4ade80;
            font-size: .85rem;
            text-shadow: 0 0 8px #4ade80
        }

        #hud b {
            color: #86efac
        }

        #msg {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, .85);
            border: 2px solid #4ade80;
            border-radius: 16px;
            padding: 24px 40px;
            color: #facc15;
            font-size: 1.8rem;
            font-weight: 700;
            text-align: center;
            display: none;
            text-shadow: 0 0 20px #facc15
        }

        #info {
            position: fixed;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            color: #475569;
            font-size: .78rem
        }
    </style>
</head>

<body>
    <div id="hud">🍎 Score: <b id="sc">0</b> &nbsp;|&nbsp; Length: <b id="ln">3</b> &nbsp;|&nbsp; Speed: <b
            id="sp">1</b></div>
    <div id="msg"></div>
    <div id="info">WASD / Arrow Keys = turn | Q/E = up/down | R = restart</div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(innerWidth, innerHeight); document.body.appendChild(renderer.domElement);
        const scene = new THREE.Scene(); scene.background = new THREE.Color(0x001a0a);
        const camera = new THREE.PerspectiveCamera(60, innerWidth / innerHeight, .1, 200);
        camera.position.set(15, 22, 20); camera.lookAt(0, 0, 0);
        scene.add(new THREE.AmbientLight(0x4ade80, .5));
        const dl = new THREE.DirectionalLight(0x86efac, 1.2); dl.position.set(10, 20, 10); scene.add(dl);

        const GRID = 12, CELL = 1.8;
        // Grid cage
        const wireGeo = new THREE.BoxGeometry(GRID * CELL, GRID * CELL, GRID * CELL);
        const wireMat = new THREE.MeshBasicMaterial({ color: 0x0d3a1a, wireframe: true });
        scene.add(new THREE.Mesh(wireGeo, wireMat));
        // Ground plane inside
        const grd = new THREE.Mesh(new THREE.PlaneGeometry(GRID * CELL, GRID * CELL), new THREE.MeshLambertMaterial({ color: 0x051205, transparent: true, opacity: .5 }));
        grd.rotation.x = -Math.PI / 2; grd.position.y = -(GRID / 2) * CELL; scene.add(grd);

        function toWorld(p) { return { x: (p.x - GRID / 2 + .5) * CELL, y: (p.y - GRID / 2 + .5) * CELL, z: (p.z - GRID / 2 + .5) * CELL }; }
        function mkCube(col, emissive) { return new THREE.Mesh(new THREE.BoxGeometry(CELL * .88, CELL * .88, CELL * .88), new THREE.MeshPhongMaterial({ color: col, emissive, shininess: 80 })); }

        // Snake
        let snake, dir, nextDir, food, foodMesh, speed, score, over, won, t, segments;
        const segMeshes = [];

        function init() {
            segMeshes.forEach(m => scene.remove(m)); segMeshes.length = 0;
            if (foodMesh) scene.remove(foodMesh);
            snake = [{ x: 6, y: 6, z: 6 }, { x: 5, y: 6, z: 6 }, { x: 4, y: 6, z: 6 }];
            dir = { x: 1, y: 0, z: 0 }; nextDir = { x: 1, y: 0, z: 0 };
            speed = 8; score = 0; over = false; won = false; t = 0;
            snake.forEach(p => { const m = mkCube(0x4ade80, 0x0a1a0a); const w = toWorld(p); m.position.set(w.x, w.y, w.z); scene.add(m); segMeshes.push(m); });
            spawnFood(); document.getElementById('sc').textContent = 0; document.getElementById('ln').textContent = 3; document.getElementById('sp').textContent = 1; document.getElementById('msg').style.display = 'none';
        }
        function spawnFood() {
            if (foodMesh) scene.remove(foodMesh);
            do { food = { x: Math.floor(Math.random() * GRID), y: Math.floor(Math.random() * GRID), z: Math.floor(Math.random() * GRID) }; }
            while (snake.some(s => s.x === food.x && s.y === food.y && s.z === food.z));
            foodMesh = mkCube(0xef4444, 0x7a0a0a); const w = toWorld(food); foodMesh.position.set(w.x, w.y, w.z); scene.add(foodMesh);
            foodMesh.add(new THREE.PointLight(0xef4444, .8, 3));
        }

        const dirMap = { ArrowLeft: { x: -1, y: 0, z: 0 }, ArrowRight: { x: 1, y: 0, z: 0 }, ArrowUp: { x: 0, y: 0, z: -1 }, ArrowDown: { x: 0, y: 0, z: 1 }, KeyA: { x: -1, y: 0, z: 0 }, KeyD: { x: 1, y: 0, z: 0 }, KeyW: { x: 0, y: 0, z: -1 }, KeyS: { x: 0, y: 0, z: 1 }, KeyQ: { x: 0, y: 1, z: 0 }, KeyE: { x: 0, y: -1, z: 0 } };
        document.addEventListener('keydown', e => {
            const d = dirMap[e.code]; if (d && !(d.x === -dir.x && d.y === -dir.y && d.z === -dir.z)) nextDir = d;
            if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.code)) e.preventDefault();
            if (e.code === 'KeyR' && (over || won)) init();
        });

        init();
        const clock = new THREE.Clock();
        function update() {
            const dt = clock.getDelta();
            if (over || won) return;
            t += dt * speed;
            if (t < 1) return; t = 0;
            dir = nextDir;
            const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y, z: snake[0].z + dir.z };
            // Wall check
            if (head.x < 0 || head.x >= GRID || head.y < 0 || head.y >= GRID || head.z < 0 || head.z >= GRID) { over = true; document.getElementById('msg').innerHTML = '💥 HIT WALL<br><small>Score: ' + score + ' | R to restart</small>'; document.getElementById('msg').style.display = 'block'; return; }
            // Self
            if (snake.some(s => s.x === head.x && s.y === head.y && s.z === head.z)) { over = true; document.getElementById('msg').innerHTML = '😵 HIT SELF<br><small>Score: ' + score + ' | R to restart</small>'; document.getElementById('msg').style.display = 'block'; return; }
            // Move
            snake.unshift(head);
            const eat = head.x === food.x && head.y === food.y && head.z === food.z;
            if (eat) { score += 10 + Math.floor(speed); spawnFood(); speed = Math.min(14, speed + .4); }
            else { const tail = scene.getObjectByProperty('uuid', segMeshes[segMeshes.length - 1].uuid); scene.remove(segMeshes.pop()); snake.pop(); }
            // New head mesh
            const m = mkCube(0x4ade80, 0x0a2a0a); const w = toWorld(head); m.position.set(w.x, w.y, w.z);
            segMeshes.unshift(m); scene.add(m);
            // Recolor head
            segMeshes.forEach((m, i) => m.material.color.setHex(i === 0 ? 0x86efac : i < 3 ? 0x4ade80 : 0x16a34a));
            document.getElementById('sc').textContent = score; document.getElementById('ln').textContent = snake.length; document.getElementById('sp').textContent = Math.round(speed * 10) / 10;
            if (snake.length > GRID * GRID * GRID * .3) { won = true; document.getElementById('msg').innerHTML = '🏆 YOU WIN!<br><small>Score: ' + score + '</small>'; document.getElementById('msg').style.display = 'block'; }
        }
        // Orbit camera
        let camAngle = Math.PI / 4;
        document.addEventListener('keydown', e => { if (e.code === 'KeyQ' && !dirMap[e.code]) return; });
        function animate() {
            requestAnimationFrame(animate); update();
            camAngle += .003; camera.position.x = Math.sin(camAngle) * 34; camera.position.z = Math.cos(camAngle) * 34; camera.lookAt(0, 0, 0);
            if (foodMesh) foodMesh.rotation.y += .04;
            renderer.render(scene, camera);
        } animate();
        window.addEventListener('resize', () => { camera.aspect = innerWidth / innerHeight; camera.updateProjectionMatrix(); renderer.setSize(innerWidth, innerHeight); });
    </script>

    <script src="../mobile_controls.js"></script>
</body>

</html>
