<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Road Racer 3D</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        body {
            background: #000;
            overflow: hidden;
            font-family: 'Courier New', monospace
        }

        #hud {
            position: fixed;
            top: 12px;
            left: 12px;
            color: #22d3ee;
            font-size: .85rem;
            text-shadow: 0 0 8px #22d3ee
        }

        #hud b {
            color: #67e8f9
        }

        #msg {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, .85);
            border: 2px solid #22d3ee;
            border-radius: 16px;
            padding: 24px 40px;
            color: #facc15;
            font-size: 1.8rem;
            font-weight: 700;
            text-align: center;
            display: none
        }

        #info {
            position: fixed;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            color: #475569;
            font-size: .78rem
        }

        #speedBar {
            position: fixed;
            bottom: 30px;
            right: 20px;
            width: 16px;
            height: 120px;
            background: rgba(34, 211, 238, .15);
            border-radius: 8px;
            border: 1px solid #22d3ee
        }

        #speedFill {
            position: absolute;
            bottom: 0;
            width: 100%;
            background: linear-gradient(to top, #22d3ee, #818cf8);
            border-radius: 8px;
            transition: height .1s
        }
    </style>
</head>

<body>
    <div id="hud">🏁 Score: <b id="sc">0</b> &nbsp;|&nbsp; ❤️ Lives: <b id="li">3</b> &nbsp;|&nbsp; 🚀 Speed: <b
            id="sp">1×</b></div>
    <div id="msg"></div>
    <div id="info">← → / A D = steer | ⬆ W = accelerate | ⬇ S = brake</div>
    <div id="speedBar">
        <div id="speedFill" style="height:20%"></div>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(innerWidth, innerHeight); renderer.shadowMap.enabled = true; document.body.appendChild(renderer.domElement);
        const scene = new THREE.Scene(); scene.background = new THREE.Color(0x020612); scene.fog = new THREE.Fog(0x020612, 30, 130);
        const camera = new THREE.PerspectiveCamera(70, innerWidth / innerHeight, .1, 200);
        scene.add(new THREE.AmbientLight(0x192a3a, .8));
        const dl = new THREE.DirectionalLight(0x67e8f9, .8); dl.position.set(5, 15, 5); scene.add(dl);
        // Headlights
        const hl1 = new THREE.SpotLight(0xffffff, 2, 40, .35, .5); hl1.position.set(-.5, .5, -2); scene.add(hl1);
        const hl2 = new THREE.SpotLight(0xffffff, 2, 40, .35, .5); hl2.position.set(.5, .5, -2); scene.add(hl2);

        // Road (chunk-based)
        const ROAD_W = 8, CHUNK_L = 20, CHUNKS = 8;
        const roadMat = new THREE.MeshLambertMaterial({ color: 0x1a1a1a });
        const lineMat = new THREE.MeshBasicMaterial({ color: 0x404040 });
        const chunks = [], obstacles = [];
        let roadZ = 0;
        function makeChunk(z) {
            const g = new THREE.Group(); const road = new THREE.Mesh(new THREE.PlaneGeometry(ROAD_W, CHUNK_L), roadMat);
            road.rotation.x = -Math.PI / 2; road.position.set(0, 0, z); g.add(road);
            // Lane lines
            for (let i = 0; i < 2; i++) { const lm = new THREE.Mesh(new THREE.PlaneGeometry(.1, CHUNK_L * .8), lineMat); lm.rotation.x = -Math.PI / 2; lm.position.set(i === 0 ? -ROAD_W * .25 : ROAD_W * .25, .01, z); g.add(lm); }
            // Side walls
            const walkMat = new THREE.MeshLambertMaterial({ color: 0x1a3a2a });
            [-ROAD_W / 2 - 1, ROAD_W / 2 + 1].forEach(x => { const w = new THREE.Mesh(new THREE.BoxGeometry(2, 1.5, CHUNK_L), walkMat); w.position.set(x, .75, z); g.add(w); });
            // Random obstacle
            if (Math.random() < .5) {
                const cols = [0xf43f5e, 0xf97316, 0xa78bfa, 0xfacc15];
                const ox = (Math.random() - .5) * ROAD_W * .6; const col = cols[Math.floor(Math.random() * cols.length)];
                const obs = new THREE.Mesh(new THREE.BoxGeometry(1.8, 1.4, 1.8), new THREE.MeshLambertMaterial({ color: col }));
                obs.position.set(ox, .7, z + (Math.random() - .5) * CHUNK_L * .7); g.add(obs);
                obs.add(new THREE.PointLight(col, .5, 5));
                obstacles.push(obs);
            }
            scene.add(g); return g;
        }
        for (let i = 0; i < CHUNKS; i++)chunks.push(makeChunk(-i * CHUNK_L));

        // Car mesh
        const carGroup = new THREE.Group(); scene.add(carGroup);
        const carBody = new THREE.Mesh(new THREE.BoxGeometry(1.6, 1, 3.5), new THREE.MeshPhongMaterial({ color: 0x22d3ee, shininess: 180, specular: 0x818cf8 }));
        carBody.position.y = .5; carGroup.add(carBody);
        const roof = new THREE.Mesh(new THREE.BoxGeometry(1.3, .7, 2), new THREE.MeshPhongMaterial({ color: 0x06b6d4, shininess: 120 }));
        roof.position.set(0, 1.2, -.3); carGroup.add(roof);
        // Wheels
        [[.9, .1, 1.2], [-.9, .1, 1.2], [.9, .1, -1.2], [-.9, .1, -1.2]].forEach(([x, y, z]) => { const w = new THREE.Mesh(new THREE.CylinderGeometry(.35, .35, .25, 8), new THREE.MeshLambertMaterial({ color: 0x111111 })); w.rotation.z = Math.PI / 2; w.position.set(x, y, z); carGroup.add(w); });
        carGroup.position.set(0, .35, 0);
        hl1.target = carGroup; hl2.target = carGroup;

        let carX = 0, carSpeed = 0, maxSpeed = .5, score = 0, lives = 3, over = false, won = false, invuln = 0, dist = 0;
        let keys = {};
        document.addEventListener('keydown', e => { keys[e.code] = true; if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.code)) e.preventDefault(); });
        document.addEventListener('keyup', e => keys[e.code] = false);
        const clock = new THREE.Clock();
        function update() {
            const dt = Math.min(clock.getDelta(), .033);
            if (over || won) return;
            // Speed
            const accel = (keys['ArrowUp'] || keys['KeyW']) ? .02 : 0; const brake = (keys['ArrowDown'] || keys['KeyS']) ? .015 : 0;
            carSpeed = Math.min(maxSpeed, Math.max(.05, carSpeed + accel - brake - .003));
            maxSpeed = Math.min(.9, .4 + dist * .00003);
            // Steer
            const str = (keys['ArrowLeft'] || keys['KeyA']) ? -.06 : (keys['ArrowRight'] || keys['KeyD']) ? .06 : 0;
            carX = Math.max(-ROAD_W / 2 + 1.2, Math.min(ROAD_W / 2 - 1.2, carX + str * carSpeed * 10));
            carGroup.position.x += (carX - carGroup.position.x) * .2;
            carGroup.rotation.y = -str * carSpeed * 8;
            // Road scroll
            const dz = carSpeed * 60 * dt; dist += dz; score = Math.floor(dist / 2); document.getElementById('sc').textContent = score; document.getElementById('sp').textContent = Math.round(carSpeed / maxSpeed * 100) + '%';
            document.getElementById('speedFill').style.height = (carSpeed / maxSpeed * 100) + '%';
            chunks.forEach(c => { c.position.z += dz; if (c.position.z > CHUNK_L) { c.position.z -= CHUNKS * CHUNK_L; } });
            // Camera follows car
            camera.position.set(carGroup.position.x * .3, 4.5, 12); camera.lookAt(carGroup.position.x * .1, 1, -8);
            hl1.position.set(carGroup.position.x - .5, 1.5, 0); hl1.target.position.set(carGroup.position.x - .5, 0, -20);
            hl2.position.set(carGroup.position.x + .5, 1.5, 0); hl2.target.position.set(carGroup.position.x + .5, 0, -20);
            // Obstacles don't move (road chunks move), check world pos
            if (invuln > 0) { invuln--; carGroup.visible = Math.floor(invuln / 6) % 2 === 0 ? false : true; }
            else {
                obstacles.forEach(o => {
                    // Approximate world z = obstacle z + parent chunk z
                    const parent = chunks.find(c => c.children.includes(o)); if (!parent) return;
                    const wz = o.position.z + parent.position.z; const wx = o.position.x + parent.position.x;
                    if (Math.abs(carGroup.position.x - wx) < 1.8 && wz > -4 && wz < 4) { lives--; document.getElementById('li').textContent = lives; invuln = 90; carSpeed = .05; if (lives <= 0) { over = true; document.getElementById('msg').innerHTML = '💥 CRASHED!<br>Score: ' + score + '<br><small>R to restart</small>'; document.getElementById('msg').style.display = 'block'; } }
                });
            }
            if (dist > 5000 && !won) { won = true; document.getElementById('msg').innerHTML = '🏆 YOU WIN!<br>Score: ' + score; document.getElementById('msg').style.display = 'block'; }
        }
        document.addEventListener('keydown', e => { if (e.code === 'KeyR' && (over || won)) { score = 0; lives = 3; dist = 0; carX = 0; carSpeed = .1; over = false; won = false; invuln = 0; carGroup.position.set(0, .35, 0); document.getElementById('sc').textContent = 0; document.getElementById('li').textContent = 3; document.getElementById('sp').textContent = '1×'; document.getElementById('msg').style.display = 'none'; } });
        function animate() { requestAnimationFrame(animate); update(); renderer.render(scene, camera); } animate();
        window.addEventListener('resize', () => { camera.aspect = innerWidth / innerHeight; camera.updateProjectionMatrix(); renderer.setSize(innerWidth, innerHeight); });
    </script>

    <script src="../mobile_controls.js"></script>
</body>

</html>
