<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Sky Jumper 3D</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        body {
            background: #000;
            overflow: hidden;
            font-family: 'Courier New', monospace
        }

        #hud {
            position: fixed;
            top: 12px;
            left: 12px;
            color: #38bdf8;
            font-size: .85rem;
            text-shadow: 0 0 8px #38bdf8
        }

        #hud b {
            color: #7dd3fc
        }

        #msg {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, .88);
            border: 2px solid #38bdf8;
            border-radius: 16px;
            padding: 24px 40px;
            color: #facc15;
            font-size: 1.8rem;
            text-align: center;
            display: none
        }

        #info {
            position: fixed;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            color: #475569;
            font-size: .78rem
        }
    </style>
</head>

<body>
    <div id="hud">⭐ Coins: <b id="cn">0</b> &nbsp;|&nbsp; ❤️ Lives: <b id="li">3</b> &nbsp;|&nbsp; 🏆 Goal: <b
            id="gl">?</b></div>
    <div id="msg"></div>
    <div id="info">WASD / Arrows = move | Space = jump (double jump!) | R = restart</div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(innerWidth, innerHeight); renderer.shadowMap.enabled = true; document.body.appendChild(renderer.domElement);
        const scene = new THREE.Scene(); scene.background = new THREE.Color(0x020a18); scene.fog = new THREE.Fog(0x050a18, 20, 80);
        const camera = new THREE.PerspectiveCamera(65, innerWidth / innerHeight, .1, 200);
        scene.add(new THREE.AmbientLight(0x112240, .9));
        const dl = new THREE.DirectionalLight(0x7dd3fc, 1.4); dl.position.set(10, 20, 10); dl.castShadow = true; scene.add(dl);

        // Platform types
        const platColors = [0x1e3a5f, 0x1a4a3a, 0x3a1a5f, 0x4a2a0a];
        const platforms = [], coins = [], movingPlats = [];
        function makePlat(x, y, z, w, d, moving) {
            const m = new THREE.Mesh(new THREE.BoxGeometry(w, .4, d), new THREE.MeshPhongMaterial({ color: platColors[Math.floor(Math.random() * platColors.length)], shininess: 60 }));
            m.position.set(x, y, z); m.receiveShadow = true; m.castShadow = true; scene.add(m);
            const edge = new THREE.LineSegments(new THREE.EdgesGeometry(m.geometry), new THREE.LineBasicMaterial({ color: 0x38bdf8, transparent: true, opacity: .4 })); m.add(edge);
            platforms.push(m);
            if (moving) movingPlats.push({ mesh: m, ox: x, oz: z, amp: moving.amp, spd: moving.spd, axis: moving.axis, t: Math.random() * Math.PI * 2 });
            return m;
        }
        function makeCoin(x, y, z) {
            const c = new THREE.Mesh(new THREE.TorusGeometry(.25, .07, 8, 16), new THREE.MeshPhongMaterial({ color: 0xfacc15, emissive: 0x6a4c00, shininess: 200 }));
            c.position.set(x, y, z); scene.add(c); c.add(new THREE.PointLight(0xfacc15, .6, 2.5)); coins.push(c);
            document.getElementById('gl').textContent = coins.length; return c;
        }
        // Level
        makePlat(0, 0, 0, 6, 6);// start
        makePlat(8, 1.5, 0, 4, 4); makePlat(8, 1.5, -8, 4, 4); makePlat(0, 3, -12, 5, 5);
        makePlat(-8, 4.5, -12, 4, 4, { amp: 3, spd: .8, axis: 'x' });
        makePlat(-8, 6, -20, 4, 4); makePlat(0, 7.5, -24, 6, 4);
        makePlat(8, 9, -24, 3, 3, { amp: 3, spd: 1.2, axis: 'z' });
        makePlat(8, 10.5, -32, 4, 4); makePlat(0, 12, -36, 5, 5);// goal
        const goal = new THREE.Mesh(new THREE.CylinderGeometry(1.5, 1.5, .2, 16), new THREE.MeshPhongMaterial({ color: 0xfacc15, emissive: 0x6a4c00 }));
        goal.position.set(0, 12.2, -36); scene.add(goal); goal.add(new THREE.PointLight(0xfacc15, 1.5, 5));
        // Coins on platforms
        [[8, 2.5, 0], [8, 2.5, -8], [0, 4, -12], [-8, 5.5, -12], [8, 11.5, -24], [8, 12, -32]].forEach(([x, y, z]) => makeCoin(x, y, z));

        // Player
        const playerMat = new THREE.MeshPhongMaterial({ color: 0x38bdf8, shininess: 100, specular: 0x818cf8, emissive: 0x041828 });
        const player = new THREE.Mesh(new THREE.BoxGeometry(.6, 1, .6), playerMat); player.castShadow = true; scene.add(player);
        player.add(new THREE.PointLight(0x38bdf8, .5, 3));
        let pPos = new THREE.Vector3(0, .7, 0), pVel = new THREE.Vector3(), jumps = 0, alive = true;
        let lives = 3, coinsCollected = 0, over = false, won = false;
        let keys = {};
        document.addEventListener('keydown', e => {
            keys[e.code] = true;
            if (e.code === 'Space' && jumps < 2) { pVel.y = .2; jumps++; e.preventDefault(); }
            if (e.code === 'KeyR' && (over || won)) restart();
            if (e.code.startsWith('Arrow')) e.preventDefault();
        });
        document.addEventListener('keyup', e => keys[e.code] = false);
        function restart() { over = false; won = false; lives = 3; coinsCollected = 0; pPos.set(0, .7, 0); pVel.set(0, 0, 0); jumps = 2; document.getElementById('cn').textContent = 0; document.getElementById('li').textContent = 3; document.getElementById('msg').style.display = 'none'; coins.forEach(c => c.visible = true); }

        const clock = new THREE.Clock(); let camAngle = 0;
        function update() {
            const dt = Math.min(clock.getDelta(), .033); if (over || won) return;
            // Moving platforms
            movingPlats.forEach(p => { p.t += dt * p.spd; if (p.axis === 'x') p.mesh.position.x = p.ox + Math.sin(p.t) * p.amp; else p.mesh.position.z = p.oz + Math.sin(p.t) * p.amp; });
            // Player movement
            const speed = 4; const fwd = new THREE.Vector3(0, 0, -1), right = new THREE.Vector3(1, 0, 0);
            const move = new THREE.Vector3();
            if (keys['KeyW'] || keys['ArrowUp']) move.addScaledVector(fwd, speed * dt);
            if (keys['KeyS'] || keys['ArrowDown']) move.addScaledVector(fwd, -speed * dt);
            if (keys['KeyA'] || keys['ArrowLeft']) move.addScaledVector(right, -speed * dt);
            if (keys['KeyD'] || keys['ArrowRight']) move.addScaledVector(right, speed * dt);
            pVel.y -= .012; pVel.y = Math.max(pVel.y, -.4); pPos.add(move); pPos.addScaledVector(pVel, 1);
            // Platform collision
            let grounded = false;
            for (const p of platforms) {
                const pw = p.geometry.parameters.width / 2, pd = p.geometry.parameters.depth / 2;
                const ph = p.position.y + .2;
                if (pPos.x > p.position.x - pw - .3 && pPos.x < p.position.x + pw + .3 && pPos.z > p.position.z - pd - .3 && pPos.z < p.position.z + pd + .3) {
                    if (pPos.y > ph - .1 && pPos.y < ph + .5 && pVel.y <= 0) { pPos.y = ph + .5; pVel.y = 0; jumps = 0; grounded = true; }
                }
            }
            player.position.copy(pPos);
            // Fall death
            if (pPos.y < -8) { lives--; document.getElementById('li').textContent = lives; if (lives <= 0) { over = true; document.getElementById('msg').innerHTML = '💀 GAME OVER<br>Coins: ' + coinsCollected + '<br><small>R restart</small>'; document.getElementById('msg').style.display = 'block'; } else { pPos.set(0, .7, 0); pVel.set(0, 0, 0); } }
            // Coins
            coins.forEach(c => { if (c.visible && pPos.distanceTo(c.position) < 1.2) { c.visible = false; coinsCollected++; document.getElementById('cn').textContent = coinsCollected; } c.rotation.y += 1.5 * dt; });
            // Goal
            if (pPos.distanceTo(goal.position) < 2.5) { won = true; document.getElementById('msg').innerHTML = '🏆 YOU WIN!<br>Coins: ' + coinsCollected + '/' + coins.length; document.getElementById('msg').style.display = 'block'; }
            goal.rotation.y += 1 * dt;
            // Camera follow
            camera.position.x += (pPos.x - camera.position.x) * .07;
            camera.position.y += (pPos.y + 8 - camera.position.y) * .07;
            camera.position.z += (pPos.z + 12 - camera.position.z) * .07;
            camera.lookAt(pPos.x, pPos.y + 1, pPos.z);
        }
        function animate() { requestAnimationFrame(animate); update(); renderer.render(scene, camera); } animate();
        window.addEventListener('resize', () => { camera.aspect = innerWidth / innerHeight; camera.updateProjectionMatrix(); renderer.setSize(innerWidth, innerHeight); });
    </script>

    <script src="../mobile_controls.js"></script>
</body>

</html>
