<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pong | The Pizza Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0d0d0d;
            --primary-color: #95A5A6;
            --text-color: #fff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 2rem;
            user-select: none;
            overflow: hidden;
        }

        h1 {
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            font-weight: 800;
            background: linear-gradient(45deg, var(--primary-color), #7F8C8D);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .score-board {
            margin-bottom: 2rem;
            font-size: 2rem;
            font-weight: 800;
            width: 600px;
            display: flex;
            justify-content: space-around;
        }

        canvas {
            background: #1a1a1a;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            border: 2px solid rgba(255, 255, 255, 0.1);
            cursor: none;
        }

        .back-btn {
            position: absolute;
            top: 2rem;
            left: 2rem;
            color: var(--text-color);
            text-decoration: none;
            font-weight: 600;
            opacity: 0.7;
            transition: opacity 0.2s;
        }

        .back-btn:hover {
            opacity: 1;
        }
    </style>
</head>

<body>
    <a href="../games.html" class="back-btn">← Back to Games</a>
    <h1>Pong</h1>
    <div class="score-board">
        <span id="playerScore" style="color: #3498DB">0</span>
        <span id="aiScore" style="color: #E74C3C">0</span>
    </div>

    <canvas id="gameCanvas" width="800" height="400"></canvas>

    <script src="../scripts/scores.js"></script>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const playerScoreEl = document.getElementById('playerScore');
        const aiScoreEl = document.getElementById('aiScore');

        // Paddle properties
        const paddleWidth = 10, paddleHeight = 80;
        const player = { x: 10, y: canvas.height / 2 - paddleHeight / 2, width: paddleWidth, height: paddleHeight, color: '#3498DB', score: 0 };
        const ai = { x: canvas.width - 20, y: canvas.height / 2 - paddleHeight / 2, width: paddleWidth, height: paddleHeight, color: '#E74C3C', score: 0 };

        // Ball properties
        const ball = {
            x: canvas.width / 2, y: canvas.height / 2,
            radius: 8, speed: 7, velocityX: 5, velocityY: 5, color: '#FFF'
        };

        function drawRect(x, y, w, h, color) {
            ctx.fillStyle = color;
            ctx.fillRect(x, y, w, h);
        }

        function drawCircle(x, y, r, color) {
            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.arc(x, y, r, 0, Math.PI * 2, false);
            ctx.closePath();
            ctx.fill();
        }

        function drawText(text, x, y, color) {
            ctx.fillStyle = color;
            ctx.font = "45px Outfit";
            ctx.fillText(text, x, y);
        }

        function drawNet() {
            for (let i = 0; i <= canvas.height; i += 20) {
                drawRect(canvas.width / 2 - 1, i, 2, 10, 'rgba(255,255,255,0.2)');
            }
        }

        canvas.addEventListener("mousemove", evt => {
            let rect = canvas.getBoundingClientRect();
            player.y = evt.clientY - rect.top - player.height / 2;

            // Boundary checks
            if (player.y < 0) player.y = 0;
            if (player.y + player.height > canvas.height) player.y = canvas.height - player.height;
        });

        function resetBall() {
            ball.x = canvas.width / 2;
            ball.y = canvas.height / 2;
            ball.speed = 7;
            ball.velocityX = -ball.velocityX; // Serve to the one who scored
        }

        function collision(b, p) {
            b.top = b.y - b.radius;
            b.bottom = b.y + b.radius;
            b.left = b.x - b.radius;
            b.right = b.x + b.radius;

            p.top = p.y;
            p.bottom = p.y + p.height;
            p.left = p.x;
            p.right = p.x + p.width;

            return b.right > p.left && b.bottom > p.top && b.left < p.right && b.top < p.bottom;
        }

        function update() {
            // Move ball
            ball.x += ball.velocityX;
            ball.y += ball.velocityY;

            // Simple AI to control computer paddle
            let aiLevel = 0.1;
            ai.y += (ball.y - (ai.y + ai.height / 2)) * aiLevel;

            // Boundary checks for AI
            if (ai.y < 0) ai.y = 0;
            if (ai.y + ai.height > canvas.height) ai.y = canvas.height - ai.height;

            // Top and Bottom wall collision
            if (ball.y + ball.radius > canvas.height || ball.y - ball.radius < 0) {
                ball.velocityY = -ball.velocityY;
            }

            // Score updates
            if (ball.x - ball.radius < 0) {
                ai.score++;
                aiScoreEl.innerText = ai.score;
                if (ai.score >= 7) { PizzaScores.save('Pong', player.score, 'Computer wins'); player.score = 0; ai.score = 0; playerScoreEl.innerText = 0; aiScoreEl.innerText = 0; }
                resetBall();
            } else if (ball.x + ball.radius > canvas.width) {
                player.score++;
                playerScoreEl.innerText = player.score;
                if (player.score >= 7) { PizzaScores.save('Pong', player.score, 'Player wins!'); player.score = 0; ai.score = 0; playerScoreEl.innerText = 0; aiScoreEl.innerText = 0; }
                resetBall();
            }

            // Paddle collision
            let activePlayer = (ball.x < canvas.width / 2) ? player : ai;

            if (collision(ball, activePlayer)) {
                // Calculate angle based on where ball hits paddle
                let collidePoint = ball.y - (activePlayer.y + activePlayer.height / 2);
                collidePoint = collidePoint / (activePlayer.height / 2); // Normalize to [-1, 1]

                // Max bounce angle 45 degrees
                let angleRad = collidePoint * Math.PI / 4;

                // Direction of ball
                let direction = (ball.x < canvas.width / 2) ? 1 : -1;

                ball.velocityX = direction * ball.speed * Math.cos(angleRad);
                ball.velocityY = ball.speed * Math.sin(angleRad);

                // Increase speed per hit
                ball.speed += 0.5;
            }
        }

        function render() {
            // clear canvas
            drawRect(0, 0, canvas.width, canvas.height, '#1a1a1a');

            // draw net
            drawNet();

            // draw paddles
            drawRect(player.x, player.y, player.width, player.height, player.color);
            drawRect(ai.x, ai.y, ai.width, ai.height, ai.color);

            // draw ball
            drawCircle(ball.x, ball.y, ball.radius, ball.color);
        }

        function gameLoop() {
            update();
            render();
            requestAnimationFrame(gameLoop);
        }

        gameLoop();
    </script>
</body>

</html>
