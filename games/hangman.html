<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Hangman | The Pizza Edition</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: radial-gradient(ellipse at center, #0f172a, #020617);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Courier New', monospace;
            color: #e2e8f0;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 8px;
            letter-spacing: 3px;
            text-shadow: 0 0 20px #f87171;
        }

        canvas {
            margin: 10px 0;
        }

        #word {
            display: flex;
            gap: 10px;
            margin: 16px 0;
            font-size: 2rem;
            letter-spacing: 6px;
        }

        .letter {
            border-bottom: 3px solid #60a5fa;
            min-width: 30px;
            text-align: center;
            color: #f8fafc;
            min-height: 40px;
            line-height: 40px;
        }

        #wrong {
            color: #f87171;
            font-size: 1rem;
            margin-bottom: 10px;
            min-height: 1.5em;
        }

        #keyboard {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            max-width: 460px;
            justify-content: center;
        }

        .key {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #1e40af, #1d4ed8);
            color: #fff;
            font-size: 1rem;
            font-weight: bold;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: all .2s;
        }

        .key:hover:not(:disabled) {
            transform: scale(1.1);
        }

        .key:disabled {
            background: #334155;
            color: #64748b;
            cursor: default;
        }

        #msg {
            margin-top: 12px;
            font-size: 1.3rem;
            min-height: 1.5em;
            color: #fff;
        }

        #hint {
            font-size: .85rem;
            color: #94a3b8;
            margin-bottom: 6px;
        }

        button.new-btn {
            margin-top: 12px;
            padding: 10px 32px;
            background: linear-gradient(135deg, #f87171, #ef4444);
            color: #fff;
            font-size: 1rem;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        button.new-btn:hover {
            transform: scale(1.07);
        }

        #menuBtn {
            margin-top: 10px;
            padding: 10px 32px;
            background: linear-gradient(135deg, #334155, #1e293b);
            color: #fff;
            font-size: 1rem;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            letter-spacing: 2px;
            display: none;
        }

        #menuBtn:hover {
            transform: scale(1.07);
        }

        #homeBtn {
            position: fixed;
            top: 14px;
            left: 14px;
            padding: 8px 18px;
            background: rgba(30, 41, 59, 0.9);
            color: #fff;
            font-size: .9rem;
            font-weight: bold;
            border: 1px solid #475569;
            border-radius: 8px;
            cursor: pointer;
            text-decoration: none;
            z-index: 999;
        }

        #homeBtn:hover {
            background: #1e40af;
        }
    </style>
</head>

<body>
    <a id="homeBtn" href="../index.html">🏠 Menu</a>
    <h1>💀 HANGMAN</h1>
    <canvas id="c" width="220" height="240"></canvas>
    <div id="hint"></div>
    <div id="word"></div>
    <div id="wrong"></div>
    <div id="keyboard"></div>
    <div id="msg"></div>
    <button class="new-btn" onclick="newGame()">NEW WORD</button>
    <button id="menuBtn" onclick="window.close()">🏠 Return to Menu</button>
    <script src="../scripts/scores.js"></script>
    <script>
        const WORDS = [
            { w: 'JAVASCRIPT', h: 'Programming language' },
            { w: 'PYTHON', h: 'Snake language 🐍' },
            { w: 'KEYBOARD', h: 'You type on this' },
            { w: 'ASTEROID', h: 'Space rock' },
            { w: 'GALAXY', h: 'Cosmic system' },
            { w: 'TREASURE', h: 'Pirate prize' },
            { w: 'DINOSAUR', h: 'Extinct giant' },
            { w: 'UMBRELLA', h: 'Rain shield' },
            { w: 'ELEPHANT', h: 'Largest land animal' },
            { w: 'VOLCANO', h: 'Fiery mountain' },
            { w: 'PENGUIN', h: 'Antarctic bird' },
            { w: 'LABYRINTH', h: 'Maze' },
            { w: 'QUANTUM', h: 'Physics term' },
            { w: 'CRYSTALS', h: 'Sparkling gems' },
            { w: 'TWILIGHT', h: 'Dusk period' },
            { w: 'SPHINX', h: 'Ancient riddle statue' },
            { w: 'VORTEX', h: 'Spinning force' },
            { w: 'MUMMY', h: 'Egyptian preserved body' },
            { w: 'PHOENIX', h: 'Mythical fire bird' },
            { w: 'DUNGEON', h: 'Underground cell' },
        ];

        const C = document.getElementById('c'), ctx = C.getContext('2d');
        let word, hint, guessed, wrong;
        const MAX = 6;

        function newGame() {
            const pick = WORDS[Math.floor(Math.random() * WORDS.length)];
            word = pick.w; hint = pick.h; guessed = new Set(); wrong = [];
            document.getElementById('msg').textContent = '';
            document.getElementById('hint').textContent = `Hint: ${hint}`;
            renderWord(); renderKeyboard(); drawHangman();
            document.getElementById('wrong').textContent = '';
        }

        function renderWord() {
            const div = document.getElementById('word'); div.innerHTML = '';
            word.split('').forEach(l => {
                const span = document.createElement('span'); span.className = 'letter';
                span.textContent = guessed.has(l) ? l : ''; div.appendChild(span);
            });
        }

        function renderKeyboard() {
            const kb = document.getElementById('keyboard'); kb.innerHTML = '';
            'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('').forEach(l => {
                const btn = document.createElement('button'); btn.className = 'key'; btn.textContent = l;
                if (guessed.has(l)) { btn.disabled = true; }
                btn.onclick = () => guess(l); kb.appendChild(btn);
            });
        }

        function guess(l) {
            guessed.add(l);
            if (!word.includes(l)) { wrong.push(l); }
            renderWord(); renderKeyboard(); drawHangman();
            document.getElementById('wrong').textContent = wrong.length ? `Wrong: ${wrong.join(' ')} (${wrong.length}/${MAX})` : '';
            const won = word.split('').every(c => guessed.has(c));
            if (won) { document.getElementById('msg').textContent = '🎉 You win!'; document.getElementById('menuBtn').style.display = ''; PizzaScores.save('Hangman', 1, `Word: ${word}`); }
            else if (wrong.length >= MAX) { document.getElementById('msg').textContent = `💀 The word was: ${word}`; document.getElementById('menuBtn').style.display = ''; PizzaScores.save('Hangman', 0, `Word: ${word} — lost`); }
        }

        function drawHangman() {
            ctx.clearRect(0, 0, 220, 240);
            ctx.strokeStyle = '#60a5fa'; ctx.lineWidth = 3; ctx.lineCap = 'round';
            // Gallows
            ctx.beginPath(); ctx.moveTo(20, 220); ctx.lineTo(200, 220); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(60, 220); ctx.lineTo(60, 20); ctx.lineTo(140, 20); ctx.lineTo(140, 50); ctx.stroke();
            const n = wrong.length;
            ctx.strokeStyle = '#f87171'; ctx.lineWidth = 3;
            if (n >= 1) { ctx.beginPath(); ctx.arc(140, 68, 18, 0, Math.PI * 2); ctx.stroke(); }
            if (n >= 2) { ctx.beginPath(); ctx.moveTo(140, 86); ctx.lineTo(140, 150); ctx.stroke(); }
            if (n >= 3) { ctx.beginPath(); ctx.moveTo(140, 100); ctx.lineTo(115, 125); ctx.stroke(); }
            if (n >= 4) { ctx.beginPath(); ctx.moveTo(140, 100); ctx.lineTo(165, 125); ctx.stroke(); }
            if (n >= 5) { ctx.beginPath(); ctx.moveTo(140, 150); ctx.lineTo(115, 185); ctx.stroke(); }
            if (n >= 6) { ctx.beginPath(); ctx.moveTo(140, 150); ctx.lineTo(165, 185); ctx.stroke(); }
        }

        document.addEventListener('keydown', e => {
            const l = e.key.toUpperCase();
            if (l.match(/^[A-Z]$/) && !guessed.has(l) && wrong.length < MAX && !word.split('').every(c => guessed.has(c))) guess(l);
        });

        newGame();
    </script>
</body>

</html>
